<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Quote — GSTW Admin</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED',
            'dark':'#16202A',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'sidebar-bg':'#0F1E2E','sidebar-hover':'#1A2D40',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
          },
          boxShadow:{
            'natural':'0 4px 16px rgba(26,32,42,0.06)',
            'lifted':'0 8px 32px rgba(26,32,42,0.10)',
            'tactical':'0 4px 20px rgba(30,64,96,0.25)',
          },
        },
      },
    }
  </script>

  <style>
    body{font-family:'Manrope',sans-serif;background-color:#F0EDE6}
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .tactical-gradient{background:linear-gradient(145deg,#152E45,#1E4060)}
    .scripture-mark{font-family:Georgia,'Times New Roman',serif}
    textarea{resize:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin 1s linear infinite;display:inline-block}
  </style>
</head>

<body class="text-text-dark min-h-screen">

<div class="max-w-2xl mx-auto px-6 py-8">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-8">
    <button onclick="goBack()"
      class="w-10 h-10 flex items-center justify-center text-text-muted active:scale-90 transition-all rounded-xl hover:bg-card-bg">
      <span class="material-symbols-outlined text-[22px]">arrow_back</span>
    </button>
    <h1 class="font-headline font-bold text-xl text-text-dark">Edit Quote</h1>
    <div class="w-10"></div>
  </div>

  <!-- LOADING STATE -->
  <div id="loadingState" class="text-center py-20">
    <span class="material-symbols-outlined text-primary text-[32px] spin">progress_activity</span>
    <p class="text-sm text-text-muted mt-3">Loading quote...</p>
  </div>

  <!-- ERROR STATE -->
  <div id="errorState" class="hidden text-center py-20">
    <div class="w-16 h-16 rounded-2xl bg-action/10 flex items-center justify-center mx-auto mb-4">
      <span class="material-symbols-outlined text-action text-[32px]">error</span>
    </div>
    <h3 class="font-headline font-bold text-xl text-text-dark mb-2">Quote Not Found</h3>
    <p class="text-sm text-text-muted mb-6">The quote could not be loaded.</p>
    <button onclick="goBack()"
      class="tactical-gradient text-white font-bold px-6 py-3 rounded-xl shadow-tactical">
      Back to Quotes
    </button>
  </div>

  <!-- EDIT FORM -->
  <div id="editForm" class="hidden space-y-6">

    <!-- Current Quote Preview -->
    <div class="bg-card-bg rounded-2xl p-5 border-l-4 border-gold shadow-natural">
      <p class="text-[10px] font-bold text-gold-dim uppercase tracking-widest mb-2">Currently</p>
      <p id="currentQuotePreview" class="font-headline font-bold text-base text-text-dark italic leading-relaxed"></p>
      <p id="currentSourcePreview" class="text-sm font-bold text-primary mt-2"></p>
    </div>

    <!-- Quote Text -->
    <div class="bg-card-bg rounded-2xl p-5 shadow-natural border border-border-soft space-y-2">
      <div class="flex justify-between items-end">
        <label class="text-xs font-bold text-text-muted uppercase tracking-widest">The Word</label>
        <span id="charCount" class="text-xs text-text-light">0 / 280</span>
      </div>
      <textarea id="editText" maxlength="280" oninput="updateCharCount()"
        class="w-full h-36 bg-surface border border-border-soft rounded-xl p-4 font-body text-base
        text-text-dark focus:outline-none focus:ring-2 focus:ring-primary placeholder:text-text-light"
        placeholder="Enter the scripture..."></textarea>
    </div>

    <!-- Source -->
    <div class="bg-card-bg rounded-2xl p-5 shadow-natural border border-border-soft space-y-2">
      <label class="text-xs font-bold text-text-muted uppercase tracking-widest">Source / Reference</label>
      <input id="editSource" type="text"
        class="w-full bg-surface border border-border-soft rounded-xl px-4 py-3 font-body text-sm
        text-text-dark focus:outline-none focus:ring-2 focus:ring-primary placeholder:text-text-light"
        placeholder="e.g. Proverbs 3:5">
    </div>

    <!-- Context -->
    <div class="bg-card-bg rounded-2xl p-5 shadow-natural border border-border-soft space-y-2">
      <div class="flex justify-between items-end">
        <label class="text-xs font-bold text-text-muted uppercase tracking-widest">
          Context
          <span class="text-text-light font-normal normal-case ml-1">(optional)</span>
        </label>
        <span id="contextCount" class="text-xs text-text-light">0 / 500</span>
      </div>
      <textarea id="editContext" maxlength="500" oninput="updateContextCount()"
        class="w-full h-28 bg-surface border border-border-soft rounded-xl p-4 font-body text-sm
        text-text-dark focus:outline-none focus:ring-2 focus:ring-primary placeholder:text-text-light"
        placeholder="Explain the historical context, meaning, or how to apply this verse today..."></textarea>
    </div>

    <!-- Category -->
    <div class="bg-card-bg rounded-2xl p-5 shadow-natural border border-border-soft space-y-2">
      <label class="text-xs font-bold text-text-muted uppercase tracking-widest">Category</label>
      <select id="editCategory"
        class="w-full bg-surface border border-border-soft rounded-xl px-4 py-3 font-body text-sm
        text-text-dark focus:outline-none focus:ring-2 focus:ring-primary appearance-none">
        <option value="Faith">Faith</option>
        <option value="Hope">Hope</option>
        <option value="Courage">Courage</option>
        <option value="Wisdom">Wisdom</option>
        <option value="Healing">Healing</option>
        <option value="Strength">Strength</option>
        <option value="Love">Love</option>
        <option value="Peace">Peace</option>
        <option value="Mission">Mission</option>
      </select>
    </div>

    <!-- Status -->
    <div class="bg-card-bg rounded-2xl p-5 shadow-natural border border-border-soft space-y-2">
      <label class="text-xs font-bold text-text-muted uppercase tracking-widest">Status</label>
      <select id="editStatus"
        class="w-full bg-surface border border-border-soft rounded-xl px-4 py-3 font-body text-sm
        text-text-dark focus:outline-none focus:ring-2 focus:ring-primary appearance-none">
        <option value="live">Live — Visible to users</option>
        <option value="scheduled">Scheduled</option>
        <option value="draft">Draft — Not visible</option>
      </select>
    </div>

    <!-- Schedule (shown when scheduled) -->
    <div id="scheduleSection" class="hidden bg-card-bg rounded-2xl p-5 shadow-natural border border-border-soft space-y-3">
      <label class="text-xs font-bold text-text-muted uppercase tracking-widest">Schedule Date & Time (AEST)</label>
      <div class="grid grid-cols-2 gap-3">
        <input id="editDate" type="date"
          class="w-full bg-surface border border-border-soft rounded-xl px-4 py-3 font-body text-sm
          text-text-dark focus:outline-none focus:ring-2 focus:ring-primary">
        <input id="editTime" type="time" value="05:30"
          class="w-full bg-surface border border-border-soft rounded-xl px-4 py-3 font-body text-sm
          text-text-dark focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
    </div>

    <!-- Actions -->
    <div class="flex gap-3 pt-2 pb-8">
      <button onclick="goBack()"
        class="flex-1 py-3.5 border-2 border-border-soft text-text-muted font-bold rounded-xl
        hover:bg-cream transition-all">
        Cancel
      </button>
      <button onclick="saveQuote()" id="saveBtn"
        class="flex-1 py-3.5 tactical-gradient text-white font-headline font-bold rounded-xl
        shadow-tactical active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
        <span id="saveIcon" class="material-symbols-outlined text-gold text-[18px] filled">save</span>
        <span id="saveLabel">Save Changes</span>
      </button>
    </div>

  </div>

  <!-- SUCCESS STATE -->
  <div id="successState" class="hidden text-center py-20">
    <div class="w-16 h-16 rounded-2xl bg-primary/10 flex items-center justify-center mx-auto mb-4">
      <span class="material-symbols-outlined text-primary text-[32px] filled">check_circle</span>
    </div>
    <h3 class="font-headline font-bold text-xl text-text-dark mb-2">Quote Updated!</h3>
    <p class="text-sm text-text-muted mb-6">Changes saved successfully.</p>
    <button onclick="goBack()"
      class="tactical-gradient text-white font-bold px-8 py-3 rounded-xl shadow-tactical">
      Back to Quotes
    </button>
  </div>

</div>

<!-- TOAST -->
<div id="toast" class="hidden fixed top-6 right-6 z-50 bg-primary text-white px-5 py-3.5 rounded-2xl shadow-lifted flex items-center gap-3 max-w-sm">
  <span class="material-symbols-outlined text-gold text-[20px] filled">check_circle</span>
  <p id="toastMsg" class="text-sm font-bold font-body"></p>
</div>

<script>

  var supabaseClient = supabase.createClient(
    'https://nhymadutuhpjgkiurify.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM'
  )

  var editQuoteId = null
  var editQuoteData = null

  // ════════════════════════════════════════════
  // AUTH CHECK
  // ════════════════════════════════════════════
  async function checkAdminAuth() {
    try {
      var result = await supabaseClient.auth.getSession()

      if (!result.data.session) {
        await new Promise(function(r) { setTimeout(r, 500) })
        result = await supabaseClient.auth.getSession()
      }

      if (!result.data.session) {
        var refreshed = await supabaseClient.auth.refreshSession()
        if (!refreshed.data.session) {
          window.location.href = 'login.html'
          return false
        }
        result = refreshed
      }

      var userId = result.data.session.user.id

      var profileResult = await supabaseClient
        .from('profiles')
        .select('role')
        .eq('id', userId)
        .single()

      if (profileResult.error || !profileResult.data || profileResult.data.role !== 'admin') {
        window.location.href = '../app/index.html'
        return false
      }

      return true

    } catch(e) {
      window.location.href = 'login.html'
      return false
    }
  }

  // ════════════════════════════════════════════
  // LOAD QUOTE
  // ════════════════════════════════════════════
  async function loadQuote() {
    // Get quote ID from sessionStorage
    editQuoteId = sessionStorage.getItem('gstw_admin_edit_quote')
    sessionStorage.removeItem('gstw_admin_edit_quote')

    if (!editQuoteId) {
      document.getElementById('loadingState').classList.add('hidden')
      document.getElementById('errorState').classList.remove('hidden')
      return
    }

    // Load from database
    var result = await supabaseClient
      .from('quotes')
      .select('*')
      .eq('id', editQuoteId)
      .single()

    if (result.error || !result.data) {
      document.getElementById('loadingState').classList.add('hidden')
      document.getElementById('errorState').classList.remove('hidden')
      return
    }

    editQuoteData = result.data

    // Fill the form
    document.getElementById('editText').value     = editQuoteData.text || ''
    document.getElementById('editSource').value   = editQuoteData.source || ''
    document.getElementById('editContext').value  = editQuoteData.context || ''
    document.getElementById('editCategory').value = editQuoteData.category || 'Faith'
    document.getElementById('editStatus').value   = editQuoteData.status || 'draft'

    // Show current quote preview
    document.getElementById('currentQuotePreview').textContent = '"' + editQuoteData.text + '"'
    document.getElementById('currentSourcePreview').textContent = '— ' + editQuoteData.source

    // Handle schedule section
    if (editQuoteData.status === 'scheduled' && editQuoteData.scheduled_for) {
      document.getElementById('scheduleSection').classList.remove('hidden')
      try {
        var utcDate = new Date(editQuoteData.scheduled_for)
        var aestDate = new Date(utcDate.getTime() + (10 * 60 * 60 * 1000))
        document.getElementById('editDate').value = aestDate.toISOString().split('T')[0]
        document.getElementById('editTime').value =
          String(aestDate.getUTCHours()).padStart(2, '0') + ':' +
          String(aestDate.getUTCMinutes()).padStart(2, '0')
      } catch(e) {}
    }

    // Toggle schedule on status change
    document.getElementById('editStatus').addEventListener('change', function() {
      document.getElementById('scheduleSection').classList.toggle('hidden', this.value !== 'scheduled')
    })

    // Update counters
    updateCharCount()
    updateContextCount()

    // Show form, hide loading
    document.getElementById('loadingState').classList.add('hidden')
    document.getElementById('editForm').classList.remove('hidden')
  }

  // ════════════════════════════════════════════
  // SAVE QUOTE
  // ════════════════════════════════════════════
  async function saveQuote() {
    var text     = document.getElementById('editText').value.trim()
    var source   = document.getElementById('editSource').value.trim()
    var context  = document.getElementById('editContext').value.trim()
    var category = document.getElementById('editCategory').value
    var status   = document.getElementById('editStatus').value
    var btn      = document.getElementById('saveBtn')
    var icon     = document.getElementById('saveIcon')
    var label    = document.getElementById('saveLabel')

    if (!text) { showToast('Please enter the quote text'); return }
    if (!source) { showToast('Please enter the source'); return }

    // Loading state
    icon.textContent = 'progress_activity'
    icon.classList.add('spin')
    label.textContent = 'Saving...'
    btn.disabled = true

    var updateData = {
      text: text,
      source: source,
      context: context || null,
      category: category,
      status: status
    }

    // Handle publish date
    if (status === 'live') {
      updateData.published_at = editQuoteData.published_at || new Date().toISOString()
      updateData.scheduled_for = null
    } else if (status === 'scheduled') {
      var dateStr = document.getElementById('editDate').value
      var timeStr = document.getElementById('editTime').value || '05:30'
      if (dateStr) {
        var parts = dateStr.split('-')
        var timeParts = timeStr.split(':')
        var utcHours = parseInt(timeParts[0]) - 10
        updateData.scheduled_for = new Date(
          Date.UTC(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]), utcHours, parseInt(timeParts[1]), 0)
        ).toISOString()
      }
      updateData.published_at = null
    } else {
      updateData.published_at = null
      updateData.scheduled_for = null
    }

    var result = await supabaseClient
      .from('quotes')
      .update(updateData)
      .eq('id', editQuoteId)

    icon.classList.remove('spin')
    btn.disabled = false

    if (result.error) {
      icon.textContent = 'save'
      label.textContent = 'Save Changes'
      showToast('Error: ' + result.error.message)
      return
    }

    // Success
    document.getElementById('editForm').classList.add('hidden')
    document.getElementById('successState').classList.remove('hidden')
  }

  // ════════════════════════════════════════════
  // COUNTERS
  // ════════════════════════════════════════════
  function updateCharCount() {
    var len = document.getElementById('editText').value.length
    var el = document.getElementById('charCount')
    el.textContent = len + ' / 280'
    el.className = 'text-xs ' + (len > 250 ? 'text-action font-bold' : 'text-text-light')
  }

  function updateContextCount() {
    var len = document.getElementById('editContext').value.length
    var el = document.getElementById('contextCount')
    el.textContent = len + ' / 500'
    el.className = 'text-xs ' + (len > 450 ? 'text-action font-bold' : 'text-text-light')
  }

  // ════════════════════════════════════════════
  // NAVIGATION
  // ════════════════════════════════════════════
  function goBack() {
    window.location.href = 'manage-quotes.html'
  }

  // ════════════════════════════════════════════
  // TOAST
  // ════════════════════════════════════════════
  var toastTimer
  function showToast(msg) {
    var toast = document.getElementById('toast')
    var toastMsg = document.getElementById('toastMsg')
    if (!toast || !toastMsg) return
    toastMsg.textContent = msg
    toast.classList.remove('hidden')
    toast.classList.add('flex')
    clearTimeout(toastTimer)
    toastTimer = setTimeout(function() {
      toast.classList.add('hidden')
      toast.classList.remove('flex')
    }, 3000)
  }

  // ════════════════════════════════════════════
  // INIT
  // ════════════════════════════════════════════
  async function init() {
    var isAdmin = await checkAdminAuth()
    if (!isAdmin) return
    await loadQuote()
  }

  init()

</script>
</body>
</html>
