<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — GSTW</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'surface':'#fbf9f4','surface-cl':'#ffffff','surface-clow':'#f5f4ed',
            'surface-c':'#efeee7','surface-chigh':'#e9e8e1',
            'on-surface':'#31332e','on-surface-variant':'#5e6059',
            'inverse-surface':'#0e0e0c','inverse-on-surface':'#9e9d99',
            'outline':'#7a7b75','outline-variant':'#b2b2ab',
            'primary':'#3d6285','on-primary':'#f7f9ff',
            'primary-container':'#b0d5fe','on-primary-container':'#234a6c',
            'secondary':'#41637c','on-secondary':'#f6f9ff',
            'secondary-container':'#cae6ff',
            'tertiary':'#ad332b','on-tertiary':'#fff7f6',
            'primary-dim':'#305678','secondary-dim':'#355670','tertiary-dim':'#9d2621',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
          },
          boxShadow:{
            'ambient':'0 20px 40px rgba(49,51,46,0.05)',
            'float':'0 20px 40px rgba(49,51,46,0.08)',
          },
        },
      },
    }
  </script>

  <style>
    body{
      font-family:'Manrope',sans-serif;
      background:#0e0e0c;
      color:#f7f9ff;
      -webkit-tap-highlight-color:transparent;
      min-height:100dvh;
      letter-spacing:-0.005em;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-0.02em}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;line-height:1}
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .signature-gradient{background:linear-gradient(135deg,#3d6285,#6b9bc3)}

    /* Ambient radial glow */
    body::before{
      content:'';
      position:fixed;inset:0;
      background:radial-gradient(ellipse at top,rgba(61,98,133,0.15) 0%,transparent 50%);
      pointer-events:none;
      z-index:0;
    }

    /* Auth input */
    .auth-input{
      background:rgba(255,255,255,0.05);
      color:#f7f9ff;
      border:1px solid transparent;
      transition:all 0.2s ease;
    }
    .auth-input:focus{
      background:rgba(255,255,255,0.08);
      border-color:rgba(176,213,254,0.4);
      outline:none;
    }
    .auth-input::placeholder{color:rgba(247,249,255,0.25)}

    .pass-toggle{cursor:pointer;color:rgba(247,249,255,0.35);transition:color 0.15s}
    .pass-toggle:hover{color:rgba(247,249,255,0.8)}

    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin 1s linear infinite;display:inline-block}

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }
    .fade-up{animation:fadeUp 0.6s ease-out both}
    .fade-up-2{animation:fadeUp 0.6s ease-out 0.15s both}
  </style>
</head>

<body class="flex items-center justify-center">

<div class="relative z-10 w-full max-w-[420px] mx-auto px-6 py-12 flex flex-col min-h-[100dvh] justify-center">

  <!-- Logo -->
  <div class="flex flex-col items-center mb-10 fade-up">
    <div class="w-16 h-16 rounded-2xl signature-gradient flex items-center justify-center shadow-float mb-4">
      <span class="material-symbols-outlined text-on-primary text-[28px] filled">shield_person</span>
    </div>
    <h1 class="font-headline font-bold text-white text-center" style="font-size:24px;line-height:32px;">Admin Access</h1>
    <p class="font-body text-white/50 text-center mt-1" style="font-size:13px;">Sign in to manage the platform</p>
  </div>

  <!-- Login Card -->
  <div class="fade-up-2 bg-white/[0.04] rounded-2xl p-7 backdrop-blur-sm">

    <!-- Error Message -->
    <div id="loginError" class="hidden bg-tertiary/15 rounded-xl p-3.5 flex items-center gap-3 mb-5">
      <span class="material-symbols-outlined text-tertiary flex-shrink-0" style="font-size:18px;">error</span>
      <p id="loginErrorMsg" class="font-body font-semibold text-tertiary" style="font-size:12px;">Invalid credentials</p>
    </div>

    <form onsubmit="handleLogin(event)" class="space-y-4">

      <!-- Email -->
      <div>
        <label class="font-body text-white/50 block mb-2" style="font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;">
          Email Address
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/30" style="font-size:18px;">mail</span>
          <input id="adminEmail" type="email" required autocomplete="email"
            placeholder="admin@example.com"
            class="auth-input w-full rounded-xl pl-11 pr-4 py-3.5 font-body"
            style="font-size:14px;">
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="font-body text-white/50 block mb-2" style="font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;">
          Password
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/30" style="font-size:18px;">lock</span>
          <input id="adminPassword" type="password" required autocomplete="current-password"
            placeholder="••••••••"
            class="auth-input w-full rounded-xl pl-11 pr-11 py-3.5 font-body"
            style="font-size:14px;">
          <button type="button" onclick="togglePassword()" class="pass-toggle absolute right-4 top-1/2 -translate-y-1/2">
            <span id="passIcon" class="material-symbols-outlined" style="font-size:18px;">visibility_off</span>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" id="loginBtn"
        class="w-full py-3.5 signature-gradient text-on-primary font-headline font-bold rounded-xl
        active:scale-[0.98] transition-transform
        flex items-center justify-center gap-2 mt-2"
        style="font-size:15px;">
        <span id="loginBtnIcon" class="material-symbols-outlined" style="font-size:20px;">login</span>
        <span id="loginBtnLabel">Sign In</span>
      </button>

    </form>

  </div>

  <!-- Back link -->
  <div class="text-center mt-6 fade-up-2">
    <a href="../index.html"
      class="text-white/40 font-body hover:text-white/70 transition-colors inline-flex items-center gap-1"
      style="font-size:12px;">
      <span class="material-symbols-outlined" style="font-size:14px;">arrow_back</span>
      Return to main site
    </a>
  </div>

  <!-- Version -->
  <p class="text-center text-white/20 font-body mt-4" style="font-size:10px;">GSTW Admin v1.0</p>

</div>

<script>

var supabaseClient = supabase.createClient(
  'https://nhymadutuhpjgkiurify.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM'
)

// ════════════════════════════════════════════
// CHECK EXISTING SESSION
// ════════════════════════════════════════════
async function checkExistingSession() {
  try {
    var result = await supabaseClient.auth.getSession()
    if (!result.data || !result.data.session) return

    var profileResult = await supabaseClient
      .from('profiles')
      .select('role')
      .eq('id', result.data.session.user.id)
      .single()

    if (profileResult.data && profileResult.data.role === 'admin') {
      window.location.href = 'index.html'
    }
  } catch(e) {
    console.error('Session check error:', e)
  }
}

checkExistingSession()

// ════════════════════════════════════════════
// LOGIN HANDLER
// ════════════════════════════════════════════
async function handleLogin(e) {
  e.preventDefault()

  var email = document.getElementById('adminEmail').value.trim()
  var password = document.getElementById('adminPassword').value
  var btn = document.getElementById('loginBtn')
  var icon = document.getElementById('loginBtnIcon')
  var label = document.getElementById('loginBtnLabel')
  var errorEl = document.getElementById('loginError')

  errorEl.classList.add('hidden')

  if (!email || !password) {
    showError('Please enter your email and password')
    return
  }

  // Loading state
  icon.classList.add('spin')
  icon.textContent = 'progress_activity'
  label.textContent = 'Signing in...'
  btn.disabled = true

  try {
    // Sign in
    var authResult = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    })

    if (authResult.error) {
      showError('Invalid email or password')
      resetBtn()
      return
    }

    // Verify admin role
    var profileResult = await supabaseClient
      .from('profiles')
      .select('role, full_name')
      .eq('id', authResult.data.user.id)
      .single()

    if (profileResult.error || !profileResult.data) {
      await supabaseClient.auth.signOut()
      showError('Account not found. Contact support.')
      resetBtn()
      return
    }

    if (profileResult.data.role !== 'admin') {
      await supabaseClient.auth.signOut()
      showError('Access denied. This area is restricted to administrators.')
      resetBtn()
      return
    }

    // Success
    icon.classList.remove('spin')
    icon.textContent = 'check_circle'
    label.textContent = 'Access granted'
    btn.classList.remove('signature-gradient')
    btn.style.background = 'linear-gradient(135deg,#305678,#3d6285)'

    setTimeout(function() { window.location.href = 'index.html' }, 700)

  } catch(err) {
    console.error('Login error:', err)
    showError('An error occurred. Please try again.')
    resetBtn()
  }
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function showError(msg) {
  var errorEl = document.getElementById('loginError')
  document.getElementById('loginErrorMsg').textContent = msg
  errorEl.classList.remove('hidden')
}

function resetBtn() {
  var icon = document.getElementById('loginBtnIcon')
  var label = document.getElementById('loginBtnLabel')
  var btn = document.getElementById('loginBtn')
  icon.classList.remove('spin')
  icon.textContent = 'login'
  label.textContent = 'Sign In'
  btn.disabled = false
}

function togglePassword() {
  var input = document.getElementById('adminPassword')
  var icon = document.getElementById('passIcon')
  if (input.type === 'password') {
    input.type = 'text'
    icon.textContent = 'visibility'
  } else {
    input.type = 'password'
    icon.textContent = 'visibility_off'
  }
}

</script>
</body>
</html>
