<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — GSTW</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED','dark':'#16202A',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
          },
          boxShadow:{
            'tactical':'0 4px 20px rgba(30,64,96,0.25)',
            'action-glow':'0 4px 20px rgba(226,91,77,0.35)',
          },
        },
      },
    }
  </script>

  <style>
    body{
      font-family:'Manrope',sans-serif;
      background-color:#0F1E2E;
      -webkit-tap-highlight-color:transparent;
      min-height:100dvh;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}
    .material-symbols-outlined{
      font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      vertical-align:middle;
    }
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .tactical-gradient{background:linear-gradient(145deg,#152E45,#1E4060)}

    .auth-input{
      transition:all 0.2s ease;
      border:2px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.06);
      color:white;
    }
    .auth-input:focus{
      border-color:#D4A24C;
      box-shadow:0 0 0 3px rgba(212,162,76,0.15);
      outline:none;
    }
    .auth-input::placeholder{color:rgba(255,255,255,0.3)}

    .pass-toggle{cursor:pointer;color:rgba(255,255,255,0.4);transition:color 0.15s}
    .pass-toggle:hover{color:rgba(255,255,255,0.8)}

    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin 1s linear infinite;display:inline-block}

    /* Subtle grid background */
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(30,64,96,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,64,96,0.3) 1px, transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
      z-index:0;
    }
  </style>
</head>

<body class="text-white flex items-center justify-center">

<div class="relative z-10 w-full max-w-[420px] mx-auto px-6 py-12 flex flex-col min-h-[100dvh] justify-center">

  <!-- Logo -->
  <div class="flex flex-col items-center mb-10">
    <div class="w-16 h-16 rounded-2xl tactical-gradient border-2 border-gold/30 flex items-center justify-center shadow-tactical mb-4">
      <span class="font-headline font-extrabold text-gold text-lg tracking-wider">GSTW</span>
    </div>
    <h1 class="font-headline font-extrabold text-2xl text-white text-center">Command Center</h1>
    <p class="font-body text-sm text-white/50 text-center mt-1">Admin access only</p>
  </div>

  <!-- Login Card -->
  <div class="bg-white/[0.06] border border-white/10 rounded-2xl p-8 backdrop-blur-sm">

    <h2 class="font-headline font-bold text-lg text-white mb-6">Sign In</h2>

    <!-- Error Message -->
    <div id="loginError" class="hidden bg-action/20 border border-action/30 rounded-xl p-3.5 flex items-center gap-3 mb-5">
      <span class="material-symbols-outlined text-action text-[18px]">error</span>
      <p id="loginErrorMsg" class="text-xs text-action font-bold">Invalid credentials or insufficient permissions</p>
    </div>

    <form onsubmit="handleLogin(event)" class="space-y-4">

      <!-- Email -->
      <div>
        <label class="text-[10px] font-bold text-white/50 uppercase tracking-widest block mb-2">
          Email Address
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-[18px]">mail</span>
          <input id="adminEmail" type="email" required autocomplete="email"
            placeholder="admin@email.com"
            class="auth-input w-full rounded-xl pl-11 pr-4 py-3.5 font-body text-sm focus:outline-none">
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="text-[10px] font-bold text-white/50 uppercase tracking-widest block mb-2">
          Password
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-[18px]">lock</span>
          <input id="adminPassword" type="password" required autocomplete="current-password"
            placeholder="••••••••"
            class="auth-input w-full rounded-xl pl-11 pr-11 py-3.5 font-body text-sm focus:outline-none">
          <button type="button" onclick="togglePassword()" class="pass-toggle absolute right-4 top-1/2 -translate-y-1/2">
            <span id="passIcon" class="material-symbols-outlined text-[18px]">visibility_off</span>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" id="loginBtn"
        class="w-full py-4 tactical-gradient text-white font-headline font-bold text-base
        rounded-xl shadow-tactical hover:scale-[1.02] active:scale-[0.98] transition-transform
        flex items-center justify-center gap-2 mt-2">
        <span id="loginBtnIcon" class="material-symbols-outlined text-gold text-[20px] filled">
          security
        </span>
        <span id="loginBtnLabel">Access Command Center</span>
      </button>

    </form>

  </div>

  <!-- Back link -->
  <div class="text-center mt-6">
    <a href="../index.html"
      class="text-white/30 font-body text-xs hover:text-white/60 transition-colors flex items-center justify-center gap-1">
      <span class="material-symbols-outlined text-[14px]">arrow_back</span>
      Return to main site
    </a>
  </div>

  <!-- Version -->
  <p class="text-center text-white/20 text-[10px] font-body mt-4">GSTW Admin v1.0</p>

</div>

<script>

  var supabaseClient = supabase.createClient(
    'https://nhymadutuhpjgkiurify.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM'
  )

  // ════════════════════════════════════════════
  // CHECK IF ALREADY LOGGED IN AS ADMIN
  // ════════════════════════════════════════════
  async function checkExistingSession() {
    try {
      var result = await supabaseClient.auth.getSession()
      if (!result.data.session) return

      var profileResult = await supabaseClient
        .from('profiles')
        .select('role')
        .eq('id', result.data.session.user.id)
        .single()

      if (profileResult.data && profileResult.data.role === 'admin') {
        window.location.href = 'index.html'
      }
    } catch(e) {
      console.error('Session check error:', e)
    }
  }

  checkExistingSession()

  // ════════════════════════════════════════════
  // HANDLE LOGIN
  // ════════════════════════════════════════════
  async function handleLogin(e) {
    e.preventDefault()

    var email    = document.getElementById('adminEmail').value.trim()
    var password = document.getElementById('adminPassword').value
    var btn      = document.getElementById('loginBtn')
    var icon     = document.getElementById('loginBtnIcon')
    var label    = document.getElementById('loginBtnLabel')
    var errorEl  = document.getElementById('loginError')

    errorEl.classList.add('hidden')

    if (!email || !password) {
      showError('Please enter your email and password')
      return
    }

    // Loading state
    icon.classList.add('spin')
    icon.textContent = 'progress_activity'
    label.textContent = 'Authenticating...'
    btn.disabled = true

    try {
      // Step 1 — Sign in
      var authResult = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      })

      if (authResult.error) {
        showError('Invalid email or password')
        resetBtn()
        return
      }

      // Step 2 — Check admin role
      var profileResult = await supabaseClient
        .from('profiles')
        .select('role, full_name')
        .eq('id', authResult.data.user.id)
        .single()

      if (profileResult.error || !profileResult.data) {
        await supabaseClient.auth.signOut()
        showError('Account not found. Contact support.')
        resetBtn()
        return
      }

      if (profileResult.data.role !== 'admin') {
        // Not admin — sign them out and show error
        await supabaseClient.auth.signOut()
        showError('Access denied. This area is restricted to administrators.')
        resetBtn()
        return
      }

      // Step 3 — Admin confirmed — go to dashboard
      icon.classList.remove('spin')
      icon.textContent = 'check_circle'
      label.textContent = 'Access Granted!'

      setTimeout(function() {
        window.location.href = 'index.html'
      }, 600)

    } catch(err) {
      console.error('Login error:', err)
      showError('An error occurred. Please try again.')
      resetBtn()
    }
  }

  // ════════════════════════════════════════════
  // HELPERS
  // ════════════════════════════════════════════
  function showError(msg) {
    var errorEl = document.getElementById('loginError')
    document.getElementById('loginErrorMsg').textContent = msg
    errorEl.classList.remove('hidden')
  }

  function resetBtn() {
    var icon  = document.getElementById('loginBtnIcon')
    var label = document.getElementById('loginBtnLabel')
    var btn   = document.getElementById('loginBtn')
    icon.classList.remove('spin')
    icon.textContent = 'security'
    label.textContent = 'Access Command Center'
    btn.disabled = false
  }

  function togglePassword() {
    var input = document.getElementById('adminPassword')
    var icon  = document.getElementById('passIcon')
    if (input.type === 'password') {
      input.type = 'text'
      icon.textContent = 'visibility'
    } else {
      input.type = 'password'
      icon.textContent = 'visibility_off'
    }
  }

</script>
</body>
</html>
