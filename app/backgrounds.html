<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Choose Background — GSTW</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED',
            'dark':'#16202A',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{'headline':['Plus Jakarta Sans','sans-serif'],'body':['Manrope','sans-serif']},
          boxShadow:{
            'natural':'0 4px 16px rgba(26,32,42,0.06)','lifted':'0 8px 32px rgba(26,32,42,0.10)',
            'tactical':'0 4px 20px rgba(30,64,96,0.25)','card':'0 16px 40px -8px rgba(30,64,96,0.10)',
          },
        },
      },
    }
  </script>

  <style>
    body{font-family:'Manrope',sans-serif;background:#F0EDE6;-webkit-tap-highlight-color:transparent;min-height:100dvh}
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .tactical-gradient{background:linear-gradient(145deg,#152E45,#1E4060)}
    .scripture-mark{font-family:Georgia,'Times New Roman',serif}
    ::-webkit-scrollbar{display:none}
    body{-ms-overflow-style:none;scrollbar-width:none}
    .bg-option{transition:all 0.2s ease;cursor:pointer;position:relative;overflow:hidden;border:3px solid transparent;border-radius:16px}
    .bg-option:active{transform:scale(0.96)}
    .bg-option.selected{border-color:#1E4060;box-shadow:0 0 0 2px rgba(30,64,96,0.3)}
    .bg-option .check{display:none;position:absolute;top:8px;right:8px;z-index:10}
    .bg-option.selected .check{display:flex}
    .tab-btn{transition:all 0.2s ease}
    .tab-btn.active{background:white;color:#1E4060;font-weight:700;box-shadow:0 2px 8px rgba(30,64,96,0.1)}
    .color-option{width:48px;height:48px;border-radius:12px;cursor:pointer;transition:all 0.15s;border:3px solid transparent;flex-shrink:0}
    .color-option:active{transform:scale(0.9)}
    .color-option.selected{border-color:#1E4060;box-shadow:0 0 0 2px rgba(30,64,96,0.3)}
    .pb-safe{padding-bottom:env(safe-area-inset-bottom,20px)}
  </style>
</head>

<script>
  // ---- SUPABASE (global) ----
  var { createClient } = supabase
  var db = createClient('https://nhymadutuhpjgkiurify.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM')

  // ---- STATE (global) ----
  var selectedBgType = 'image'
  var selectedBgValue = 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80'

  // ---- INIT ----
  async function init() {
    var sessionResult = await db.auth.getSession()
    if (!sessionResult.data.session) { window.location.href = 'login.html'; return }

    var quoteEl = document.getElementById('previewQuote')
    var refEl = document.getElementById('previewRef')

    var result = await db.from('quotes').select('*').eq('status', 'live').order('published_at', { ascending: false }).limit(1)

    if (result.data && result.data.length > 0) {
      quoteEl.textContent = result.data[0].text
      refEl.textContent = '— ' + result.data[0].source.toUpperCase()
    } else {
      quoteEl.textContent = 'The Word is with you today.'
      refEl.textContent = '— GSTW'
    }

    quoteEl.style.opacity = '1'
    refEl.style.opacity = '1'

    if (isDesktop()) {
      var w = document.getElementById('desktopWarning')
      if (w) w.classList.remove('hidden')
    }
  }

  init()

  // ---- TABS ----
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active') })
    btn.classList.add('active')
    document.getElementById('tabCamera').classList.add('hidden')
    document.getElementById('tabGallery').classList.add('hidden')
    document.getElementById('tabBackgrounds').classList.add('hidden')
    document.getElementById('tabColors').classList.add('hidden')
    if (tab === 'camera') document.getElementById('tabCamera').classList.remove('hidden')
    if (tab === 'gallery') document.getElementById('tabGallery').classList.remove('hidden')
    if (tab === 'backgrounds') document.getElementById('tabBackgrounds').classList.remove('hidden')
    if (tab === 'colors') document.getElementById('tabColors').classList.remove('hidden')
  }

  // ---- SELECT PRESET ----
  function selectPreset(el, url) {
    document.querySelectorAll('.bg-option').forEach(function(o) { o.classList.remove('selected') })
    document.querySelectorAll('.color-option').forEach(function(o) { o.classList.remove('selected') })
    el.classList.add('selected')
    selectedBgType = 'image'
    selectedBgValue = url
    var bg = document.getElementById('previewBg')
    bg.style.backgroundImage = "url('" + url + "')"
    bg.style.backgroundSize = 'cover'
    bg.style.backgroundPosition = 'center'
    document.getElementById('previewOverlay').style.background = 'rgba(0,0,0,0.3)'
    // Reset text color for image backgrounds
    document.getElementById('previewQuote').style.color = 'white'
    document.getElementById('previewRef').style.color = 'rgba(255,255,255,0.9)'
  }

  // ---- SELECT COLOR ----
  function selectColor(el, color) {
    document.querySelectorAll('.bg-option').forEach(function(o) { o.classList.remove('selected') })
    document.querySelectorAll('.color-option').forEach(function(o) { o.classList.remove('selected') })
    el.classList.add('selected')
    selectedBgType = 'color'
    selectedBgValue = color
    var bg = document.getElementById('previewBg')
    bg.style.backgroundImage = 'none'
    bg.style.background = color
    var isLight = color === '#F7F4ED' || color === '#FFFFFF'
    document.getElementById('previewOverlay').style.background = isLight ? 'rgba(0,0,0,0.05)' : 'rgba(0,0,0,0.1)'
    document.getElementById('previewQuote').style.color = isLight ? '#1A1A1A' : 'white'
    document.getElementById('previewRef').style.color = isLight ? '#1E4060' : 'rgba(255,255,255,0.9)'
  }

  // ---- SELECT GRADIENT ----
  function selectGradient(el, gradient) {
    document.querySelectorAll('.bg-option').forEach(function(o) { o.classList.remove('selected') })
    document.querySelectorAll('.color-option').forEach(function(o) { o.classList.remove('selected') })
    el.classList.add('selected')
    selectedBgType = 'gradient'
    selectedBgValue = gradient
    var bg = document.getElementById('previewBg')
    bg.style.backgroundImage = 'none'
    bg.style.background = gradient
    document.getElementById('previewOverlay').style.background = 'rgba(0,0,0,0.1)'
    document.getElementById('previewQuote').style.color = 'white'
    document.getElementById('previewRef').style.color = 'rgba(255,255,255,0.9)'
  }

  // ---- CAMERA / GALLERY ----
  function isDesktop() { return !/Android|iPhone|iPad|iPod/i.test(navigator.userAgent) }

  function openSelfie() {
    if (isDesktop()) { showToast('Camera not available on desktop'); return }
    document.getElementById('selfieInput').click()
  }

  function openCamera() {
    if (isDesktop()) { showToast('Camera not available on desktop'); return }
    document.getElementById('cameraInput').click()
  }

  function openGallery() {
    document.getElementById('galleryInput').click()
  }

  function handleFileSelect(input) {
    var file = input.files[0]
    if (!file) return
    var reader = new FileReader()
    reader.onload = function(e) {
      selectedBgType = 'image'
      selectedBgValue = e.target.result
      var bg = document.getElementById('previewBg')
      bg.style.backgroundImage = "url('" + e.target.result + "')"
      bg.style.backgroundSize = 'cover'
      bg.style.backgroundPosition = 'center'
      document.getElementById('previewOverlay').style.background = 'rgba(0,0,0,0.3)'
      document.querySelectorAll('.bg-option').forEach(function(o) { o.classList.remove('selected') })
      document.querySelectorAll('.color-option').forEach(function(o) { o.classList.remove('selected') })
      document.getElementById('previewQuote').style.color = 'white'
      document.getElementById('previewRef').style.color = 'rgba(255,255,255,0.9)'
      showToast('Photo selected!')
    }
    reader.readAsDataURL(file)
    input.value = ''
  }

  // ---- NAVIGATION ----
  function goHome() {
    window.location.href = 'index.html'
  }

  function goToEditor() {
    sessionStorage.setItem('gstw_bg_type', selectedBgType)
    sessionStorage.setItem('gstw_bg_value', selectedBgValue)
    window.location.href = 'editor.html'
  }

  // ---- TOAST ----
  function showToast(msg) {
    var existing = document.getElementById('bgToast')
    if (existing) existing.remove()
    var t = document.createElement('div')
    t.id = 'bgToast'
    t.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-[200] bg-dark/90 backdrop-blur-md text-white text-xs font-bold px-5 py-3 rounded-full shadow-lifted whitespace-nowrap flex items-center gap-2'
    t.innerHTML = '<span class="material-symbols-outlined text-gold text-[14px]" style="font-variation-settings:\'FILL\' 1">info</span> ' + msg
    document.body.appendChild(t)
    setTimeout(function() { if (t.parentNode) t.remove() }, 2200)
  }
</script>

</body>
