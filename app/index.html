<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GSTW">
  <meta name="theme-color" content="#16202A">
  <title>GSTW</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED','cream-warm':'#FBF8F2',
            'dark':'#16202A','dark-soft':'#1F2A35',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
            'quote':['Lora','serif'],
          },
          boxShadow:{
            'natural':'0 4px 16px rgba(26,32,42,0.06)',
            'lifted':'0 8px 32px rgba(26,32,42,0.10)',
            'tactical':'0 4px 20px rgba(30,64,96,0.25)',
            'action-glow':'0 4px 20px rgba(226,91,77,0.35)',
          },
        },
      },
    }
  </script>

  <style>
    html, body {
      background-color: #16202A;
    }
    body{
      font-family:'Manrope',sans-serif;
      -webkit-tap-highlight-color:transparent;
      -webkit-font-smoothing:antialiased;
      min-height:100dvh;
      color:#fff;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}
    .font-quote{font-family:'Lora',serif}
    .material-symbols-outlined{
      font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
    }
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}

    ::-webkit-scrollbar{display:none}
    body{-ms-overflow-style:none;scrollbar-width:none}

    /* ─── Background image layer ─── */
    .hero-bg{
      position:fixed;
      inset:0;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      z-index:0;
      opacity:0;
      transition:opacity 0.8s ease;
    }
    .hero-bg.loaded{opacity:1}

    /* ─── Dark gradient overlay for text readability ─── */
    .hero-overlay{
      position:fixed;
      inset:0;
      background:
        linear-gradient(180deg,
          rgba(22,32,42,0.55) 0%,
          rgba(22,32,42,0.35) 30%,
          rgba(22,32,42,0.75) 75%,
          rgba(22,32,42,0.95) 100%
        );
      z-index:1;
      pointer-events:none;
    }

    /* Content sits above overlay */
    .content-layer{
      position:relative;
      z-index:2;
    }

    /* CTA pulse */
    @keyframes tactical-pulse{
      0%,100%{box-shadow:0 4px 20px rgba(212,162,76,0.30)}
      50%{box-shadow:0 8px 40px rgba(212,162,76,0.55)}
    }
    .cta-pulse{animation:tactical-pulse 2.5s ease-in-out infinite}

    /* Fade in */
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(16px)}
      to{opacity:1;transform:translateY(0)}
    }
    .fade-in{animation:fadeUp 0.8s ease-out both}
    .fade-in-2{animation:fadeUp 0.8s ease-out 0.2s both}
    .fade-in-3{animation:fadeUp 0.8s ease-out 0.4s both}

    /* Text shadows for readability over images */
    .text-shadow-soft{
      text-shadow:0 2px 12px rgba(0,0,0,0.6);
    }
    .text-shadow-strong{
      text-shadow:0 4px 20px rgba(0,0,0,0.8), 0 2px 6px rgba(0,0,0,0.5);
    }

    /* Context modal */
    .modal-inner{
      max-height:85dvh;
      overflow-y:auto;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }
    .modal-inner::-webkit-scrollbar{display:none}

    .pb-safe{padding-bottom:env(safe-area-inset-bottom,16px)}
    .pt-safe{padding-top:env(safe-area-inset-top,0px)}

    .app-container{
      max-width:430px;
      margin:0 auto;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      position:relative;
    }
  </style>
</head>

<body>

<!-- ═══════════════════════════════════════════ -->
<!-- BACKGROUND LAYERS -->
<!-- ═══════════════════════════════════════════ -->
<div id="heroBg" class="hero-bg"></div>
<div class="hero-overlay"></div>

<div class="app-container content-layer">

  <!-- ═══════════════════════════════════════════ -->
  <!-- TOP BAR -->
  <!-- ═══════════════════════════════════════════ -->
  <header class="fixed top-0 left-0 right-0 z-40 pt-safe">
    <div class="flex items-center px-6 py-3 max-w-[430px] mx-auto">
      <img
        src="/images/logo.png"
        alt="GSTW"
        class="w-10 h-10 object-contain drop-shadow-lg"
      >
    </div>
  </header>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MAIN -->
  <!-- ═══════════════════════════════════════════ -->
  <main class="flex-1 px-8 pt-20 pb-32 flex flex-col justify-center">

    <!-- ─────────────────────────────────────── -->
    <!-- TODAY'S WORD -->
    <!-- ─────────────────────────────────────── -->
    <section class="flex-1 flex flex-col justify-center fade-in">

      <!-- Label -->
      <div class="flex items-center gap-3 mb-8">
        <div class="w-1.5 h-1.5 bg-gold rounded-full"></div>
        <span class="font-body text-[10px] text-white/60 tracking-[0.2em] uppercase font-bold text-shadow-soft">
          Today's Word
        </span>
        <div class="flex-1 h-px bg-white/15"></div>
      </div>

      <!-- Quote — no box, floats on background -->
      <div id="quoteBlock" class="opacity-0" style="transition:opacity 0.8s ease">

        <!-- Decorative mark -->
        <span class="font-quote text-gold/60 text-[72px] leading-none block -mb-4 -ml-1 text-shadow-soft">"</span>

        <!-- Quote text -->
        <p id="quoteText"
          class="font-quote text-[26px] text-white leading-[1.4] mb-6 text-shadow-strong font-medium">
        </p>

        <!-- Source -->
        <div class="flex items-center gap-3">
          <div class="w-10 h-px bg-gold/60"></div>
          <p id="quoteRef"
            class="font-headline font-bold text-xs text-gold tracking-[0.15em] uppercase text-shadow-soft"></p>
        </div>

      </div>

    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- CTA -->
    <!-- ─────────────────────────────────────── -->
    <section class="mt-8 flex flex-col items-center gap-4 fade-in-3">

      <button onclick="goToShare()"
        class="cta-pulse w-full h-14 rounded-2xl bg-gold text-dark font-headline
        font-bold text-base active:scale-[0.97] transition-transform
        flex items-center justify-center">
        Spread The Word
      </button>

      <div class="flex items-center gap-4">
        <button onclick="notToday()"
          class="text-white/60 font-body font-medium text-xs active:opacity-60 transition-opacity text-shadow-soft">
          Just reflecting today
        </button>

        <span class="text-white/25">·</span>

        <button id="contextBtn" onclick="openContext()"
          class="hidden text-gold font-body font-medium text-xs active:opacity-60
          transition-opacity items-center gap-1 text-shadow-soft">
          <span class="material-symbols-outlined text-[14px] align-middle">menu_book</span>
          Read the context
        </button>
      </div>

    </section>

  </main>

  <!-- ═══════════════════════════════════════════ -->
  <!-- BOTTOM NAVIGATION -->
  <!-- ═══════════════════════════════════════════ -->
  <nav class="fixed bottom-0 left-0 w-full bg-dark/95 backdrop-blur-xl border-t border-white/8 z-40"
    style="padding-bottom:max(16px,env(safe-area-inset-bottom))">
    <div class="flex justify-around items-center px-2 pt-2 pb-1 max-w-[430px] mx-auto">
      <a href="index.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-gold text-[22px] filled">home</span>
        <span class="text-[10px] font-bold text-gold">Home</span>
      </a>
      <a href="library.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-white/40 text-[22px]">auto_stories</span>
        <span class="text-[10px] font-medium text-white/40">Library</span>
      </a>
      <a href="cause.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-white/40 text-[22px]">volunteer_activism</span>
        <span class="text-[10px] font-medium text-white/40">Missions</span>
      </a>
      <a href="impact.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-white/40 text-[22px]">bar_chart</span>
        <span class="text-[10px] font-medium text-white/40">Impact</span>
      </a>
      <a href="profile.html"
        class="flex flex-col items-center gap-0.5 px-4 py-1.5 relative"
        aria-label="Profile and notifications">
        <span class="material-symbols-outlined text-white/40 text-[22px]">person</span>
        <span id="homeNotifDot"
          class="hidden absolute top-0 right-2 w-2.5 h-2.5 bg-action rounded-full
          border-2 border-dark">
        </span>
        <span class="text-[10px] font-medium text-white/40">Profile</span>
      </a>
    </div>
  </nav>

</div>

<!-- ═══════════════════════════════════════════ -->
<!-- CONTEXT MODAL -->
<!-- ═══════════════════════════════════════════ -->
<div id="contextModal"
  class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] flex items-end justify-center"
  onclick="closeContext()">
  <div class="w-full max-w-[430px] bg-dark-soft rounded-t-3xl modal-inner"
    onclick="event.stopPropagation()">
    <div class="p-6 space-y-5">
      <div class="w-10 h-1 bg-white/15 rounded-full mx-auto"></div>
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gold/15 flex items-center justify-center flex-shrink-0">
          <span class="material-symbols-outlined text-gold text-[20px] filled">menu_book</span>
        </div>
        <div>
          <h3 class="font-headline font-bold text-base text-white">Understanding the Context</h3>
          <p id="contextRef" class="text-xs text-white/40 font-body"></p>
        </div>
      </div>
      <div class="bg-white/5 rounded-xl p-4 border border-white/8">
        <p id="contextQuote" class="font-quote text-sm text-white/80 italic leading-relaxed"></p>
      </div>
      <div>
        <p class="text-[10px] font-bold text-gold/60 uppercase tracking-widest mb-2">Context</p>
        <p id="contextText" class="font-body text-sm text-white/70 leading-relaxed"></p>
      </div>
      <button onclick="closeContext()"
        class="w-full py-3 bg-white/8 text-white/60 font-bold text-sm rounded-xl
        border border-white/10 active:scale-[0.98] transition-transform">
        Close
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- SCRIPT -->
<!-- ═══════════════════════════════════════════ -->
<script>

  var supabaseClient = supabase.createClient(
    'https://nhymadutuhpjgkiurify.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM'
  )

  // ════════════════════════════════════════════
  // CONSTANTS
  // ════════════════════════════════════════════
  var DEFAULT_HERO = '/images/default-hero.jpg'

  // ════════════════════════════════════════════
  // STATE
  // ════════════════════════════════════════════
  var currentQuoteContext = null

  // ════════════════════════════════════════════
  // AUTH
  // ════════════════════════════════════════════
  async function checkAuth() {
    var result = await supabaseClient.auth.getSession()
    if (!result.data.session) {
      window.location.href = 'login.html'
      return null
    }
    return result.data.session.user
  }

  // ════════════════════════════════════════════
  // BACKGROUND LOADER
  // ════════════════════════════════════════════
  function setHeroBackground(url) {
    var bg = document.getElementById('heroBg')
    if (!bg) return
    var img = new Image()
    img.onload = function() {
      bg.style.backgroundImage = 'url("' + url + '")'
      bg.classList.add('loaded')
    }
    img.onerror = function() {
      // Fall back to default
      bg.style.backgroundImage = 'url("' + DEFAULT_HERO + '")'
      bg.classList.add('loaded')
    }
    img.src = url
  }

  // ════════════════════════════════════════════
  // LOAD TODAY'S QUOTE
  // ════════════════════════════════════════════
  async function loadTodaysQuote() {
    try {
      var result = await supabaseClient
        .from('quotes')
        .select('*')
        .eq('status', 'live')
        .order('published_at', { ascending: false })
        .limit(1)

      var quoteEl = document.getElementById('quoteText')
      var refEl   = document.getElementById('quoteRef')
      var block   = document.getElementById('quoteBlock')
      var ctxBtn  = document.getElementById('contextBtn')

      if (result.error || !result.data || result.data.length === 0) {
        quoteEl.textContent = 'The Word is with you today.'
        refEl.textContent   = 'GSTW'
        setHeroBackground(DEFAULT_HERO)
      } else {
        var quote = result.data[0]
        quoteEl.textContent   = quote.text
        refEl.textContent     = (quote.source || 'GSTW').toUpperCase()
        window.currentQuoteId = quote.id

        // Background image
        var bgUrl = quote.background_url && quote.background_url.trim()
          ? quote.background_url
          : DEFAULT_HERO
        setHeroBackground(bgUrl)

        // Context
        if (quote.context && quote.context.trim()) {
          currentQuoteContext = {
            text: quote.text,
            source: quote.source,
            context: quote.context
          }
          if (ctxBtn) {
            ctxBtn.classList.remove('hidden')
            ctxBtn.classList.add('flex')
          }
        }
      }

      if (block) block.style.opacity = '1'

    } catch (err) {
      console.error('loadTodaysQuote failed:', err)
      document.getElementById('quoteText').textContent = 'The Word is with you today.'
      document.getElementById('quoteRef').textContent = 'GSTW'
      document.getElementById('quoteBlock').style.opacity = '1'
      setHeroBackground(DEFAULT_HERO)
    }
  }

  // ════════════════════════════════════════════
  // LOAD USER PROFILE (for suspension check + session data)
  // ════════════════════════════════════════════
  async function loadUserProfile(userId) {
    try {
      var result = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('id', userId)
        .single()

      if (result.error || !result.data) return

      var profile = result.data

      // Load payment link for suspension prompt
      var payLinkResult = await supabaseClient
        .from('site_settings')
        .select('value')
        .eq('id', 'stripe_payment_link')
        .single()

      if (payLinkResult.data && payLinkResult.data.value) {
        sessionStorage.setItem('gstw_payment_link', payLinkResult.data.value)
      }

      // Store default platform for later use
      if (profile.default_platform) {
        sessionStorage.setItem('gstw_default_platform', profile.default_platform)
      }

      // Suspension check
      if (profile.is_suspended) {
        showSubscribePrompt()
      }

    } catch (err) {
      console.error('loadUserProfile failed:', err)
    }
  }

  // ════════════════════════════════════════════
  // SUBSCRIPTION PROMPT (for suspended users)
  // ════════════════════════════════════════════
  function showSubscribePrompt() {
    if (document.getElementById('subscribePrompt')) return

    var payLink = sessionStorage.getItem('gstw_payment_link') || 'profile.html'
    var prompt = document.createElement('div')
    prompt.id = 'subscribePrompt'
    prompt.className = 'fixed inset-0 bg-black/80 z-[200] flex items-center justify-center px-6'
    prompt.innerHTML =
      '<div class="bg-card-bg rounded-2xl p-6 max-w-sm w-full text-center">'
      + '<div class="w-16 h-16 rounded-2xl bg-gold/15 flex items-center justify-center mx-auto mb-4">'
      +   '<span class="material-symbols-outlined text-gold text-[32px] filled">lock</span>'
      + '</div>'
      + '<h2 class="font-headline font-bold text-xl text-text-dark mb-2">Subscription Required</h2>'
      + '<p class="text-sm text-text-muted mb-5 leading-relaxed">Your account is paused. Subscribe to continue spreading the Word.</p>'
      + '<a href="' + payLink + '" '
      +   'class="block w-full py-3.5 bg-gold text-dark font-headline font-bold rounded-2xl mb-3 active:scale-[0.98] transition-transform">'
      +   'Subscribe — $3.99/month'
      + '</a>'
      + '<button onclick="document.getElementById(\'subscribePrompt\').remove()" '
      +   'class="text-text-muted font-bold text-sm">Maybe Later</button>'
      + '</div>'
    document.body.appendChild(prompt)
  }

  // ════════════════════════════════════════════
  // NOTIFICATION DOT (on profile icon)
  // ════════════════════════════════════════════
  async function updateHomeNotificationDot(userId) {
    try {
      var result = await supabaseClient
        .from('notifications')
        .select('id, type, target_user_id')
        .order('created_at', { ascending: false })
        .limit(50)

      var dot = document.getElementById('homeNotifDot')
      if (!dot) return

      if (result.error || !result.data) {
        dot.classList.add('hidden')
        return
      }

      var visible = result.data.filter(function(n) {
        return n.type === 'broadcast' || n.target_user_id === userId
      })

      var readIds = JSON.parse(localStorage.getItem('gstw_read_notifs') || '[]')

      var unread = visible.some(function(n) {
        return readIds.indexOf(n.id) === -1
      })

      dot.classList.toggle('hidden', !unread)
    } catch (err) {
      console.error('updateHomeNotificationDot failed:', err)
    }
  }

  // ════════════════════════════════════════════
  // CONTEXT MODAL
  // ════════════════════════════════════════════
  function openContext() {
    if (!currentQuoteContext) return
    document.getElementById('contextQuote').textContent = currentQuoteContext.text
    document.getElementById('contextRef').textContent = (currentQuoteContext.source || '').toUpperCase()
    document.getElementById('contextText').textContent = currentQuoteContext.context
    document.getElementById('contextModal').classList.remove('hidden')
    document.body.style.overflow = 'hidden'
  }

  function closeContext() {
    document.getElementById('contextModal').classList.add('hidden')
    document.body.style.overflow = ''
  }

  // ════════════════════════════════════════════
  // GO TO SHARE
  // ════════════════════════════════════════════
  function goToShare() {
    sessionStorage.removeItem('gstw_selected_quote_id')
    sessionStorage.removeItem('gstw_selected_quote_text')
    sessionStorage.removeItem('gstw_selected_quote_source')
    sessionStorage.removeItem('gstw_selected_quote_category')
    sessionStorage.removeItem('gstw_final_image')
    sessionStorage.removeItem('gstw_personal_msg')
    sessionStorage.removeItem('gstw_hashtags')
    sessionStorage.removeItem('gstw_full_caption')
    sessionStorage.removeItem('gstw_overlay_x')
    sessionStorage.removeItem('gstw_overlay_y')
    window.location.href = 'editor.html'
  }

  // ════════════════════════════════════════════
  // NOT TODAY
  // ════════════════════════════════════════════
  function notToday() {
    showToast('The Word is with you. Come back when ready.')
  }

  // ════════════════════════════════════════════
  // TOAST
  // ════════════════════════════════════════════
  function showToast(msg) {
    var existing = document.getElementById('homeToast')
    if (existing) existing.remove()
    var t = document.createElement('div')
    t.id = 'homeToast'
    t.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-[200] bg-black/60 backdrop-blur-md text-white text-xs font-bold px-5 py-3 rounded-full shadow-lifted whitespace-nowrap flex items-center gap-2 max-w-[90%] border border-white/15'
    t.innerHTML = '<span class="material-symbols-outlined text-gold text-[14px]" style="font-variation-settings:\'FILL\' 1">check_circle</span> ' + msg
    document.body.appendChild(t)
    setTimeout(function() { if (t.parentNode) t.remove() }, 2500)
  }

  // ════════════════════════════════════════════
  // INIT
  // ════════════════════════════════════════════
  window.addEventListener('DOMContentLoaded', async function() {

    // Start with default background immediately (before auth check)
    setHeroBackground(DEFAULT_HERO)

    var user = await checkAuth()
    if (!user) return

    // Onboarding check
    var profileCheck = await supabaseClient
      .from('profiles')
      .select('onboarding_complete')
      .eq('id', user.id)
      .single()

    if (!profileCheck.data || !profileCheck.data.onboarding_complete) {
      window.location.href = 'onboarding.html'
      return
    }

    // Run all data loads in parallel
    await Promise.all([
      loadTodaysQuote(),
      loadUserProfile(user.id),
      updateHomeNotificationDot(user.id)
    ])
  })

</script>
</body>
</html>
