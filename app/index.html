<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GSTW">
  <meta name="theme-color" content="#1E4060">
  <title>Go Spread The Word</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED','cream-warm':'#FBF8F2',
            'dark':'#16202A',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
          },
          boxShadow:{
            'natural':'0 4px 16px rgba(26,32,42,0.06)',
            'lifted':'0 8px 32px rgba(26,32,42,0.10)',
            'tactical':'0 4px 20px rgba(30,64,96,0.25)',
            'action-glow':'0 4px 20px rgba(226,91,77,0.35)',
            'card':'0 4px 32px rgba(30,64,96,0.08)',
          },
        },
      },
    }
  </script>

  <style>
    body{
      font-family:'Manrope',sans-serif;
      background-color:#F0EDE6;
      -webkit-tap-highlight-color:transparent;
      -webkit-font-smoothing:antialiased;
      min-height:100dvh;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}
    .material-symbols-outlined{
      font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
    }
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .tactical-gradient{background:linear-gradient(145deg,#152E45,#1E4060)}
    .scripture-mark{font-family:Georgia,'Times New Roman',serif}

    ::-webkit-scrollbar{display:none}
    body{-ms-overflow-style:none;scrollbar-width:none}

    /* Quote card */
    .quote-hero{
      background:white;
      box-shadow:0 8px 40px rgba(30,64,96,0.10);
      border-left:4px solid #D4A24C;
    }

    /* CTA pulse */
    @keyframes tactical-pulse{
      0%,100%{box-shadow:0 4px 20px rgba(30,64,96,0.25)}
      50%{box-shadow:0 8px 40px rgba(30,64,96,0.45)}
    }
    .cta-pulse{animation:tactical-pulse 2.5s ease-in-out infinite}

    /* Streak fire glow */
    @keyframes fireGlow{
      0%,100%{text-shadow:0 0 4px rgba(234,88,12,0.3)}
      50%{text-shadow:0 0 12px rgba(234,88,12,0.6)}
    }
    .fire-glow{animation:fireGlow 2s ease-in-out infinite}

    /* Level progress shine */
    @keyframes progressShine{
      0%{background-position:-200% 0}
      100%{background-position:200% 0}
    }
    .progress-shine{
      background:linear-gradient(90deg,#D4A24C 0%,#F7E4B8 50%,#D4A24C 100%);
      background-size:200% 100%;
      animation:progressShine 3s ease-in-out infinite;
    }

    /* Fade in */
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(16px)}
      to{opacity:1;transform:translateY(0)}
    }
    .fade-in{animation:fadeUp 0.5s ease-out both}
    .fade-in-2{animation:fadeUp 0.5s ease-out 0.1s both}
    .fade-in-3{animation:fadeUp 0.5s ease-out 0.2s both}
    .fade-in-4{animation:fadeUp 0.5s ease-out 0.3s both}

    /* Top bar hide on scroll */
    #topBar{transition:transform 0.3s ease}

    .pb-safe{padding-bottom:env(safe-area-inset-bottom,16px)}
    .pt-safe{padding-top:env(safe-area-inset-top,0px)}

    .app-container{
      max-width:430px;
      margin:0 auto;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
    }

    /* Community pulse dot */
    @keyframes communityPulse{
      0%,100%{opacity:0.4;transform:scale(1)}
      50%{opacity:1;transform:scale(1.3)}
    }
    .community-pulse{animation:communityPulse 2s ease-in-out infinite}
  </style>
</head>

<body class="text-text-dark">

<div class="app-container">

  <!-- ═══════════════════════════════════════════ -->
  <!-- TOP BAR — Minimal -->
  <!-- ═══════════════════════════════════════════ -->
  <header id="topBar"
    class="fixed top-0 left-0 right-0 z-50 bg-surface/85 backdrop-blur-xl border-b border-border-soft pt-safe">
    <div class="flex justify-between items-center px-6 py-3 max-w-[430px] mx-auto">
      <span class="font-headline font-extrabold text-primary text-lg tracking-tight">GSTW</span>
      <div class="flex items-center gap-3">
        <button class="w-10 h-10 flex items-center justify-center text-text-muted relative
          active:scale-90 transition-transform">
          <span class="material-symbols-outlined text-[22px]">notifications</span>
          <span class="absolute top-2 right-2 w-2 h-2 bg-action rounded-full"></span>
        </button>
        <div id="avatarBtn"
          class="w-10 h-10 rounded-full bg-primary border-2 border-gold/40 flex items-center
          justify-center overflow-hidden active:scale-95 transition-transform cursor-pointer"
          onclick="window.location.href='profile.html'">
          <span id="avatarInitials" class="font-headline font-bold text-white text-sm">?</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MAIN CONTENT -->
  <!-- ═══════════════════════════════════════════ -->
  <main class="flex-1 px-6 pt-20 pb-28 flex flex-col">

    <!-- ─────────────────────────────────────── -->
    <!-- GREETING + RANK -->
    <!-- ─────────────────────────────────────── -->
    <section class="mt-4 mb-6 fade-in">

      <!-- Greeting -->
      <div class="flex items-center justify-between mb-3">
        <div>
          <p id="greetingTime" class="font-body font-semibold text-sm text-primary mb-0.5"></p>
          <h2 id="greetingName"
            class="font-headline font-extrabold text-2xl text-text-dark leading-tight">
            Hi there
          </h2>
        </div>
        <!-- Streak badge -->
        <div id="streakBadge"
          class="flex items-center gap-1.5 bg-cream rounded-full px-3.5 py-2 border border-border-soft">
          <span class="text-lg fire-glow">🔥</span>
          <div class="text-right">
            <span id="streakNumber" class="font-headline font-extrabold text-lg text-text-dark leading-none block">0</span>
            <span class="text-[8px] uppercase tracking-widest text-text-light font-bold">day streak</span>
          </div>
        </div>
      </div>

      <!-- Rank Progress Bar -->
      <div class="bg-card-bg rounded-2xl p-4 border border-border-soft shadow-natural">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-gold text-[18px] filled">military_tech</span>
            <span id="rankTitle" class="font-headline font-bold text-sm text-text-dark">Level 1 — Recruit</span>
          </div>
          <span id="rankNextLabel" class="text-[10px] text-text-light font-bold"></span>
        </div>
        <div class="h-2.5 bg-surface rounded-full overflow-hidden">
          <div id="rankBar"
            class="h-full progress-shine rounded-full transition-all duration-1000"
            style="width:0%"></div>
        </div>
        <div class="flex justify-between mt-1.5">
          <span id="rankShareCount" class="text-[10px] text-text-muted font-bold">0 shares</span>
          <span id="rankRemaining" class="text-[10px] text-gold-dim font-bold"></span>
        </div>
      </div>

    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- TODAY'S WORD — The Hero -->
    <!-- ─────────────────────────────────────── -->
    <section class="flex-1 flex flex-col justify-center fade-in-2">

      <!-- Label -->
      <div class="flex items-center gap-2 mb-4">
        <div class="w-1.5 h-1.5 bg-gold rounded-full"></div>
        <span class="font-body text-[10px] text-text-light tracking-widest uppercase font-bold">
          Today's Word
        </span>
        <div class="flex-1 h-px bg-border-soft"></div>
      </div>

      <!-- Quote Card — The Hero Element -->
      <div id="quoteCard" class="quote-hero rounded-2xl p-6 opacity-0"
        style="transition:opacity 0.4s ease">

        <!-- Decorative mark -->
        <span class="scripture-mark text-gold/50 text-[56px] leading-none block -mb-4">"</span>

        <!-- Quote Text — Large and Bold -->
        <p id="quoteText"
          class="font-headline font-extrabold text-[22px] text-text-dark leading-[1.35] mb-4">
        </p>

        <!-- Source -->
        <div class="flex items-center gap-2">
          <div class="w-8 h-px bg-gold/40"></div>
          <p id="quoteRef"
            class="font-headline font-bold text-sm text-primary tracking-wider"></p>
        </div>

      </div>

    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- COMMUNITY PULSE -->
    <!-- ─────────────────────────────────────── -->
    <section class="mt-6 mb-2 fade-in-3">
      <div class="flex items-center justify-center gap-4">

        <!-- Warriors today -->
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-primary community-pulse"></div>
          <span id="communityToday" class="text-xs text-text-muted font-body">
            <span class="font-bold text-text-dark">—</span> warriors shared today
          </span>
        </div>

        <div class="w-px h-4 bg-border-soft"></div>

        <!-- Total shares -->
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-gold text-[14px] filled">public</span>
          <span id="communityTotal" class="text-xs text-text-muted font-body">
            <span class="font-bold text-text-dark">—</span> total shares
          </span>
        </div>

      </div>
    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- CTA — Single Tap -->
    <!-- ─────────────────────────────────────── -->
    <section class="mt-4 mb-2 flex flex-col items-center gap-4 fade-in-4">

      <!-- Main CTA -->
      <button onclick="goToShare()"
        class="cta-pulse tactical-gradient w-full h-14 rounded-2xl text-white font-headline
        font-bold text-base shadow-tactical active:scale-[0.97] transition-transform
        flex items-center justify-center gap-3">
        <span class="material-symbols-outlined text-gold text-[22px] filled">campaign</span>
        Spread The Word
      </button>

      <!-- Not Today -->
      <button onclick="notToday()"
        class="text-text-light font-body font-medium text-xs active:opacity-60 transition-opacity">
        Just reflecting today
      </button>

    </section>

  </main>

  <!-- ═══════════════════════════════════════════ -->
  <!-- BOTTOM NAVIGATION -->
  <!-- ═══════════════════════════════════════════ -->
  <nav class="fixed bottom-0 left-0 w-full bg-card-bg/90 backdrop-blur-xl border-t border-border-soft z-50"
    style="padding-bottom:max(16px,env(safe-area-inset-bottom))">
    <div class="flex justify-around items-center px-2 pt-2 pb-1 max-w-[430px] mx-auto">
      <a href="index.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-primary text-[22px] filled">home</span>
        <span class="text-[10px] font-bold text-primary">Home</span>
      </a>
      <a href="library.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-text-light text-[22px]">auto_stories</span>
        <span class="text-[10px] font-medium text-text-light">Library</span>
      </a>
      <a href="cause.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-text-light text-[22px]">volunteer_activism</span>
        <span class="text-[10px] font-medium text-text-light">Projects</span>
      </a>
      <a href="impact.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-text-light text-[22px]">bar_chart</span>
        <span class="text-[10px] font-medium text-text-light">Impact</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-text-light text-[22px]">person</span>
        <span class="text-[10px] font-medium text-text-light">Profile</span>
      </a>
    </div>
  </nav>

</div>

<!-- ═══════════════════════════════════════════ -->
<!-- SCRIPT -->
<!-- ═══════════════════════════════════════════ -->
<script>

  // ════════════════════════════════════════════
  // SUPABASE
  // ════════════════════════════════════════════
  var supabaseClient = supabase.createClient(
    'https://nhymadutuhpjgkiurify.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM'
  )

  // ════════════════════════════════════════════
  // WARRIOR LEVELS
  // ════════════════════════════════════════════
  var warriorLevels = [
    { level: 1, title: 'Recruit',   min: 0,   max: 9 },
    { level: 2, title: 'Soldier',   min: 10,  max: 49 },
    { level: 3, title: 'Sergeant',  min: 50,  max: 99 },
    { level: 4, title: 'Commander', min: 100, max: 199 },
    { level: 5, title: 'General',   min: 200, max: 99999 }
  ]

  function getWarriorLevel(shares) {
    for (var i = warriorLevels.length - 1; i >= 0; i--) {
      if (shares >= warriorLevels[i].min) return warriorLevels[i]
    }
    return warriorLevels[0]
  }

  function getNextLevel(shares) {
    for (var i = 0; i < warriorLevels.length; i++) {
      if (shares <= warriorLevels[i].max) {
        return i < warriorLevels.length - 1 ? warriorLevels[i + 1] : null
      }
    }
    return null
  }

  // ════════════════════════════════════════════
  // AUTH
  // ════════════════════════════════════════════
  async function checkAuth() {
    var result = await supabaseClient.auth.getSession()
    if (!result.data.session) {
      window.location.href = 'login.html'
      return null
    }
    return result.data.session.user
  }

  // ════════════════════════════════════════════
  // SET GREETING
  // ════════════════════════════════════════════
  function setGreeting() {
    var hour = new Date().getHours()
    var greeting = hour < 12 ? 'Good Morning' : hour < 17 ? 'Good Afternoon' : 'Good Evening'
    var el = document.getElementById('greetingTime')
    if (el) el.textContent = greeting
  }

  // ════════════════════════════════════════════
  // LOAD TODAY'S QUOTE
  // ════════════════════════════════════════════
  async function loadTodaysQuote() {
    var result = await supabaseClient
      .from('quotes')
      .select('*')
      .eq('status', 'live')
      .order('published_at', { ascending: false })
      .limit(1)

    var quoteEl = document.getElementById('quoteText')
    var refEl   = document.getElementById('quoteRef')
    var cardEl  = document.getElementById('quoteCard')

    if (result.error || !result.data || result.data.length === 0) {
      quoteEl.textContent = 'The Word is with you today.'
      refEl.textContent   = 'GSTW'
    } else {
      quoteEl.textContent     = result.data[0].text
      refEl.textContent       = result.data[0].source.toUpperCase()
      window.currentQuoteId   = result.data[0].id
    }

    if (cardEl) {
      cardEl.style.opacity = '1'
    }
  }

  // ════════════════════════════════════════════
  // LOAD USER PROFILE + STATS
  // ════════════════════════════════════════════
  async function loadUserProfile(userId) {
    // Get profile
    var result = await supabaseClient
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .single()

    if (result.error || !result.data) return

    var profile = result.data
    var totalShares = profile.total_shares || 0
    var streak = profile.current_streak || 0

    // ── Check streak reset ──
    var lastShareResult = await supabaseClient
      .from('shares')
      .select('shared_at')
      .eq('user_id', userId)
      .order('shared_at', { ascending: false })
      .limit(1)

    if (lastShareResult.data && lastShareResult.data.length > 0) {
      var lastShareDate = new Date(lastShareResult.data[0].shared_at)
      var today = new Date()
      var lastDay = new Date(lastShareDate.getFullYear(), lastShareDate.getMonth(), lastShareDate.getDate())
      var todayDay = new Date(today.getFullYear(), today.getMonth(), today.getDate())
      var diffDays = Math.floor((todayDay - lastDay) / (1000 * 60 * 60 * 24))

      if (diffDays > 1 && streak > 0) {
        await supabaseClient.from('profiles').update({
          current_streak: 0
        }).eq('id', userId)
        streak = 0
      }
    } else if (streak > 0) {
      await supabaseClient.from('profiles').update({
        current_streak: 0
      }).eq('id', userId)
      streak = 0
    }

    // ── Name + Nickname ──
    var displayName = profile.nickname || profile.full_name || 'Warrior'
    var firstName = profile.full_name ? profile.full_name.split(' ')[0] : displayName

    var nameEl = document.getElementById('greetingName')
    if (nameEl) nameEl.textContent = 'Hi ' + firstName

    // ── Avatar ──
    var initials = '?'
    if (profile.full_name && profile.full_name.length >= 2) {
      var parts = profile.full_name.trim().split(' ')
      if (parts.length >= 2) {
        initials = (parts[0][0] + parts[1][0]).toUpperCase()
      } else {
        initials = parts[0].substring(0, 2).toUpperCase()
      }
    }
    var avatarEl = document.getElementById('avatarInitials')
    if (avatarEl) avatarEl.textContent = initials

    // ── Streak ──
    var streakNum = document.getElementById('streakNumber')
    if (streakNum) streakNum.textContent = streak

    // Hide fire glow if no streak
    var streakBadge = document.getElementById('streakBadge')
    if (streakBadge && streak === 0) {
      streakBadge.querySelector('.fire-glow').style.animation = 'none'
    }

    // ── Warrior Level ──
    var level = getWarriorLevel(totalShares)
    var nextLevel = getNextLevel(totalShares)

    var rankTitle = document.getElementById('rankTitle')
    var rankBar   = document.getElementById('rankBar')
    var rankShares = document.getElementById('rankShareCount')
    var rankRemaining = document.getElementById('rankRemaining')
    var rankNextLabel = document.getElementById('rankNextLabel')

    if (rankTitle) rankTitle.textContent = 'Level ' + level.level + ' — ' + level.title
    if (rankShares) rankShares.textContent = totalShares + ' share' + (totalShares !== 1 ? 's' : '')

    if (nextLevel) {
      var progress = ((totalShares - level.min) / (nextLevel.min - level.min)) * 100
      var remaining = nextLevel.min - totalShares

      if (rankNextLabel) rankNextLabel.textContent = 'Next: ' + nextLevel.title
      if (rankRemaining) rankRemaining.textContent = remaining + ' to ' + nextLevel.title

      setTimeout(function() {
        if (rankBar) rankBar.style.width = Math.min(progress, 100) + '%'
      }, 500)
    } else {
      if (rankNextLabel) rankNextLabel.textContent = 'Max Rank!'
      if (rankRemaining) rankRemaining.textContent = 'Highest rank achieved'
      setTimeout(function() {
        if (rankBar) rankBar.style.width = '100%'
      }, 500)
    }
  }

  // ════════════════════════════════════════════
  // LOAD COMMUNITY STATS
  // ════════════════════════════════════════════
  async function loadCommunityStats() {
    // Total shares ever
    var totalResult = await supabaseClient
      .from('shares')
      .select('id', { count: 'exact', head: true })

    var totalShares = totalResult.count || 0

    // Shares today
    var today = new Date()
    var startOfDay = new Date(today.getFullYear(), today.getMonth(), today.getDate()).toISOString()

    var todayResult = await supabaseClient
      .from('shares')
      .select('user_id', { count: 'exact', head: true })
      .gte('shared_at', startOfDay)

    var todayCount = todayResult.count || 0

    // Render
    var communityToday = document.getElementById('communityToday')
    var communityTotal = document.getElementById('communityTotal')

    if (communityToday) {
      communityToday.innerHTML = '<span class="font-bold text-text-dark">'
        + todayCount + '</span> warrior' + (todayCount !== 1 ? 's' : '') + ' shared today'
    }

    if (communityTotal) {
      communityTotal.innerHTML = '<span class="font-bold text-text-dark">'
        + totalShares.toLocaleString() + '</span> total shares'
    }
  }

  // ════════════════════════════════════════════
  // TOP BAR SCROLL HIDE
  // ════════════════════════════════════════════
  var lastScroll = 0

  window.addEventListener('scroll', function() {
    var currentScroll = window.pageYOffset
    var topBar = document.getElementById('topBar')
    if (!topBar) return

    if (currentScroll > lastScroll && currentScroll > 60) {
      topBar.style.transform = 'translateY(-100%)'
    } else {
      topBar.style.transform = 'translateY(0)'
    }
    lastScroll = currentScroll
  }, { passive: true })

  // ════════════════════════════════════════════
  // GO TO SHARE — Direct, no sheet
  // ════════════════════════════════════════════
  function goToShare() {
    // Clear library selection so editor uses today's quote
    sessionStorage.removeItem('gstw_selected_quote_id')
    sessionStorage.removeItem('gstw_selected_quote_text')
    sessionStorage.removeItem('gstw_selected_quote_source')
    sessionStorage.removeItem('gstw_selected_quote_category')
    sessionStorage.removeItem('gstw_final_image')

    window.location.href = 'backgrounds.html'
  }

  // ════════════════════════════════════════════
  // NOT TODAY
  // ════════════════════════════════════════════
  function notToday() {
    showToast('The Word is with you. Come back when ready.')
  }

  // ════════════════════════════════════════════
  // TOAST
  // ════════════════════════════════════════════
  function showToast(msg) {
    var existing = document.getElementById('homeToast')
    if (existing) existing.remove()
    var t = document.createElement('div')
    t.id = 'homeToast'
    t.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-[200] bg-dark/90 backdrop-blur-md text-white text-xs font-bold px-5 py-3 rounded-full shadow-lifted whitespace-nowrap flex items-center gap-2 max-w-[90%]'
    t.innerHTML = '<span class="material-symbols-outlined text-gold text-[14px]" style="font-variation-settings:\'FILL\' 1">check_circle</span> ' + msg
    document.body.appendChild(t)
    setTimeout(function() { if (t.parentNode) t.remove() }, 2500)
  }

  // ════════════════════════════════════════════
  // INIT
  // ════════════════════════════════════════════
  window.addEventListener('DOMContentLoaded', async function() {
    setGreeting()

    var user = await checkAuth()
    if (!user) return

    // Check onboarding
    var profileCheck = await supabaseClient
      .from('profiles')
      .select('onboarding_complete')
      .eq('id', user.id)
      .single()

    if (!profileCheck.data || !profileCheck.data.onboarding_complete) {
      window.location.href = 'onboarding.html'
      return
    }

    // Load everything in parallel
    await Promise.all([
      loadTodaysQuote(),
      loadUserProfile(user.id),
      loadCommunityStats()
    ])
  })

</script>
</body>
