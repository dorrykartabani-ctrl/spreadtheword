<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GSTW">
  <meta name="theme-color" content="#16202A">
  <title>Go Spread The Word</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED','cream-warm':'#FBF8F2',
            'dark':'#16202A','dark-soft':'#1F2A35',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
            'quote':['Lora','serif'],
          },
          boxShadow:{
            'natural':'0 4px 16px rgba(26,32,42,0.06)',
            'lifted':'0 8px 32px rgba(26,32,42,0.10)',
            'tactical':'0 4px 20px rgba(30,64,96,0.25)',
            'action-glow':'0 4px 20px rgba(226,91,77,0.35)',
          },
        },
      },
    }
  </script>

  <style>
    body{
      font-family:'Manrope',sans-serif;
      background-color:#16202A;
      -webkit-tap-highlight-color:transparent;
      -webkit-font-smoothing:antialiased;
      min-height:100dvh;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}
    .font-quote{font-family:'Lora',serif}
    .material-symbols-outlined{
      font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
    }
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .tactical-gradient{background:linear-gradient(145deg,#152E45,#1E4060)}

    ::-webkit-scrollbar{display:none}
    body{-ms-overflow-style:none;scrollbar-width:none}

    /* CTA pulse */
    @keyframes tactical-pulse{
      0%,100%{box-shadow:0 4px 20px rgba(212,162,76,0.25)}
      50%{box-shadow:0 8px 40px rgba(212,162,76,0.45)}
    }
    .cta-pulse{animation:tactical-pulse 2.5s ease-in-out infinite}

    /* Streak fire glow */
    @keyframes fireGlow{
      0%,100%{text-shadow:0 0 4px rgba(234,88,12,0.3)}
      50%{text-shadow:0 0 12px rgba(234,88,12,0.6)}
    }
    .fire-glow{animation:fireGlow 2s ease-in-out infinite}

    /* Fade in */
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(16px)}
      to{opacity:1;transform:translateY(0)}
    }
    .fade-in{animation:fadeUp 0.6s ease-out both}
    .fade-in-2{animation:fadeUp 0.6s ease-out 0.15s both}
    .fade-in-3{animation:fadeUp 0.6s ease-out 0.3s both}

    /* Quote card subtle glow */
    .quote-glow{
      box-shadow:0 0 60px rgba(212,162,76,0.08), 0 4px 32px rgba(0,0,0,0.3);
    }

    /* Community pulse */
    @keyframes communityPulse{
      0%,100%{opacity:0.4;transform:scale(1)}
      50%{opacity:1;transform:scale(1.3)}
    }
    .community-pulse{animation:communityPulse 2s ease-in-out infinite}

    /* Context modal */
    .modal-inner{
      max-height:85dvh;
      overflow-y:auto;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }
    .modal-inner::-webkit-scrollbar{display:none}

    .pb-safe{padding-bottom:env(safe-area-inset-bottom,16px)}
    .pt-safe{padding-top:env(safe-area-inset-top,0px)}

    .app-container{
      max-width:430px;
      margin:0 auto;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
    }
  </style>
</head>

<body class="text-white">

<div class="app-container">

  <!-- ═══════════════════════════════════════════ -->
  <!-- TOP BAR — Minimal, dark -->
  <!-- ═══════════════════════════════════════════ -->
  <header class="fixed top-0 left-0 right-0 z-50 pt-safe">
    <div class="flex justify-between items-center px-6 py-3 max-w-[430px] mx-auto">
      <span class="font-headline font-extrabold text-gold text-lg tracking-tight">GSTW</span>
      <div class="flex items-center gap-3">
        <button class="w-10 h-10 flex items-center justify-center text-white/40 relative
          active:scale-90 transition-transform">
          <span class="material-symbols-outlined text-[22px]">notifications</span>
          <span class="absolute top-2 right-2 w-2 h-2 bg-action rounded-full"></span>
        </button>
        <div id="avatarBtn"
          class="w-10 h-10 rounded-full bg-white/10 border border-white/20 flex items-center
          justify-center overflow-hidden active:scale-95 transition-transform cursor-pointer"
          onclick="window.location.href='profile.html'">
          <span id="avatarInitials" class="font-headline font-bold text-white/80 text-sm">?</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MAIN -->
  <!-- ═══════════════════════════════════════════ -->
  <main class="flex-1 px-6 pt-20 pb-28 flex flex-col">

    <!-- ─────────────────────────────────────── -->
    <!-- GREETING — Minimal, one line -->
    <!-- ─────────────────────────────────────── -->
    <section class="mt-4 mb-2 fade-in">
      <div class="flex items-center justify-between">
        <div>
          <p id="greetingTime" class="font-body text-xs text-white/40 uppercase tracking-widest"></p>
          <h2 id="greetingName" class="font-headline font-bold text-lg text-white/90 mt-0.5">
            Hi there
          </h2>
        </div>
        <!-- Streak -->
        <div id="streakBadge"
          class="flex items-center gap-1.5 bg-white/8 rounded-full px-3 py-1.5 border border-white/10">
          <span class="text-base fire-glow">🔥</span>
          <span id="streakNumber"
            class="font-headline font-extrabold text-base text-white/90 leading-none">0</span>
        </div>
      </div>
    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- TODAY'S WORD — The Hero -->
    <!-- ─────────────────────────────────────── -->
    <section class="flex-1 flex flex-col justify-center fade-in-2">

      <!-- Label -->
      <div class="flex items-center gap-3 mb-5">
        <div class="w-1.5 h-1.5 bg-gold rounded-full"></div>
        <span class="font-body text-[10px] text-white/30 tracking-widest uppercase font-bold">
          Today's Word
        </span>
        <div class="flex-1 h-px bg-white/8"></div>
      </div>

      <!-- Quote Card -->
      <div id="quoteCard" class="quote-glow rounded-2xl p-7 bg-white/[0.04] border border-white/10
        backdrop-blur-sm opacity-0" style="transition:opacity 0.5s ease">

        <!-- Decorative mark -->
        <span class="font-quote text-gold/30 text-[64px] leading-none block -mb-6 -ml-1">"</span>

        <!-- Quote Text — Lora, large -->
        <p id="quoteText"
          class="font-quote text-[22px] text-white/95 leading-[1.4] mb-5">
        </p>

        <!-- Source -->
        <div class="flex items-center gap-2">
          <div class="w-8 h-px bg-gold/30"></div>
          <p id="quoteRef"
            class="font-headline font-bold text-xs text-gold/80 tracking-wider uppercase"></p>
        </div>

      </div>

    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- COMMUNITY PULSE -->
    <!-- ─────────────────────────────────────── -->
    <section class="mt-6 mb-4 fade-in-3">
      <div class="flex items-center justify-center gap-4">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-gold community-pulse"></div>
          <span id="communityToday" class="text-[11px] text-white/40 font-body">
            <span class="font-bold text-white/60">—</span> warriors shared today
          </span>
        </div>
      </div>
    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- CTA -->
    <!-- ─────────────────────────────────────── -->
    <section class="mt-2 mb-2 flex flex-col items-center gap-3 fade-in-3">

      <button onclick="goToShare()"
        class="cta-pulse w-full h-14 rounded-2xl bg-gold text-dark font-headline
        font-bold text-base shadow-tactical active:scale-[0.97] transition-transform
        flex items-center justify-center gap-3">
        <span class="material-symbols-outlined text-[22px]">campaign</span>
        Spread The Word
      </button>

      <div class="flex items-center gap-4">
        <button onclick="notToday()"
          class="text-white/30 font-body font-medium text-xs active:opacity-60 transition-opacity">
          Just reflecting today
        </button>

        <span class="text-white/10">·</span>

        <button id="contextBtn" onclick="openContext()"
          class="hidden text-gold/60 font-body font-medium text-xs active:opacity-60
          transition-opacity flex items-center gap-1">
          <span class="material-symbols-outlined text-[14px]">menu_book</span>
          Read the context
        </button>
      </div>

    </section>

  </main>

  <!-- ═══════════════════════════════════════════ -->
  <!-- BOTTOM NAVIGATION -->
  <!-- ═══════════════════════════════════════════ -->
  <nav class="fixed bottom-0 left-0 w-full bg-dark/95 backdrop-blur-xl border-t border-white/8 z-50"
    style="padding-bottom:max(16px,env(safe-area-inset-bottom))">
    <div class="flex justify-around items-center px-2 pt-2 pb-1 max-w-[430px] mx-auto">
      <a href="index.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-gold text-[22px] filled">home</span>
        <span class="text-[10px] font-bold text-gold">Home</span>
      </a>
      <a href="library.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-white/30 text-[22px]">auto_stories</span>
        <span class="text-[10px] font-medium text-white/30">Library</span>
      </a>
      <a href="cause.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-white/30 text-[22px]">volunteer_activism</span>
        <span class="text-[10px] font-medium text-white/30">Projects</span>
      </a>
      <a href="impact.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-white/30 text-[22px]">bar_chart</span>
        <span class="text-[10px] font-medium text-white/30">Impact</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
        <span class="material-symbols-outlined text-white/30 text-[22px]">person</span>
        <span class="text-[10px] font-medium text-white/30">Profile</span>
      </a>
    </div>
  </nav>

</div>

<!-- ═══════════════════════════════════════════ -->
<!-- CONTEXT MODAL -->
<!-- ═══════════════════════════════════════════ -->
<div id="contextModal"
  class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] flex items-end justify-center"
  onclick="closeContext()">
  <div class="w-full max-w-[430px] bg-dark-soft rounded-t-3xl modal-inner"
    onclick="event.stopPropagation()">
    <div class="p-6 space-y-5">

      <!-- Handle -->
      <div class="w-10 h-1 bg-white/15 rounded-full mx-auto"></div>

      <!-- Header -->
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gold/15 flex items-center justify-center flex-shrink-0">
          <span class="material-symbols-outlined text-gold text-[20px] filled">menu_book</span>
        </div>
        <div>
          <h3 class="font-headline font-bold text-base text-white">Understanding the Context</h3>
          <p id="contextRef" class="text-xs text-white/40 font-body"></p>
        </div>
      </div>

      <!-- Quote reminder -->
      <div class="bg-white/5 rounded-xl p-4 border border-white/8">
        <p id="contextQuote" class="font-quote text-sm text-white/80 italic leading-relaxed"></p>
      </div>

      <!-- Context text -->
      <div>
        <p class="text-[10px] font-bold text-gold/60 uppercase tracking-widest mb-2">Context</p>
        <p id="contextText" class="font-body text-sm text-white/70 leading-relaxed"></p>
      </div>

      <!-- Close -->
      <button onclick="closeContext()"
        class="w-full py-3 bg-white/8 text-white/60 font-bold text-sm rounded-xl
        border border-white/10 active:scale-[0.98] transition-transform">
        Close
      </button>

    </div>
  </div>
</div>
<!-- ═══════════════════════════════════════════ -->
<!-- SCRIPT -->
<!-- ═══════════════════════════════════════════ -->
<script>

  var supabaseClient = supabase.createClient(
    'https://nhymadutuhpjgkiurify.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM'
  )

  // ════════════════════════════════════════════
  // STATE
  // ════════════════════════════════════════════
  var currentQuoteContext = null

  // ════════════════════════════════════════════
  // AUTH
  // ════════════════════════════════════════════
  async function checkAuth() {
    var result = await supabaseClient.auth.getSession()
    if (!result.data.session) {
      window.location.href = 'login.html'
      return null
    }
    return result.data.session.user
  }

  // ════════════════════════════════════════════
  // SET GREETING
  // ════════════════════════════════════════════
  function setGreeting() {
    var hour = new Date().getHours()
    var greeting = hour < 12 ? 'Good Morning' : hour < 17 ? 'Good Afternoon' : 'Good Evening'
    var el = document.getElementById('greetingTime')
    if (el) el.textContent = greeting
  }

  // ════════════════════════════════════════════
  // LOAD TODAY'S QUOTE
  // ════════════════════════════════════════════
  async function loadTodaysQuote() {
    var result = await supabaseClient
      .from('quotes')
      .select('*')
      .eq('status', 'live')
      .order('published_at', { ascending: false })
      .limit(1)

    var quoteEl = document.getElementById('quoteText')
    var refEl   = document.getElementById('quoteRef')
    var cardEl  = document.getElementById('quoteCard')
    var ctxBtn  = document.getElementById('contextBtn')

    if (result.error || !result.data || result.data.length === 0) {
      quoteEl.textContent = 'The Word is with you today.'
      refEl.textContent   = 'GSTW'
    } else {
      var quote = result.data[0]
      quoteEl.textContent     = quote.text
      refEl.textContent       = quote.source.toUpperCase()
      window.currentQuoteId   = quote.id

      // Context
      if (quote.context && quote.context.trim()) {
        currentQuoteContext = {
          text: quote.text,
          source: quote.source,
          context: quote.context
        }
        if (ctxBtn) ctxBtn.classList.remove('hidden')
      }
    }

    if (cardEl) {
      cardEl.style.opacity = '1'
    }
  }

  // ════════════════════════════════════════════
  // LOAD USER PROFILE
  // ════════════════════════════════════════════
  async function loadUserProfile(userId) {
    var result = await supabaseClient
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .single()

    if (result.error || !result.data) return

    var profile = result.data
    var streak = profile.current_streak || 0

    // ── Streak reset check ──
    var lastShareResult = await supabaseClient
      .from('shares')
      .select('shared_at')
      .eq('user_id', userId)
      .order('shared_at', { ascending: false })
      .limit(1)

    if (lastShareResult.data && lastShareResult.data.length > 0) {
      var lastShareDate = new Date(lastShareResult.data[0].shared_at)
      var today = new Date()
      var lastDay = new Date(lastShareDate.getFullYear(), lastShareDate.getMonth(), lastShareDate.getDate())
      var todayDay = new Date(today.getFullYear(), today.getMonth(), today.getDate())
      var diffDays = Math.floor((todayDay - lastDay) / (1000 * 60 * 60 * 24))

      if (diffDays > 1 && streak > 0) {
        await supabaseClient.from('profiles').update({ current_streak: 0 }).eq('id', userId)
        streak = 0
      }
    } else if (streak > 0) {
      await supabaseClient.from('profiles').update({ current_streak: 0 }).eq('id', userId)
      streak = 0
    }

    // ── Display name: nickname → first name → Warrior ──
    var displayName = profile.nickname || (profile.full_name ? profile.full_name.split(' ')[0] : 'Warrior')
    var nameEl = document.getElementById('greetingName')
    if (nameEl) nameEl.textContent = 'Hi ' + displayName

    // ── Avatar ──
    var initials = '?'
    if (profile.full_name && profile.full_name.length >= 2) {
      var parts = profile.full_name.trim().split(' ')
      if (parts.length >= 2) {
        initials = (parts[0][0] + parts[1][0]).toUpperCase()
      } else {
        initials = parts[0].substring(0, 2).toUpperCase()
      }
    }
    var avatarEl = document.getElementById('avatarInitials')
    if (avatarEl) avatarEl.textContent = initials

    // ── Streak ──
    var streakNum = document.getElementById('streakNumber')
    if (streakNum) streakNum.textContent = streak

    var streakBadge = document.getElementById('streakBadge')
    if (streakBadge && streak === 0) {
      var fireEl = streakBadge.querySelector('.fire-glow')
      if (fireEl) fireEl.style.animation = 'none'
    }

    // ── Store default platform for later use ──
    if (profile.default_platform) {
      sessionStorage.setItem('gstw_default_platform', profile.default_platform)
    }
  }

  // ════════════════════════════════════════════
  // COMMUNITY STATS
  // ════════════════════════════════════════════
  async function loadCommunityStats() {
    var today = new Date()
    var startOfDay = new Date(today.getFullYear(), today.getMonth(), today.getDate()).toISOString()

    var todayResult = await supabaseClient
      .from('shares')
      .select('id', { count: 'exact', head: true })
      .gte('shared_at', startOfDay)

    var todayCount = todayResult.count || 0

    var el = document.getElementById('communityToday')
    if (el) {
      el.innerHTML = '<span class="font-bold text-white/60">'
        + todayCount + '</span> warrior' + (todayCount !== 1 ? 's' : '') + ' shared today'
    }
  }

  // ════════════════════════════════════════════
  // CONTEXT MODAL
  // ════════════════════════════════════════════
  function openContext() {
    if (!currentQuoteContext) return

    document.getElementById('contextQuote').textContent = currentQuoteContext.text
    document.getElementById('contextRef').textContent = currentQuoteContext.source.toUpperCase()
    document.getElementById('contextText').textContent = currentQuoteContext.context

    document.getElementById('contextModal').classList.remove('hidden')
    document.body.style.overflow = 'hidden'
  }

  function closeContext() {
    document.getElementById('contextModal').classList.add('hidden')
    document.body.style.overflow = ''
  }

  // ════════════════════════════════════════════
  // GO TO SHARE — clears all previous state
  // ════════════════════════════════════════════
  function goToShare() {
    sessionStorage.removeItem('gstw_selected_quote_id')
    sessionStorage.removeItem('gstw_selected_quote_text')
    sessionStorage.removeItem('gstw_selected_quote_source')
    sessionStorage.removeItem('gstw_selected_quote_category')
    sessionStorage.removeItem('gstw_final_image')
    sessionStorage.removeItem('gstw_personal_msg')
    sessionStorage.removeItem('gstw_hashtags')
    sessionStorage.removeItem('gstw_full_caption')
    sessionStorage.removeItem('gstw_overlay_x')
    sessionStorage.removeItem('gstw_overlay_y')

    window.location.href = 'editor.html'
  }

  // ════════════════════════════════════════════
  // NOT TODAY
  // ════════════════════════════════════════════
  function notToday() {
    showToast('The Word is with you. Come back when ready.')
  }

  // ════════════════════════════════════════════
  // TOAST
  // ════════════════════════════════════════════
  function showToast(msg) {
    var existing = document.getElementById('homeToast')
    if (existing) existing.remove()
    var t = document.createElement('div')
    t.id = 'homeToast'
    t.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-[200] bg-white/10 backdrop-blur-md text-white text-xs font-bold px-5 py-3 rounded-full shadow-lifted whitespace-nowrap flex items-center gap-2 max-w-[90%] border border-white/10'
    t.innerHTML = '<span class="material-symbols-outlined text-gold text-[14px]" style="font-variation-settings:\'FILL\' 1">check_circle</span> ' + msg
    document.body.appendChild(t)
    setTimeout(function() { if (t.parentNode) t.remove() }, 2500)
  }

  // ════════════════════════════════════════════
  // INIT
  // ════════════════════════════════════════════
  window.addEventListener('DOMContentLoaded', async function() {
    setGreeting()

    var user = await checkAuth()
    if (!user) return

    // Check onboarding
    var profileCheck = await supabaseClient
      .from('profiles')
      .select('onboarding_complete')
      .eq('id', user.id)
      .single()

    if (!profileCheck.data || !profileCheck.data.onboarding_complete) {
      window.location.href = 'onboarding.html'
      return
    }

    await Promise.all([
      loadTodaysQuote(),
      loadUserProfile(user.id),
      loadCommunityStats()
    ])
  })

</script>
</body>
</html>
