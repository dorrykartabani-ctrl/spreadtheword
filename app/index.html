  <style>
    html,body{background-color:#0e0e0c}
    body{
      font-family:'Manrope',sans-serif;
      -webkit-tap-highlight-color:transparent;
      -webkit-font-smoothing:antialiased;
      min-height:100dvh;

    .font-headline{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-0.02em}
    .font-quote{font-family:'Lora',serif}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;line-height:1}
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    ::-webkit-scrollbar{display:none}
    body{-ms-overflow-style:none;scrollbar-width:none}

    .signature-gradient{background:linear-gradient(135deg,#3d6285,#6b9bc3)}

    /* Background image layer */
    .hero-bg{position:fixed;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;z-index:0;opacity:0;transition:opacity 0.8s ease}
    .hero-bg.loaded{opacity:1}

    /* Dark gradient overlay */
    .hero-overlay{position:fixed;inset:0;background:linear-gradient(180deg,rgba(14,14,12,0.50) 0%,rgba(14,14,12,0.30) 30%,rgba(14,14,12,0.70) 70%,rgba(14,14,12,0.95) 100%);z-index:1;pointer-events:none}

    .content-layer{position:relative;z-index:2}

    /* ── QUOTE ENTRANCE ── */
    @keyframes markDrop{
      0%{opacity:0;transform:translateY(-24px) scale(0.7)}
      60%{opacity:1;transform:translateY(6px) scale(1.05)}
      100%{opacity:1;transform:translateY(0) scale(1)}
    }
    .anim-mark{opacity:0}
    .anim-mark.go{animation:markDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) forwards}

    @keyframes blurFloatUp{
      0%{opacity:0;filter:blur(12px);transform:translateY(24px)}
      100%{opacity:1;filter:blur(0);transform:translateY(0)}
    }
    .anim-quote{opacity:0}
    .anim-quote.go{animation:blurFloatUp 1.4s cubic-bezier(0.22,1,0.36,1) forwards}

    @keyframes sourceSlide{0%{opacity:0;transform:translateX(-16px)}100%{opacity:1;transform:translateX(0)}}
    @keyframes lineDraw{0%{width:0}100%{width:40px}}
    .anim-source{opacity:0}
    .anim-source.go{animation:sourceSlide 0.8s cubic-bezier(0.22,1,0.36,1) forwards}
    .anim-line{width:0}
    .anim-line.go{animation:lineDraw 0.7s cubic-bezier(0.22,1,0.36,1) forwards}

    /* Breathing idle */
    @keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    .breathing{animation:breathe 6s ease-in-out infinite}

    /* CTA + secondary fade in */
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .anim-cta{opacity:0}
    .anim-cta.go{animation:fadeUp 0.8s ease-out forwards}
    .anim-secondary{opacity:0}
    .anim-secondary.go{animation:fadeUp 0.8s ease-out forwards}

    /* CTA pulse */
    @keyframes ctaPulse{
      0%,100%{box-shadow:0 4px 20px rgba(61,98,133,0.30)}
      50%{box-shadow:0 8px 40px rgba(61,98,133,0.55)}
    }
    .cta-pulse{animation:ctaPulse 2.5s ease-in-out infinite}

    /* Text shadows */
    .text-shadow-soft{text-shadow:0 2px 12px rgba(0,0,0,0.6)}
    .text-shadow-strong{text-shadow:0 4px 20px rgba(0,0,0,0.8),0 2px 6px rgba(0,0,0,0.5)}

    /* Context modal */
    .modal-inner{max-height:85dvh;overflow-y:auto;-ms-overflow-style:none;scrollbar-width:none}
    .modal-inner::-webkit-scrollbar{display:none}

    /* Glass nav — dark variant */
    .glass-nav-dark{background:rgba(14,14,12,0.90);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

    .app-container{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative}
  </style>

// ════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════
async function checkAuth() {
  var result = await supabaseClient.auth.getSession()
  if (!result.data || !result.data.session) {
    window.location.href = 'login.html'
    return null
  }
  return result.data.session.user
}

// ════════════════════════════════════════════
// BACKGROUND LOADER
// ════════════════════════════════════════════
function setHeroBackground(url) {
  var bg = document.getElementById('heroBg')
  if (!bg) return
  var img = new Image()
  img.onload = function() {
    bg.style.backgroundImage = 'url("' + url + '")'
    bg.classList.add('loaded')
  }
  img.onerror = function() {
    bg.style.backgroundImage = 'url("' + DEFAULT_HERO + '")'
    bg.classList.add('loaded')
  }
  img.src = url
}

// ════════════════════════════════════════════
// LOAD TODAY'S QUOTE — scheduled by date
// ════════════════════════════════════════════
async function loadTodaysQuote() {
  try {
    var today = new Date()
    var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0')

    // Try to find a quote scheduled for today
    var result = await supabaseClient
      .from('quotes')
      .select('*')
      .eq('status', 'live')
      .lte('published_at', todayStr + 'T23:59:59')
      .gte('published_at', todayStr + 'T00:00:00')
      .limit(1)

    // If no quote for today, get most recent
    if (!result.data || result.data.length === 0) {
      result = await supabaseClient
        .from('quotes')
        .select('*')
        .eq('status', 'live')
        .lte('published_at', new Date().toISOString())
        .order('published_at', { ascending: false })
        .limit(1)
    }

    if (result.error || !result.data || result.data.length === 0) {
      setFallbackQuote()
      return
    }

    var quote = result.data[0]
    currentQuote = quote

    // Store in session for editor
    sessionStorage.setItem('gstw_quote_id', quote.id)
    sessionStorage.setItem('gstw_today_quote_text', quote.text)
    sessionStorage.setItem('gstw_today_quote_source', quote.source || '')
    sessionStorage.setItem('gstw_today_quote_category', (quote.category || '').toLowerCase())

    // Background
    var bgUrl = (quote.background_url && quote.background_url.trim()) ? quote.background_url : DEFAULT_HERO
    setHeroBackground(bgUrl)

    // Apply admin font/position overrides if present
    var quoteEl = document.getElementById('quoteText')
    if (quoteEl) {
      quoteEl.textContent = quote.text
      if (quote.home_font_size) quoteEl.style.fontSize = quote.home_font_size
      if (quote.home_font_weight) quoteEl.style.fontWeight = quote.home_font_weight
      if (quote.home_text_align) quoteEl.style.textAlign = quote.home_text_align
      if (quote.home_text_color) quoteEl.style.color = quote.home_text_color
    }

    var refEl = document.getElementById('quoteRef')
    if (refEl) refEl.textContent = (quote.source || 'GSTW').toUpperCase()

    // Context
    if (quote.context && quote.context.trim()) {
      currentQuoteContext = {
        text: quote.text,
        source: quote.source,
        context: quote.context
      }
      var ctxBtn = document.getElementById('contextBtn')
      if (ctxBtn) { ctxBtn.classList.remove('hidden'); ctxBtn.classList.add('flex') }
    }

    // Trigger animations after content is ready
    startEntranceAnimation()

  } catch(e) {
    console.error('loadTodaysQuote failed:', e)
    setFallbackQuote()
  }
}

function setFallbackQuote() {
  var quoteEl = document.getElementById('quoteText')
  var refEl = document.getElementById('quoteRef')
  if (quoteEl) quoteEl.textContent = 'The Word is with you today.'
  if (refEl) refEl.textContent = 'GSTW'
  setHeroBackground(DEFAULT_HERO)
  startEntranceAnimation()
}

// ════════════════════════════════════════════
// ANIMATION CHOREOGRAPHY — triggered after content loads
// ════════════════════════════════════════════
function startEntranceAnimation() {
  // Stagger the animation classes
  setTimeout(function() {
    var mark = document.getElementById('animMark')
    if (mark) mark.classList.add('go')
  }, 200)

  setTimeout(function() {
    var quote = document.getElementById('quoteText')
    if (quote) quote.classList.add('go')
  }, 600)

  setTimeout(function() {
    var source = document.getElementById('quoteRef')
    var line = document.getElementById('animLine')
    if (source) source.classList.add('go')
    if (line) line.classList.add('go')
  }, 1400)

  setTimeout(function() {
    var cta = document.getElementById('ctaBtn')
    if (cta) { cta.classList.add('go'); cta.classList.add('cta-pulse') }
  }, 2000)

  setTimeout(function() {
    var secondary = document.getElementById('secondaryActions')
    if (secondary) secondary.classList.add('go')
  }, 2300)

  // Start breathing after entrance completes
  setTimeout(function() {
    var block = document.getElementById('quoteBlock')
    if (block) block.classList.add('breathing')
  }, 2800)
}

// ════════════════════════════════════════════
// LOAD USER PROFILE
// ════════════════════════════════════════════
async function loadUserProfile(userId) {
  try {
    var result = await supabaseClient
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .single()

    if (result.error || !result.data) return
    userProfile = result.data

    // Check subscription tier
    var tier = userProfile.subscription_tier || 'free'
    var status = userProfile.subscription_status || 'inactive'
    isFreeUser = (tier === 'free' || status === 'suspended')

    // Update CTA for free users
    if (isFreeUser) {
      var ctaBtn = document.getElementById('ctaBtn')
      if (ctaBtn) {
        ctaBtn.textContent = 'Upgrade to Share'
        ctaBtn.classList.remove('signature-gradient')
        ctaBtn.style.background = 'rgba(255,255,255,0.1)'
        ctaBtn.style.border = '1px solid rgba(255,255,255,0.15)'
      }
    }

    // Cache platform preference
    if (userProfile.default_platform) {
      sessionStorage.setItem('gstw_default_platform', userProfile.default_platform)
    }

    // Show subscribe prompt if suspended
    if (userProfile.is_suspended) {
      showSubscribePrompt()
    }

  } catch(e) {
    console.error('loadUserProfile failed:', e)
  }
}

// ════════════════════════════════════════════
// CTA HANDLER
// ════════════════════════════════════════════
function handleCta() {
  if (isFreeUser) {
    window.location.href = 'subscription.html'
    return
  }

  // Pass today's quote to editor
  if (currentQuote) {
    sessionStorage.setItem('gstw_selected_quote_id', currentQuote.id)
    sessionStorage.setItem('gstw_selected_quote_text', currentQuote.text)
    sessionStorage.setItem('gstw_selected_quote_source', currentQuote.source || '')
    sessionStorage.setItem('gstw_selected_quote_category', (currentQuote.category || '').toLowerCase())
  }

  // Clear editor state for fresh start
  sessionStorage.removeItem('gstw_final_image')
  sessionStorage.removeItem('gstw_personal_msg')
  sessionStorage.removeItem('gstw_hashtags')
  sessionStorage.removeItem('gstw_full_caption')
  sessionStorage.removeItem('gstw_overlay_x')
  sessionStorage.removeItem('gstw_overlay_y')
  sessionStorage.removeItem('gstw_bg_type')
  sessionStorage.removeItem('gstw_bg_value')

  window.location.href = 'editor.html'
}

// ════════════════════════════════════════════
// NOTIFICATION DOT
// ════════════════════════════════════════════
async function updateNotificationDot(userId) {
  try {
    var result = await supabaseClient
      .from('notifications')
      .select('id,type,target_user_id')
      .order('created_at', { ascending: false })
      .limit(50)

    var dot = document.getElementById('homeNotifDot')
    if (!dot) return
    if (result.error || !result.data) { dot.classList.add('hidden'); return }

    var visible = result.data.filter(function(n) {
      return n.type === 'broadcast' || n.target_user_id === userId
    })

    var readIds = []
    try { readIds = JSON.parse(localStorage.getItem('gstw_read_notifs') || '[]') } catch(e) {}

    var unread = visible.some(function(n) { return readIds.indexOf(n.id) === -1 })
    dot.classList.toggle('hidden', !unread)
  } catch(e) {
    console.error('updateNotificationDot failed:', e)
  }
}

// ════════════════════════════════════════════
// CONTEXT MODAL
// ════════════════════════════════════════════
function openContext() {
  if (!currentQuoteContext) return
  var quoteEl = document.getElementById('contextQuote')
  var refEl = document.getElementById('contextRef')
  var textEl = document.getElementById('contextText')
  if (quoteEl) quoteEl.textContent = currentQuoteContext.text
  if (refEl) refEl.textContent = (currentQuoteContext.source || '').toUpperCase()
  if (textEl) textEl.textContent = currentQuoteContext.context
  var modal = document.getElementById('contextModal')
  if (modal) modal.classList.remove('hidden')
  document.body.style.overflow = 'hidden'
}

function closeContext() {
  var modal = document.getElementById('contextModal')
  if (modal) modal.classList.add('hidden')
  document.body.style.overflow = ''
}

// ════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════
function goToImpact() { window.location.href = 'impact.html' }

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async function() {
  try {
    var user = await checkAuth()
    if (!user) return

    // Onboarding gate
    var profileCheck = await supabaseClient
      .from('profiles')
      .select('onboarding_complete')
      .eq('id', user.id)
      .single()

    if (!profileCheck.data || !profileCheck.data.onboarding_complete) {
      window.location.href = 'onboarding.html'
      return
    }

    // Load everything in parallel
    await Promise.all([
      loadTodaysQuote(),
      loadUserProfile(user.id),
      updateNotificationDot(user.id)
    ])

  } catch(e) {
    console.error('[Home] Init error:', e)
    setFallbackQuote()
  }
})
</script>
