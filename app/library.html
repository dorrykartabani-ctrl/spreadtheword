<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>GSTW</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Existing brand
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'dark':'#16202A',

            // Radiant Quiet surfaces
            'rq-bg':'#fbf9f4',
            'rq-surface':'#fbf9f4',
            'rq-container-low':'#f5f4ed',
            'rq-container-lowest':'#ffffff',
            'rq-container-high':'#eeece4',
            'rq-primary':'#3d6285',
            'rq-secondary':'#92B4D1',
            'rq-on-surface':'#31332e',
            'rq-on-surface-variant':'#5e6059',
            'rq-outline-variant':'rgba(94,96,89,0.15)',

            // Legacy support
            'text-dark':'#31332e','text-muted':'#5e6059','text-light':'#8a8c85',
            'border-soft':'rgba(94,96,89,0.15)',
            'card-bg':'#FFFFFF','surface':'#fbf9f4','cream':'#f5f4ed',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
          },
          boxShadow:{
            'ambient':'0 20px 40px rgba(49,51,46,0.05)',
            'ambient-sm':'0 8px 24px rgba(49,51,46,0.04)',
            'lift':'0 4px 16px rgba(49,51,46,0.03)',
          },
          borderRadius:{
            'rq':'20px',
            'rq-lg':'28px',
          },
        },
      },
    }
  </script>

  <style>
    body{
      font-family:'Manrope',sans-serif;
      background-color:#fbf9f4;
      -webkit-tap-highlight-color:transparent;
      min-height:100dvh;
      color:#31332e;
      letter-spacing:-0.005em;
    }
    .font-headline{
      font-family:'Plus Jakarta Sans',sans-serif;
      letter-spacing:-0.02em;
    }
    .material-symbols-outlined{
      font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      display:inline-block;line-height:1;
    }
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}

    ::-webkit-scrollbar{display:none}
    body{-ms-overflow-style:none;scrollbar-width:none}

    /* Cards — Radiant Quiet */
    .quote-card{
      background:#ffffff;
      border-radius:20px;
      padding:22px;
      transition:background-color 0.2s ease, transform 0.15s ease;
      cursor:pointer;
      box-shadow:0 4px 16px rgba(49,51,46,0.03);
    }
    .quote-card:hover{
      background:#f5f4ed;
    }
    .quote-card:active{
      transform:scale(0.985);
    }

    /* Reflection quotes get a warm gold accent (kept from existing brand) */
    .reflection-plate{
      position:relative;
    }
    .reflection-plate::before{
      content:'';
      position:absolute;
      top:22px;
      bottom:22px;
      left:0;
      width:3px;
      background:#D4A24C;
      border-radius:0 3px 3px 0;
      opacity:0.7;
    }

    /* Tabs */
    .content-tab{
      position:relative;
      padding:10px 4px;
      font-size:13px;
      font-weight:700;
      color:#8a8c85;
      transition:color 0.15s ease;
      letter-spacing:0.01em;
    }
    .content-tab.active{color:#31332e}
    .content-tab.active::after{
      content:'';
      position:absolute;
      bottom:-1px;
      left:0;
      right:0;
      height:2px;
      background:#1E4060;
      border-radius:2px 2px 0 0;
    }

    .content-tabs{
      border-bottom:1px solid rgba(94,96,89,0.12);
    }

    /* Category chip */
    .cat-chip{
      transition:all 0.15s ease;
      background:#f5f4ed;
      color:#5e6059;
      font-weight:700;
      letter-spacing:0.01em;
    }
    .cat-chip.active{
      background:#1E4060;
      color:#ffffff;
    }

    /* Hashtag pills */
    .hashtag{
      display:inline-block;
      color:#5e6059;
      font-size:11px;
      font-weight:600;
      margin-right:10px;
      letter-spacing:0.01em;
    }
    .hashtag::before{
      content:'#';
      opacity:0.5;
      margin-right:1px;
    }

    /* Shared badge (bottom of card) */
    .shared-marker{
      display:inline-flex;
      align-items:center;
      gap:4px;
      color:#3d6285;
      font-size:11px;
      font-weight:700;
      letter-spacing:0.02em;
    }
    .share-marker{
      color:#8a8c85;
      font-size:11px;
      font-weight:600;
    }

    /* Search input — filled, no border */
    .rq-search{
      background:#f5f4ed;
      border:1px solid transparent;
      transition:background 0.2s ease, border-color 0.2s ease;
    }
    .rq-search:focus{
      background:#ffffff;
      border-color:rgba(30,64,96,0.3);
      outline:none;
    }

    .skeleton{
      background:linear-gradient(90deg,#f0eee6 25%,#f7f5ee 50%,#f0eee6 75%);
      background-size:200% 100%;
      animation:shimmer 1.5s infinite;
      border-radius:20px;
    }
    @keyframes shimmer{
      0%{background-position:200% 0}
      100%{background-position:-200% 0}
    }

    .chip-scroll{
      -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 12px, #000 calc(100% - 24px), transparent 100%);
      mask-image: linear-gradient(90deg, transparent 0, #000 12px, #000 calc(100% - 24px), transparent 100%);
    }

    /* Glass header */
    .glass-header{
      background:rgba(251,249,244,0.82);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
    }

    .header-scrolled{
      box-shadow:0 8px 24px rgba(49,51,46,0.04);
    }

    /* Glass bottom nav */
    .glass-nav{
      background:rgba(255,255,255,0.85);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-top:1px solid rgba(94,96,89,0.08);
    }

    @keyframes tabPulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.05)}
    }
    .tab-pulse{animation:tabPulse 0.4s ease-out}

    .pb-safe{padding-bottom:env(safe-area-inset-bottom,16px)}

    /* Sort icon button */
    .sort-btn{
      width:32px;
      height:32px;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#5e6059;
      transition:background 0.15s ease;
    }
    .sort-btn:hover{
      background:#f5f4ed;
    }
    .sort-btn:active{
      transform:scale(0.9);
    }
  </style>
</head>

<body>

<!-- ═══════════════════════════════════════════ -->
<!-- HEADER -->
<!-- ═══════════════════════════════════════════ -->
<header id="pageHeader" class="fixed top-0 w-full z-50 glass-header transition-shadow">
  <div class="max-w-[430px] mx-auto px-5 pt-10 pb-3">

    <!-- Logo + Search -->
    <div class="flex items-center gap-3 mb-3">
      <img src="/images/logo.png" alt="GSTW" class="w-8 h-8 object-contain flex-shrink-0">
      <div class="relative flex-1">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-light text-[18px]">search</span>
        <input id="searchInput" type="text"
          placeholder="Search quotes..."
          class="rq-search w-full rounded-2xl py-2.5 pl-9 pr-3 text-sm font-body text-text-dark placeholder:text-text-light">
      </div>
    </div>

    <!-- Category chips -->
    <div id="categoryChips" class="chip-scroll flex gap-2 overflow-x-auto" style="-ms-overflow-style:none;scrollbar-width:none">
      <button onclick="setCategory('all',this)"
        class="cat-chip active flex-shrink-0 px-3.5 py-1.5 rounded-full text-xs capitalize">
        All
      </button>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════ -->
<!-- MAIN -->
<!-- ═══════════════════════════════════════════ -->
<main class="pt-[140px] pb-32 px-5 max-w-[430px] mx-auto">

  <!-- Content tabs + sort -->
  <div class="content-tabs flex items-end justify-between mb-6 pt-4">
    <div class="flex gap-6">
      <button id="tabAll" onclick="setTab('all')" class="content-tab active">
        All
      </button>
      <button id="tabShared" onclick="setTab('shared')" class="content-tab">
        Shared <span id="sharedCount" class="font-normal opacity-70"></span>
      </button>
    </div>
    <button id="sortBtn" onclick="toggleSort()" class="sort-btn hidden mb-1" aria-label="Toggle sort order" title="Sort by date">
      <span id="sortIcon" class="material-symbols-outlined text-[18px]">swap_vert</span>
    </button>
  </div>

  <!-- Quote cards -->
  <div id="quoteList" class="space-y-4">
    <div class="skeleton h-40 w-full"></div>
    <div class="skeleton h-36 w-full"></div>
    <div class="skeleton h-36 w-full"></div>
  </div>

  <!-- Empty state -->
  <div id="emptyState" class="hidden text-center py-16">
    <div class="w-16 h-16 rounded-2xl bg-rq-container-low flex items-center justify-center mx-auto mb-4">
      <span class="material-symbols-outlined text-text-light text-[32px]">search_off</span>
    </div>
    <h3 class="font-headline font-bold text-lg text-text-dark mb-1">Nothing here yet</h3>
    <p id="emptyMsg" class="text-sm text-text-muted font-body">Try a different search or filter</p>
  </div>

  <!-- Loading more -->
  <div id="loadingMore" class="hidden text-center py-6">
    <div class="inline-block w-5 h-5 border-2 border-primary/20 border-t-primary rounded-full animate-spin"></div>
  </div>

  <!-- End of list -->
  <div id="endOfList" class="hidden text-center py-6">
    <p class="text-xs text-text-light font-body uppercase tracking-widest">You've reached the end</p>
  </div>

  <!-- Sentinel -->
  <div id="scrollSentinel" class="h-1"></div>

</main>

<!-- ═══════════════════════════════════════════ -->
<!-- BOTTOM NAV -->
<!-- ═══════════════════════════════════════════ -->
<nav class="fixed bottom-0 left-0 w-full glass-nav z-50"
  style="padding-bottom:max(16px,env(safe-area-inset-bottom))">
  <div class="flex justify-around items-center px-2 pt-2 pb-1 max-w-[430px] mx-auto">

<!-- ═══════════════════════════════════════════ -->
<!-- SCRIPT -->
<!-- ═══════════════════════════════════════════ -->
<script>

var supabaseClient = supabase.createClient(
  'https://nhymadutuhpjgkiurify.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM'
)

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
var currentUser = null
var userShares = {}         // { quote_id: shared_at }
var userSharedQuoteIds = []
var loadedQuoteIds = new Set()

var state = {
  tab: 'all',
  category: 'all',
  search: '',
  sortDir: 'desc',   // 'desc' = newest first, 'asc' = oldest first (Shared tab only)
  offset: 0,
  pageSize: 20,
  loading: false,
  reachedEnd: false
}

var searchDebounce = null

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
async function init() {
  var sessionResult = await supabaseClient.auth.getSession()
  if (!sessionResult.data.session) {
    window.location.href = 'login.html'
    return
  }
  currentUser = sessionResult.data.session.user

  sessionStorage.removeItem('gstw_selected_quote_id')
  sessionStorage.removeItem('gstw_selected_quote_text')
  sessionStorage.removeItem('gstw_selected_quote_source')
  sessionStorage.removeItem('gstw_selected_quote_category')

  await loadUserSharedQuotes()
  await loadCategories()
  checkJustShared()
  await resetAndLoad()
  setupListeners()
}

// ════════════════════════════════════════════
// LOAD USER'S SHARED QUOTES (with dates)
// ════════════════════════════════════════════
async function loadUserSharedQuotes() {
  var result = await supabaseClient
    .from('shares')
    .select('quote_id, shared_at')
    .eq('user_id', currentUser.id)
    .order('shared_at', { ascending: false })

  if (result.data) {
    // Keep most recent share per quote
    userShares = {}
    result.data.forEach(function(s) {
      if (s.quote_id && !userShares[s.quote_id]) {
        userShares[s.quote_id] = s.shared_at
      }
    })
    userSharedQuoteIds = Object.keys(userShares)
    updateSharedCount()
  }
}

function updateSharedCount() {
  var count = userSharedQuoteIds.length
  var el = document.getElementById('sharedCount')
  if (el) el.textContent = count > 0 ? '(' + count + ')' : ''
}

// ════════════════════════════════════════════
// LOAD CATEGORIES
// ════════════════════════════════════════════
async function loadCategories() {
  var result = await supabaseClient
    .from('quotes')
    .select('category')
    .eq('status', 'live')
    .not('category', 'is', null)

  if (result.error || !result.data) return

  var unique = {}
  result.data.forEach(function(row) {
    if (row.category) {
      var c = row.category.toLowerCase().trim()
      if (c) unique[c] = true
    }
  })

  var categories = Object.keys(unique).sort()

  var container = document.getElementById('categoryChips')
  categories.forEach(function(cat) {
    var btn = document.createElement('button')
    btn.className = 'cat-chip flex-shrink-0 px-3.5 py-1.5 rounded-full text-xs capitalize'
    btn.textContent = cat
    btn.onclick = function() { setCategory(cat, btn) }
    container.appendChild(btn)
  })
}

// ════════════════════════════════════════════
// CHECK IF USER JUST SHARED
// ════════════════════════════════════════════
function checkJustShared() {
  var justShared = sessionStorage.getItem('gstw_just_shared')
  if (justShared === 'true') {
    sessionStorage.removeItem('gstw_just_shared')
    setTimeout(function() {
      setTab('shared')
      var tab = document.getElementById('tabShared')
      tab.classList.add('tab-pulse')
      setTimeout(function() { tab.classList.remove('tab-pulse') }, 400)
      showToast('Added to your Shared collection')
    }, 500)
  }
}

// ════════════════════════════════════════════
// RESET AND LOAD
// ════════════════════════════════════════════
async function resetAndLoad() {
  state.offset = 0
  state.reachedEnd = false
  loadedQuoteIds.clear()
  document.getElementById('quoteList').innerHTML =
    '<div class="skeleton h-40 w-full"></div>' +
    '<div class="skeleton h-36 w-full"></div>' +
    '<div class="skeleton h-36 w-full"></div>'
  document.getElementById('emptyState').classList.add('hidden')
  document.getElementById('endOfList').classList.add('hidden')

  // Toggle sort button visibility
  document.getElementById('sortBtn').classList.toggle('hidden', state.tab !== 'shared')

  await loadPage(true)
}

// ════════════════════════════════════════════
// LOAD PAGE
// ════════════════════════════════════════════
async function loadPage(isFirstPage) {
  if (state.loading || state.reachedEnd) return
  state.loading = true

  if (!isFirstPage) {
    document.getElementById('loadingMore').classList.remove('hidden')
  }

  var query = supabaseClient
    .from('quotes')
    .select('*')
    .eq('status', 'live')

  if (state.tab === 'shared') {
    if (userSharedQuoteIds.length === 0) {
      renderPage([], isFirstPage)
      state.reachedEnd = true
      state.loading = false
      document.getElementById('loadingMore').classList.add('hidden')
      return
    }
    query = query.in('id', userSharedQuoteIds)
  }

  if (state.category !== 'all') {
    query = query.eq('category', state.category)
  }

  if (state.search) {
    var s = state.search.replace(/'/g, "''")
    query = query.or(
      'text.ilike.%' + s + '%,' +
      'source.ilike.%' + s + '%,' +
      'category.ilike.%' + s + '%'
    )
  }

  // For "shared" tab, we'll re-sort in JS by share date
  // For "all" tab, order by published_at from DB
  if (state.tab === 'all') {
    query = query.order('published_at', { ascending: false })
  }

  query = query.range(state.offset, state.offset + state.pageSize - 1)

  var result = await query
  document.getElementById('loadingMore').classList.add('hidden')

  if (result.error) {
    console.error('[Library] Load error:', result.error)
    state.loading = false
    document.getElementById('quoteList').innerHTML = ''
    document.getElementById('emptyState').classList.remove('hidden')
    document.getElementById('emptyMsg').textContent = 'Error: ' + result.error.message
    return
  }

  var quotes = result.data || []

  // Tag/hashtag search enhancement
  if (state.search && isFirstPage) {
    var searchLower = state.search.toLowerCase()
    var tagResult = await supabaseClient
      .from('quotes')
      .select('*')
      .eq('status', 'live')
      .or('tags.cs.{' + searchLower + '},hashtags.cs.{' + searchLower + '}')
      .range(0, state.pageSize - 1)

    if (tagResult.data) {
      tagResult.data.forEach(function(q) {
        if (!quotes.find(function(existing) { return existing.id === q.id })) {
          quotes.push(q)
        }
      })
    }
  }

  // Sort Shared tab by user's share date
  if (state.tab === 'shared') {
    quotes.sort(function(a, b) {
      var aDate = userShares[a.id] || 0
      var bDate = userShares[b.id] || 0
      if (state.sortDir === 'desc') {
        return new Date(bDate) - new Date(aDate)
      } else {
        return new Date(aDate) - new Date(bDate)
      }
    })
  }

  renderPage(quotes, isFirstPage)

  state.offset += state.pageSize
  if (quotes.length < state.pageSize) {
    state.reachedEnd = true
    if (loadedQuoteIds.size > 0) {
      document.getElementById('endOfList').classList.remove('hidden')
    }
  }

  state.loading = false
}

// ════════════════════════════════════════════
// RENDER PAGE
// ════════════════════════════════════════════
function renderPage(quotes, isFirstPage) {
  var container = document.getElementById('quoteList')

  if (isFirstPage) {
    container.innerHTML = ''
    if (quotes.length === 0) {
      document.getElementById('emptyState').classList.remove('hidden')
      var msg = state.search
        ? 'No quotes match "' + state.search + '"'
        : state.tab === 'shared'
          ? "You haven't shared any quotes yet"
          : 'No quotes match this filter'
      document.getElementById('emptyMsg').textContent = msg
      return
    }
  }

  document.getElementById('emptyState').classList.add('hidden')

  quotes.forEach(function(quote) {
    if (loadedQuoteIds.has(quote.id)) return
    loadedQuoteIds.add(quote.id)

    var isInspiration = quote.source && !quote.source.includes(':')
    var publishDate = quote.published_at
      ? new Date(quote.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase()
      : ''
    var shareCount = quote.share_count || 0
    var isShared = userShares[quote.id]
    var sharedDate = isShared
      ? new Date(isShared).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : null

    // Determine hashtags to show
    var hashtagsToShow = []
    if (quote.hashtags && Array.isArray(quote.hashtags) && quote.hashtags.length > 0) {
      hashtagsToShow = quote.hashtags.slice(0, 4) // Cap at 4 to avoid overflow
    } else {
      // Fallback: default hashtag + category
      hashtagsToShow.push('spreadtheword')
      if (quote.category) {
        hashtagsToShow.push(quote.category.toLowerCase())
      }
    }

    var hashtagHtml = hashtagsToShow.map(function(h) {
      return '<span class="hashtag">' + escapeHtml(h) + '</span>'
    }).join('')

    var card = document.createElement('article')
    card.className = 'quote-card' + (isInspiration ? ' reflection-plate' : '')

    // Top row: publish date | (shared date if applicable) · share count
    var topRightHtml = ''
    if (sharedDate) {
      topRightHtml =
        '<div class="flex items-center gap-2">'
          + '<span class="shared-marker">'
            + '<span class="material-symbols-outlined text-[13px] filled">check_circle</span>'
            + 'Shared ' + sharedDate
          + '</span>'
          + '<span class="text-text-light text-[11px]">·</span>'
          + '<span class="share-marker">' + shareCount + ' shares</span>'
        + '</div>'
    } else {
      topRightHtml = '<span class="share-marker">' + shareCount + ' shares</span>'
    }

    card.innerHTML =
      '<div class="flex items-center justify-between mb-3">'
        + '<span class="text-[10px] font-bold text-text-light tracking-[0.15em]">' + publishDate + '</span>'
        + topRightHtml
      + '</div>'
      + '<blockquote class="font-headline font-bold text-[17px] text-text-dark leading-[1.45] mb-3">'
        + '\u201C' + escapeHtml(quote.text) + '\u201D</blockquote>'
      + '<cite class="block not-italic font-body font-bold text-[13px] '
        + (isInspiration ? 'text-gold-dim' : 'text-primary')
        + ' mb-4 tracking-[0.08em]">\u2014 ' + escapeHtml((quote.source || '').toUpperCase()) + '</cite>'
      + '<div class="flex items-center justify-between flex-wrap gap-y-2">'
        + '<div class="flex flex-wrap items-center">'
          + hashtagHtml
        + '</div>'
        + (state.tab === 'all' && isShared
          ? '<span class="shared-marker">'
            + '<span class="material-symbols-outlined text-[13px] filled">check_circle</span>Shared</span>'
          : state.tab === 'all'
            ? '<span class="text-[11px] font-bold text-text-light uppercase tracking-widest opacity-60">Share</span>'
            : ''
          )
      + '</div>'

    card.addEventListener('click', function() {
      selectQuoteAndShare(quote.id, quote.text, quote.source, quote.category)
    })

    container.appendChild(card)
  })
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function escapeHtml(str) {
  if (!str) return ''
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;')
}

// ════════════════════════════════════════════
// SELECT QUOTE → EDITOR
// ════════════════════════════════════════════
function selectQuoteAndShare(id, text, source, category) {
  sessionStorage.removeItem('gstw_final_image')
  sessionStorage.removeItem('gstw_personal_msg')
  sessionStorage.removeItem('gstw_hashtags')
  sessionStorage.removeItem('gstw_full_caption')
  sessionStorage.removeItem('gstw_overlay_x')
  sessionStorage.removeItem('gstw_overlay_y')
  sessionStorage.removeItem('gstw_bg_type')
  sessionStorage.removeItem('gstw_bg_value')

  sessionStorage.setItem('gstw_selected_quote_id', id)
  sessionStorage.setItem('gstw_selected_quote_text', text)
  sessionStorage.setItem('gstw_selected_quote_source', source)
  sessionStorage.setItem('gstw_selected_quote_category', (category || '').toLowerCase())

  window.location.href = 'editor.html'
}

// ════════════════════════════════════════════
// TAB HANDLERS
// ════════════════════════════════════════════
function setTab(tab) {
  if (state.tab === tab) return
  state.tab = tab
  document.getElementById('tabAll').classList.toggle('active', tab === 'all')
  document.getElementById('tabShared').classList.toggle('active', tab === 'shared')
  resetAndLoad()
}

function setCategory(cat, btn) {
  if (state.category === cat) return
  state.category = cat
  document.querySelectorAll('#categoryChips .cat-chip').forEach(function(t) {
    t.classList.remove('active')
  })
  btn.classList.add('active')
  resetAndLoad()
}

function toggleSort() {
  state.sortDir = state.sortDir === 'desc' ? 'asc' : 'desc'
  var icon = document.getElementById('sortIcon')
  icon.textContent = state.sortDir === 'desc' ? 'south' : 'north'
  showToast(state.sortDir === 'desc' ? 'Newest first' : 'Oldest first')
  resetAndLoad()
}

// ════════════════════════════════════════════
// LISTENERS
// ════════════════════════════════════════════
function setupListeners() {
  var input = document.getElementById('searchInput')
  input.addEventListener('input', function() {
    clearTimeout(searchDebounce)
    searchDebounce = setTimeout(function() {
      state.search = input.value.trim()
      resetAndLoad()
    }, 300)
  })

  var header = document.getElementById('pageHeader')
  window.addEventListener('scroll', function() {
    header.classList.toggle('header-scrolled', window.scrollY > 8)
  })

  var observer = new IntersectionObserver(function(entries) {
    if (entries[0].isIntersecting && !state.loading && !state.reachedEnd) {
      loadPage(false)
    }
  }, { rootMargin: '400px' })
  observer.observe(document.getElementById('scrollSentinel'))
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
function showToast(msg) {
  var existing = document.getElementById('libToast')
  if (existing) existing.remove()
  var t = document.createElement('div')
  t.id = 'libToast'
  t.className = 'fixed top-24 left-1/2 -translate-x-1/2 z-[200] bg-text-dark/95 backdrop-blur-md text-white text-xs font-bold px-5 py-2.5 rounded-full shadow-ambient whitespace-nowrap flex items-center gap-2'
  t.innerHTML = '<span class="material-symbols-outlined text-gold text-[14px]" style="font-variation-settings:\'FILL\' 1">check_circle</span> ' + msg
  document.body.appendChild(t)
  setTimeout(function() { if (t.parentNode) t.remove() }, 2200)
}

init()

</script>
</body>
</html>
