<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>GSTW — Library</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED','dark':'#16202A',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
          },
          boxShadow:{
            'natural':'0 4px 16px rgba(26,32,42,0.06)',
            'lifted':'0 8px 32px rgba(26,32,42,0.10)',
            'tactical':'0 4px 20px rgba(30,64,96,0.25)',
            'card':'0 2px 12px rgba(30,64,96,0.06)',
          },
        },
      },
    }
  </script>

  <style>
    body{
      font-family:'Manrope',sans-serif;
      background-color:#F0EDE6;
      -webkit-tap-highlight-color:transparent;
      min-height:100dvh;
      color:#1A1A1A;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}

    ::-webkit-scrollbar{display:none}
    body{-ms-overflow-style:none;scrollbar-width:none}

    .quote-card{
      transition:all 0.25s ease;
      cursor:pointer;
    }
    .quote-card:active{transform:scale(0.98)}

    .quote-card.animating-to-shared{
      animation:slideToShared 0.45s cubic-bezier(0.32,0,0.67,0) forwards;
      pointer-events:none;
    }
    @keyframes slideToShared{
      0%{opacity:1;transform:translateX(0) scale(1)}
      100%{opacity:0;transform:translateX(40px) scale(0.96)}
    }

    .segment-btn{transition:all 0.15s ease}
    .segment-btn.active{background:#1E4060;color:#fff;box-shadow:0 2px 8px rgba(30,64,96,0.25)}

    .filter-chip{transition:all 0.15s ease}
    .filter-chip.active{background:#1E4060;color:#fff;box-shadow:0 1px 6px rgba(30,64,96,0.2)}

    .search-wrap{transition:transform 0.2s ease}
    .search-wrap:focus-within{transform:scale(1.01)}

    /* Entry animation for shared tab quotes */
    @keyframes fadeInUp{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }
    .entry-anim{
      animation:fadeInUp 0.5s ease-out both;
    }

    .pb-safe{padding-bottom:env(safe-area-inset-bottom,16px)}
    .pt-safe{padding-top:env(safe-area-inset-top,0px)}

    .skeleton{
      background:linear-gradient(90deg,#e8e5de 25%,#f0ede6 50%,#e8e5de 75%);
      background-size:200% 100%;
      animation:shimmer 1.5s infinite;
      border-radius:12px;
    }
    @keyframes shimmer{
      0%{background-position:200% 0}
      100%{background-position:-200% 0}
    }
  </style>
</head>

<body class="pb-28">

<!-- ═══════════════════════════════════════════ -->
<!-- HEADER -->
<!-- ═══════════════════════════════════════════ -->
<header id="pageHeader" class="fixed top-0 left-0 right-0 z-50 bg-surface/95 backdrop-blur-xl border-b border-border-soft pt-safe">
  <div class="max-w-[430px] mx-auto px-5 pt-3 pb-3">

    <!-- Logo + Search -->
    <div class="flex items-center gap-3 mb-3">
      <a href="index.html" aria-label="Home">
        <img src="/images/logo.png" alt="GSTW" class="w-9 h-9 object-contain flex-shrink-0">
      </a>
      <div class="search-wrap relative flex-1">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-light text-[18px]">search</span>
        <input id="searchInput" type="text" oninput="searchQuotes(this.value)"
          placeholder="Search words, references, topics..."
          class="w-full bg-card-bg border border-border-soft rounded-2xl py-2.5 pl-9 pr-3 text-sm font-body
          text-text-dark focus:outline-none focus:ring-2 focus:ring-primary placeholder:text-text-light">

    <div class="flex gap-2 mb-2.5">

    <!-- Category chips -->
    <div id="categoryChips" class="flex gap-1.5 overflow-x-auto" style="-ms-overflow-style:none;scrollbar-width:none">

        class="filter-chip active flex-shrink-0 px-3.5 py-1 rounded-full text-[11px] font-bold border border-border-soft">

<!-- SCRIPT -->
<!-- ═══════════════════════════════════════════ -->
<script>

var supabaseClient = supabase.createClient(
  'https://nhymadutuhpjgkiurify.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM'
)

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
var currentUser = null
var userSharedQuoteIds = []
var loadedQuoteIds = new Set()

var state = {
  segment: 'all',
  category: 'all',
  search: '',
  offset: 0,
  pageSize: 20,
  loading: false,
  reachedEnd: false
}

var searchDebounce = null

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
async function init() {
  var sessionResult = await supabaseClient.auth.getSession()
  if (!sessionResult.data.session) {
    window.location.href = 'login.html'
    return
  }
  currentUser = sessionResult.data.session.user

  // Clear previous editing state
  sessionStorage.removeItem('gstw_final_image')
  sessionStorage.removeItem('gstw_personal_msg')
  sessionStorage.removeItem('gstw_hashtags')
  sessionStorage.removeItem('gstw_full_caption')
  sessionStorage.removeItem('gstw_overlay_x')
  sessionStorage.removeItem('gstw_overlay_y')
  sessionStorage.removeItem('gstw_bg_type')
  sessionStorage.removeItem('gstw_bg_value')

  await loadUserSharedQuotes()
  await loadCategories()
  await resetAndLoad()

  // Check if user just shared (returning from editor)
  if (sessionStorage.getItem('gstw_just_shared') === 'true') {
    sessionStorage.removeItem('gstw_just_shared')
    state.segment = 'shared'
    document.getElementById('tabAll').classList.remove('active')
    document.getElementById('tabAll').classList.add('text-text-muted')
    document.getElementById('tabShared').classList.add('active')
    document.getElementById('tabShared').classList.remove('text-text-muted')
    await resetAndLoad()
    document.getElementById('tabShared').style.animation = 'none'
    setTimeout(function() {
      document.getElementById('tabShared').style.animation = ''
      document.getElementById('tabShared').classList.add('entry-anim')
    }, 100)
  }

  setupListeners()
}

// ════════════════════════════════════════════
// LOAD SHARED QUOTE IDs
// ════════════════════════════════════════════
async function loadUserSharedQuotes() {
  var result = await supabaseClient
    .from('shares')
    .select('quote_id')
    .eq('user_id', currentUser.id)

  userSharedQuoteIds = (result.data || []).map(function(s) { return s.quote_id })
}

// ════════════════════════════════════════════
// LOAD CATEGORIES DYNAMICALLY
// ════════════════════════════════════════════
async function loadCategories() {
  var result = await supabaseClient
    .from('quotes')
    .select('category')
    .eq('status', 'live')
    .not('category', 'is', null)

  var unique = {}
  if (result.data) {
    result.data.forEach(function(row) {
      if (row.category) {
        var c = row.category.toLowerCase().trim()
        if (c) unique[c] = true
      }
    })
  }

  var categories = Object.keys(unique).sort()
  var container = document.getElementById('categoryChips')

  categories.forEach(function(cat) {
    var btn = document.createElement('button')
    btn.className = 'filter-chip flex-shrink-0 px-3.5 py-1 rounded-full text-[11px] font-bold border border-border-soft text-text-muted capitalize'
    btn.textContent = cat
    btn.onclick = function() { setCategory(cat, btn) }
    container.appendChild(btn)
  })
}

// ════════════════════════════════════════════
// RESET & LOAD
// ════════════════════════════════════════════
async function resetAndLoad() {
  state.offset = 0
  state.reachedEnd = false
  loadedQuoteIds.clear()
  document.getElementById('quoteList').innerHTML =
    '<div class="skeleton h-36 w-full"></div>' +
    '<div class="skeleton h-32 w-full"></div>'
  document.getElementById('emptyState').classList.add('hidden')
  document.getElementById('endOfList').classList.add('hidden')
  await loadPage(true)
}

// ════════════════════════════════════════════
// LOAD PAGE (fixed empty array bug)
// ════════════════════════════════════════════
async function loadPage(isFirstPage) {
  if (state.loading || state.reachedEnd) return
  state.loading = true

  if (!isFirstPage) document.getElementById('loadingMore').classList.remove('hidden')

  var query = supabaseClient.from('quotes').select('*').eq('status', 'live')

  // Segment filter — FIX: don't build broken 'in' / 'not' with empty arrays
  if (state.segment === 'shared') {
    if (userSharedQuoteIds.length === 0) {
      // Nothing shared yet — render empty immediately
      renderPage([], isFirstPage)
      state.reachedEnd = true
      state.loading = false
      document.getElementById('loadingMore').classList.add('hidden')
      return
    }
    query = query.in('id', userSharedQuoteIds)
  } else {
    // 'all' — exclude shared only if user actually has shared items
    if (userSharedQuoteIds.length > 0) {
      query = query.not('id', 'in', '(' + userSharedQuoteIds.map(function(id) {
        return '"' + id.replace(/"/g, '\\"') + '"'
      }).join(',') + ')')
    }
  }

  // Category filter
  if (state.category !== 'all') {
    query = query.eq('category', state.category)
  }

  // Search (text, source, category)
  if (state.search) {
    var s = state.search.replace(/'/g, "''")
    query = query.or('text.ilike.%' + s + '%,source.ilike.%' + s + '%,category.ilike.%' + s + '%')
  }

  query = query.order('published_at', { ascending: false }).range(state.offset, state.offset + state.pageSize - 1)

  var result = await query

  // Tag search enhancement (separate query, merged in JS)
  var tagResults = []
  if (state.search) {
    var tagQuery = supabaseClient.from('quotes').select('*').eq('status', 'live')
    // Note: supabase-js array search syntax via contains
    try {
      var tagRes = await tagQuery.contains('tags', [state.search.toLowerCase()])
      if (tagRes.data) tagResults = tagRes.data
    } catch (e) {
      // tags column missing or other issue — ignore
    }
  }

  document.getElementById('loadingMore').classList.add('hidden')

  if (result.error) {
    console.error('Library load error:', result.error)
    state.loading = false
    return
  }

  var quotes = result.data || []

  // Merge tag results that match search but weren't in text query
  if (tagResults.length > 0) {
    tagResults.forEach(function(tq) {
      if (!quotes.find(function(q) { return q.id === tq.id })) {
        if (!state.search || quotes.some(function(q) { return q.id === tq.id })) {
          // Only add if not already included
        }
        if (!loadedQuoteIds.has(tq.id) && !quotes.find(function(q) { return q.id === tq.id })) {
          // Apply segment/category filters to tag results too
          var passesSegment = (state.segment === 'shared' ? userSharedQuoteIds.indexOf(tq.id) !== -1 : true)
          if (passesSegment && (state.category === 'all' || (tq.category || '').toLowerCase() === state.category)) {
            quotes.push(tq)
          }
        }
      }
    })
  }

  renderPage(quotes, isFirstPage)

  state.offset += state.pageSize
  if (quotes.length < state.pageSize) {
    state.reachedEnd = true
    if (isFirstPage && quotes.length === 0) {
      document.getElementById('emptyState').classList.remove('hidden')
      document.getElementById('emptyMsg').textContent = state.segment === 'shared'
        ? "You haven't shared any quotes yet"
        : "No quotes match this filter"
    } else if (quotes.length > 0 && state.reachedEnd) {
      document.getElementById('endOfList').classList.remove('hidden')
    }
  }

  state.loading = false
}

// ════════════════════════════════════════════
// RENDER PAGE
// ════════════════════════════════════════════
function renderPage(quotes, isFirstPage) {
  var container = document.getElementById('quoteList')

  if (isFirstPage) {
    container.innerHTML = ''
    loadedQuoteIds.clear()
  }

  if (isFirstPage && quotes.length === 0) {
    document.getElementById('emptyState').classList.remove('hidden')
    return
  }

  document.getElementById('emptyState').classList.add('hidden')

  quotes.forEach(function(quote, i) {
    if (loadedQuoteIds.has(quote.id)) return
    loadedQuoteIds.add(quote.id)

    var isInspiration = quote.source && !quote.source.includes(':')
    var dateStr = quote.published_at
      ? new Date(quote.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      : ''
    var category = quote.category ? quote.category.toLowerCase() : ''
    var shareCount = quote.share_count || 0
    var isShared = userSharedQuoteIds.indexOf(quote.id) !== -1

    var card = document.createElement('article')
    card.className = 'quote-card bg-card-bg rounded-2xl p-5 shadow-card border border-border-soft entry-anim'
    card.style.animationDelay = (i * 0.06) + 's'
    card.dataset.id = quote.id

    var sharedTag = isShared
      ? '<span class="inline-flex items-center gap-1 text-[10px] font-bold text-primary bg-primary/10 px-2 py-0.5 rounded-full">Shared</span>'
      : ''

    card.innerHTML =
      '<div class="flex items-center justify-between mb-3">'
        + '<span class="text-[10px] font-bold text-text-light uppercase tracking-widest">' + dateStr + '</span>'
        + '<div class="flex items-center gap-2">'
          + sharedTag
          + (shareCount > 0 ? '<span class="text-[10px] text-text-light">' + shareCount + ' shares</span>' : '')
        + '</div>'
      + '</div>'
      + '<blockquote class="font-headline font-bold text-[16px] text-text-dark leading-relaxed mb-2">'
        + '\u201C' + escapeHtml(quote.text) + '\u201D</blockquote>'
      + '<cite class="block not-italic font-body font-bold text-sm text-primary mb-3 tracking-wider">'
        + '\u2014 ' + escapeHtml((quote.source || '').toUpperCase()) + '</cite>'
      + (category ? '<span class="inline-block bg-primary/10 text-primary px-2.5 py-1 rounded-full text-[10px] font-bold capitalize mb-3">' + escapeHtml(category) + '</span>' : '')
      + '<div class="flex justify-end">'
        + '<span class="text-[10px] text-text-light font-body">Tap to share</span>'
      + '</div>'

    card.addEventListener('click', function() {
      selectQuoteAndShare(card, quote.id, quote.text, quote.source, category)
    })

    container.appendChild(card)
  })
}

function escapeHtml(str) {
  if (!str) return ''
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;')
}

// ════════════════════════════════════════════
// SELECT QUOTE — SAVE TO DB + ANIMATE
// ════════════════════════════════════════════
async function selectQuoteAndShare(cardEl, id, text, source, category) {
  // Prevent double-tap
  if (cardEl.classList.contains('animating-to-shared')) return

  try {
    // Save to shares table
    var insertRes = await supabaseClient.from('shares').insert({
      user_id: currentUser.id,
      quote_id: id,
      shared_at: new Date().toISOString()
    })

    // If already shared, ignore conflict
    if (insertRes.error && !insertRes.error.message.includes('duplicate')) {
      console.error('Share insert error:', insertRes.error)
    }

    // Update local state
    if (userSharedQuoteIds.indexOf(id) === -1) {
      userSharedQuoteIds.push(id)
    }

    // Animate card out
    cardEl.classList.add('animating-to-shared')

    // Save session for editor
    sessionStorage.removeItem('gstw_final_image')
    sessionStorage.removeItem('gstw_personal_msg')
    sessionStorage.removeItem('gstw_hashtags')
    sessionStorage.removeItem('gstw_full_caption')
    sessionStorage.removeItem('gstw_overlay_x')
    sessionStorage.removeItem('gstw_overlay_y')
    sessionStorage.removeItem('gstw_bg_type')
    sessionStorage.removeItem('gstw_bg_value')

    sessionStorage.setItem('gstw_selected_quote_id', id)
    sessionStorage.setItem('gstw_selected_quote_text', text)
    sessionStorage.setItem('gstw_selected_quote_source', source || '')
    sessionStorage.setItem('gstw_selected_quote_category', category || 'faith')

    // Flag for library to open SHARED on return
    sessionStorage.setItem('gstw_just_shared', 'true')

    // Navigate to editor after animation completes
    setTimeout(function() {
      window.location.href = 'editor.html'
    }, 420)

  } catch (err) {
    console.error('Share error:', err)
  }
}

// ════════════════════════════════════════════
// FILTER HANDLERS
// ════════════════════════════════════════════
function setSegment(segment) {
  if (state.segment === segment) return
  state.segment = segment

  if (segment === 'all') {
    document.getElementById('tabAll').classList.add('active')
    document.getElementById('tabAll').classList.remove('text-text-muted')
    document.getElementById('tabShared').classList.remove('active')
    document.getElementById('tabShared').classList.add('text-text-muted')
  } else {
    document.getElementById('tabShared').classList.add('active')
    document.getElementById('tabShared').classList.remove('text-text-muted')
    document.getElementById('tabAll').classList.remove('active')
    document.getElementById('tabAll').classList.add('text-text-muted')
  }

  resetAndLoad()
}

function setCategory(cat, btn) {
  if (state.category === cat) return
  state.category = cat

  document.querySelectorAll('.filter-chip').forEach(function(t) {
    t.classList.remove('active')
  })
  btn.classList.add('active')

  resetAndLoad()
}

// ════════════════════════════════════════════
// SEARCH (DEBOUNCED)
// ════════════════════════════════════════════
function searchQuotes(query) {
  clearTimeout(searchDebounce)
  searchDebounce = setTimeout(function() {
    state.search = query.trim()
    resetAndLoad()
  }, 300)
}

// ════════════════════════════════════════════
// LISTENERS
// ════════════════════════════════════════════
function setupListeners() {
  // Infinite scroll
  var observer = new IntersectionObserver(function(entries) {
    if (entries[0].isIntersecting && !state.loading && !state.reachedEnd) {
      loadPage(false)
    }
  }, { rootMargin: '300px' })
  observer.observe(document.getElementById('scrollSentinel'))

  // Header shadow on scroll
  var header = document.getElementById('pageHeader')
  window.addEventListener('scroll', function() {
    header.classList.toggle('header-scrolled', window.scrollY > 6)
  }, { passive: true })
}

init()

</script>
</body>
</html>
