<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Library — Go Spread The Word</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED','dark':'#16202A',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
          },
          boxShadow:{
            'natural':'0 4px 16px rgba(26,32,42,0.06)',
            'lifted':'0 8px 32px rgba(26,32,42,0.10)',
            'tactical':'0 4px 20px rgba(30,64,96,0.25)',
            'card':'0 2px 12px rgba(30,64,96,0.06)',
          },
        },
      },
    }
  </script>

  <style>
    body{
      font-family:'Manrope',sans-serif;
      background-color:#F0EDE6;
      -webkit-tap-highlight-color:transparent;
      min-height:100dvh;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}
    .material-symbols-outlined{
      font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      display:inline-block;line-height:1;
    }
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .tactical-gradient{background:linear-gradient(145deg,#152E45,#1E4060)}
    .reflection-plate{border-left:4px solid #D4A24C}

    ::-webkit-scrollbar{display:none}
    body{-ms-overflow-style:none;scrollbar-width:none}

    .quote-card{transition:all 0.2s ease;cursor:pointer}
    .quote-card:active{transform:scale(0.98)}

    .nav-item{transition:all 0.2s ease}

    .search-wrap{transition:transform 0.2s ease}
    .search-wrap:focus-within{transform:scale(1.01)}

    .filter-tab{transition:all 0.15s ease}
    .filter-tab.active{background:#1E4060;color:white}

    .pb-safe{padding-bottom:env(safe-area-inset-bottom,16px)}

    .skeleton{
      background:linear-gradient(90deg,#e8e5de 25%,#f0ede6 50%,#e8e5de 75%);
      background-size:200% 100%;
      animation:shimmer 1.5s infinite;
      border-radius:12px;
    }
    @keyframes shimmer{
      0%{background-position:200% 0}
      100%{background-position:-200% 0}
    }
  </style>
</head>

<body class="text-text-dark pb-28">

<!-- HEADER -->
<header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-xl border-b border-border-soft">
  <div class="flex items-center justify-between px-5 pt-12 pb-4 max-w-[430px] mx-auto">
    <div>
      <h1 class="font-headline font-extrabold text-xl text-primary">The Library</h1>
      <p class="text-[11px] text-text-light font-body uppercase tracking-widest">All the Words</p>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="toggleSearch()"
        class="w-10 h-10 rounded-full bg-cream border border-border-soft flex items-center justify-center
        text-text-muted active:scale-90 transition-all">
        <span class="material-symbols-outlined text-[20px]">search</span>
      </button>
      <div id="avatarEl"
        class="w-10 h-10 rounded-full overflow-hidden bg-primary border-2 border-primary/20
        flex items-center justify-center">
        <span class="font-headline font-bold text-white text-sm">?</span>
      </div>
    </div>
  </div>

  <!-- Search Bar -->
  <div id="searchBar" class="hidden px-5 pb-3">
    <div class="search-wrap relative">
      <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-text-light text-[18px]">search</span>
      <input id="searchInput" type="text" oninput="searchQuotes(this.value)"
        placeholder="Search your collection..."
        class="w-full bg-card-bg border border-border-soft rounded-2xl py-3 pl-10 pr-4 text-sm font-body
        text-text-dark focus:outline-none focus:ring-2 focus:ring-primary placeholder:text-text-light">
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="pt-28 px-5 space-y-4 max-w-[430px] mx-auto">

  <div class="pt-2 pb-1">
    <h2 class="font-headline font-extrabold text-2xl text-text-dark">Quote Library</h2>
    <p class="text-[12px] text-text-light font-body mt-0.5">Tap any quote to share it</p>
  </div>

  <!-- Filter Tabs -->
  <div class="flex gap-2 overflow-x-auto pb-1" style="-ms-overflow-style:none;scrollbar-width:none">
    <button onclick="filterByCategory('all',this)"
      class="filter-tab active flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold border border-border-soft">
      All
    </button>
    <button onclick="filterByCategory('faith',this)"
      class="filter-tab flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold border border-border-soft text-text-muted">
      Faith
    </button>
    <button onclick="filterByCategory('courage',this)"
      class="filter-tab flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold border border-border-soft text-text-muted">
      Courage
    </button>
    <button onclick="filterByCategory('love',this)"
      class="filter-tab flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold border border-border-soft text-text-muted">
      Love
    </button>
    <button onclick="filterByCategory('strength',this)"
      class="filter-tab flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold border border-border-soft text-text-muted">
      Strength
    </button>
    <button onclick="filterByCategory('peace',this)"
      class="filter-tab flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold border border-border-soft text-text-muted">
      Peace
    </button>
  </div>

  <!-- Quote Cards -->
  <div id="quoteList" class="space-y-4">
    <div class="skeleton h-48 w-full"></div>
    <div class="skeleton h-44 w-full"></div>
    <div class="skeleton h-44 w-full"></div>
  </div>

  <!-- Empty State -->
  <div id="emptyState" class="hidden text-center py-16">
    <div class="w-16 h-16 rounded-2xl bg-cream flex items-center justify-center mx-auto mb-4">
      <span class="material-symbols-outlined text-text-light text-[32px]">search_off</span>
    </div>
    <h3 class="font-headline font-bold text-lg text-text-dark mb-1">No quotes found</h3>
    <p class="text-sm text-text-muted font-body">Try a different search or filter</p>
  </div>

  <div class="pt-4 pb-6 flex justify-center">
    <button onclick="loadMore()"
      class="border-2 border-primary/30 text-primary px-10 py-3 rounded-full font-bold text-sm active:scale-95 transition-all">
      Load More
    </button>
  </div>

</main>

<!-- BOTTOM NAV -->
<nav class="fixed bottom-0 left-0 w-full bg-card-bg/90 backdrop-blur-xl border-t border-border-soft z-50"
  style="padding-bottom:max(16px,env(safe-area-inset-bottom))">
  <div class="flex justify-around items-center px-2 pt-2 pb-1 max-w-[430px] mx-auto">
    <a href="index.html" class="nav-item flex flex-col items-center gap-0.5 px-4 py-1.5">
      <span class="material-symbols-outlined text-text-light text-[22px]">home</span>
      <span class="text-[10px] font-medium text-text-light">Home</span>
    </a>
    <a href="library.html" class="nav-item flex flex-col items-center gap-0.5 px-4 py-1.5">
      <span class="material-symbols-outlined text-primary text-[22px] filled">auto_stories</span>
      <span class="text-[10px] font-bold text-primary">Library</span>
    </a>
    <a href="cause.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5">
      <span class="material-symbols-outlined text-text-light text-[22px]">volunteer_activism</span>
      <span class="text-[10px] font-medium text-text-light">Projects</span>
    </a>
    <a href="impact.html" class="nav-item flex flex-col items-center gap-0.5 px-4 py-1.5">
      <span class="material-symbols-outlined text-text-light text-[22px]">bar_chart</span>
      <span class="text-[10px] font-medium text-text-light">Impact</span>
    </a>
    <a href="profile.html" class="nav-item flex flex-col items-center gap-0.5 px-4 py-1.5">
      <span class="material-symbols-outlined text-text-light text-[22px]">person</span>
      <span class="text-[10px] font-medium text-text-light">Profile</span>
    </a>
  </div>
</nav>

<!-- QUOTE DETAIL MODAL -->
<div id="quoteModal"
  class="hidden fixed inset-0 bg-dark/60 backdrop-blur-sm z-[100] flex items-end justify-center">
  <div class="w-full max-w-[430px] bg-card-bg rounded-t-3xl p-6 pb-10">
    <div class="w-10 h-1 bg-text-light/30 rounded-full mx-auto mb-5"></div>
    <blockquote id="modalQuote"
      class="font-headline font-bold text-lg text-text-dark leading-relaxed mb-3 text-center"></blockquote>
    <cite id="modalRef"
      class="block text-center not-italic font-bold text-sm text-primary tracking-wider mb-6"></cite>
    <div class="flex gap-3">
      <button onclick="useThisWord()"
        class="flex-1 py-3.5 tactical-gradient text-white font-headline font-bold rounded-2xl text-sm
        flex items-center justify-center gap-2 shadow-tactical active:scale-[0.98] transition-transform">
        <span class="material-symbols-outlined text-[18px]">campaign</span>
        Use This Word
      </button>
      <button onclick="closeModal()"
        class="w-14 h-12 bg-surface border border-border-soft rounded-2xl flex items-center justify-center
        text-text-muted active:scale-95 transition-all">
        <span class="material-symbols-outlined text-[20px]">close</span>
      </button>
    </div>
  </div>
</div>

<!-- SCRIPT -->
<script>

var supabaseClient = supabase.createClient(
  'https://nhymadutuhpjgkiurify.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM'
)

var currentUser = null
var allQuotes = []
var activeQuoteId = null
var userSharedQuoteIds = []

async function init() {
  var sessionResult = await supabaseClient.auth.getSession()
  if (!sessionResult.data.session) {
    window.location.href = 'login.html'
    return
  }
  currentUser = sessionResult.data.session.user

  // Get profile for avatar
  var profileResult = await supabaseClient
    .from('profiles')
    .select('full_name, nickname')
    .eq('id', currentUser.id)
    .single()

  var initials = currentUser.email.substring(0, 2).toUpperCase()
  if (profileResult.data && profileResult.data.full_name) {
    var parts = profileResult.data.full_name.trim().split(' ')
    if (parts.length >= 2) {
      initials = (parts[0][0] + parts[1][0]).toUpperCase()
    } else if (parts[0].length >= 2) {
      initials = parts[0].substring(0, 2).toUpperCase()
    }
  }
  var avatarEl = document.getElementById('avatarEl')
  if (avatarEl) {
    avatarEl.innerHTML = '<span class="font-headline font-bold text-white text-sm">' + initials + '</span>'
  }

  // Clear previous sharing state
  sessionStorage.removeItem('gstw_selected_quote_id')
  sessionStorage.removeItem('gstw_selected_quote_text')
  sessionStorage.removeItem('gstw_selected_quote_source')
  sessionStorage.removeItem('gstw_selected_quote_category')

  await loadQuotes()
  await loadUserSharedQuotes()
}

async function loadQuotes() {
  var result = await supabaseClient
    .from('quotes')
    .select('*')
    .eq('status', 'live')
    .order('published_at', { ascending: false })

  if (result.error) { showToast('Could not load quotes'); return }
  if (!result.data || result.data.length === 0) {
    document.getElementById('emptyState').classList.remove('hidden')
    document.getElementById('quoteList').innerHTML = ''
    return
  }

  allQuotes = result.data
  renderQuotes(allQuotes)
}

async function loadUserSharedQuotes() {
  if (!currentUser) return
  var result = await supabaseClient
    .from('shares')
    .select('quote_id')
    .eq('user_id', currentUser.id)

  if (result.data) {
    userSharedQuoteIds = result.data.map(function(s) { return s.quote_id })
  }
  updateShareButtonStates()
}

function updateShareButtonStates() {
  var cards = document.querySelectorAll('.quote-card')
  cards.forEach(function(card) {
    var quoteId = card.dataset.quoteId
    var shareBtn = card.querySelector('.share-btn')
    if (!shareBtn || !quoteId) return
    if (userSharedQuoteIds.indexOf(quoteId) !== -1) {
      shareBtn.innerHTML = '<span class="material-symbols-outlined text-[15px] filled">check_circle</span> Shared'
      shareBtn.className = 'bg-primary/10 text-primary px-4 py-2 rounded-full text-xs font-bold flex items-center gap-1.5 active:scale-95 transition-transform flex-shrink-0 share-btn'
    }
  })
}

function renderQuotes(quotes) {
  var container = document.getElementById('quoteList')
  container.innerHTML = ''

  if (quotes.length === 0) {
    document.getElementById('emptyState').classList.remove('hidden')
    return
  }
  document.getElementById('emptyState').classList.add('hidden')

  quotes.forEach(function(quote, index) {
    var isToday = index === 0
    var isInspiration = quote.source && !quote.source.includes(':')
    var dateStr = quote.published_at
      ? new Date(quote.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : 'Recent'
    var category   = quote.category ? quote.category.toLowerCase() : 'faith'
    var shareCount = quote.share_count || 0
    var isShared   = userSharedQuoteIds.indexOf(quote.id) !== -1

    var card = document.createElement('article')
    card.className = 'quote-card bg-card-bg rounded-2xl p-5 shadow-card border border-border-soft'
      + (isInspiration ? ' reflection-plate' : '')
    card.dataset.category      = category
    card.dataset.quoteId       = quote.id
    card.dataset.quoteText     = quote.text
    card.dataset.quoteSource   = quote.source
    card.dataset.quoteCategory = category

    var shareBtnHtml = isShared
      ? '<button class="bg-primary/10 text-primary px-4 py-2 rounded-full text-xs font-bold flex items-center gap-1.5 active:scale-95 transition-transform flex-shrink-0 share-btn">'
          + '<span class="material-symbols-outlined text-[15px] filled">check_circle</span> Shared</button>'
      : '<button class="tactical-gradient text-white px-4 py-2 rounded-full text-xs font-bold flex items-center gap-1.5 shadow-tactical active:scale-95 transition-transform flex-shrink-0 share-btn">'
          + '<span class="material-symbols-outlined text-[15px]">campaign</span> Share</button>'

    card.innerHTML =
      '<div class="flex items-center justify-between mb-3">'
        + '<div class="flex items-center gap-2">'
          + (isToday ? '<span class="w-2 h-2 rounded-full bg-primary animate-pulse flex-shrink-0"></span>' : '')
          + '<span class="text-[10px] font-bold ' + (isToday ? 'text-primary' : 'text-text-light') + ' uppercase tracking-widest">'
            + (isToday ? 'Today \u00B7 ' : '') + dateStr + '</span>'
        + '</div>'
        + (isToday
          ? '<span class="text-[10px] font-bold text-gold-dim bg-gold/10 px-2.5 py-1 rounded-full uppercase tracking-wider">Today\'s Word</span>'
          : '<span class="text-[10px] text-text-light font-body">' + shareCount + ' shares</span>')
      + '</div>'
      + '<blockquote class="font-headline font-bold text-[' + (isToday ? '17' : '16') + 'px] text-text-dark leading-relaxed mb-2">'
        + '\u201C' + quote.text + '\u201D</blockquote>'
      + '<cite class="block not-italic font-body font-bold text-sm '
        + (isInspiration ? 'text-gold-dim' : 'text-primary')
        + ' mb-4 tracking-wider">\u2014 ' + quote.source.toUpperCase() + '</cite>'
      + '<div class="flex items-center justify-between">'
        + '<div class="flex gap-1.5 flex-wrap">'
          + '<span class="bg-primary/10 text-primary px-2.5 py-1 rounded-full text-[10px] font-bold">#SpreadTheWord</span>'
          + '<span class="bg-primary/10 text-primary px-2.5 py-1 rounded-full text-[10px] font-bold">#' + (quote.category || 'Faith') + '</span>'
        + '</div>'
        + shareBtnHtml
      + '</div>'

    card.addEventListener('click', function(e) {
      if (e.target.closest('.share-btn')) return
      openQuote(card)
    })

    var shareBtn = card.querySelector('.share-btn')
    shareBtn.addEventListener('click', function(e) {
      e.stopPropagation()
      selectQuoteAndShare(quote.id, quote.text, quote.source, category)
    })

    container.appendChild(card)
  })
}

// ════════════════════════════════════════════
// SELECT QUOTE — clears ALL old state
// ════════════════════════════════════════════
function selectQuoteAndShare(id, text, source, category) {
  // Clear ALL previous sharing state
  sessionStorage.removeItem('gstw_final_image')
  sessionStorage.removeItem('gstw_personal_msg')
  sessionStorage.removeItem('gstw_hashtags')
  sessionStorage.removeItem('gstw_full_caption')
  sessionStorage.removeItem('gstw_overlay_x')
  sessionStorage.removeItem('gstw_overlay_y')
  sessionStorage.removeItem('gstw_bg_type')
  sessionStorage.removeItem('gstw_bg_value')

  // Set new quote
  sessionStorage.setItem('gstw_selected_quote_id', id)
  sessionStorage.setItem('gstw_selected_quote_text', text)
  sessionStorage.setItem('gstw_selected_quote_source', source)
  sessionStorage.setItem('gstw_selected_quote_category', category)

  // Go directly to editor (backgrounds merged in)
  window.location.href = 'editor.html'
}

function openQuote(card) {
  activeQuoteId = card.dataset.quoteId
  var modal = document.getElementById('quoteModal')
  modal.dataset.quoteId       = card.dataset.quoteId
  modal.dataset.quoteText     = card.dataset.quoteText
  modal.dataset.quoteSource   = card.dataset.quoteSource
  modal.dataset.quoteCategory = card.dataset.quoteCategory

  document.getElementById('modalQuote').textContent = '\u201C' + card.dataset.quoteText + '\u201D'
  document.getElementById('modalRef').textContent = '\u2014 ' + card.dataset.quoteSource.toUpperCase()

  modal.classList.remove('hidden')
  document.body.style.overflow = 'hidden'
}

function closeModal() {
  document.getElementById('quoteModal').classList.add('hidden')
  document.body.style.overflow = ''
  activeQuoteId = null
}

document.getElementById('quoteModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal()
})

function useThisWord() {
  var modal = document.getElementById('quoteModal')
  closeModal()
  selectQuoteAndShare(
    modal.dataset.quoteId,
    modal.dataset.quoteText,
    modal.dataset.quoteSource,
    modal.dataset.quoteCategory
  )
}

function toggleSearch() {
  var bar = document.getElementById('searchBar')
  bar.classList.toggle('hidden')
  if (!bar.classList.contains('hidden')) {
    document.getElementById('searchInput').focus()
  }
}

function searchQuotes(query) {
  var q = query.toLowerCase().trim()
  if (!q) { renderQuotes(allQuotes); return }
  renderQuotes(allQuotes.filter(function(quote) {
    return quote.text.toLowerCase().includes(q)
      || quote.source.toLowerCase().includes(q)
      || (quote.category && quote.category.toLowerCase().includes(q))
  }))
}

function filterByCategory(cat, btn) {
  document.querySelectorAll('.filter-tab').forEach(function(t) {
    t.classList.remove('active', 'bg-primary', 'text-white')
    t.classList.add('text-text-muted')
  })
  btn.classList.add('active', 'bg-primary', 'text-white')
  btn.classList.remove('text-text-muted')
  renderQuotes(cat === 'all' ? allQuotes : allQuotes.filter(function(q) {
    return q.category && q.category.toLowerCase() === cat
  }))
}

function loadMore() { showToast('All quotes loaded') }

function showToast(msg) {
  var existing = document.getElementById('libToast')
  if (existing) existing.remove()
  var t = document.createElement('div')
  t.id = 'libToast'
  t.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-[200] bg-dark/90 backdrop-blur-md text-white text-xs font-bold px-5 py-3 rounded-full shadow-lifted whitespace-nowrap flex items-center gap-2'
  t.innerHTML = '<span class="material-symbols-outlined text-gold text-[14px]" style="font-variation-settings:\'FILL\' 1">check_circle</span> ' + msg
  document.body.appendChild(t)
  setTimeout(function() { if (t.parentNode) t.remove() }, 2200)
}

init()

</script>
</body>
</html>
