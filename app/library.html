  <style>
    body {
      font-family:'Manrope',sans-serif;
      background:#fbf9f4;
      -webkit-tap-highlight-color:transparent;
      min-height:100dvh;
      color:#31332e;
      letter-spacing:-0.005em;
    }
    .font-headline { font-family:'Plus Jakarta Sans',sans-serif; letter-spacing:-0.02em; }
    .font-quote { font-family:'Lora',serif; }
    .material-symbols-outlined {
      font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      display:inline-block; line-height:1;
    }
    .filled { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }

    ::-webkit-scrollbar { display:none; }
    body { -ms-overflow-style:none; scrollbar-width:none; }

    .signature-gradient { background:linear-gradient(135deg,#3d6285,#6b9bc3); }

    /* ── Cards ── */
    .quote-card {
      background:#ffffff;
      border-radius:20px;
      padding:22px;
      transition:background-color 0.2s ease, transform 0.15s ease;
      cursor:pointer;
    }
    .quote-card:hover { background:#f5f4ed; }
    .quote-card:active { transform:scale(0.985); }

    /* Reflection accent — tertiary warm bar */
    .reflection-plate { position:relative; }
    .reflection-plate::before {
      content:'';
      position:absolute;
      top:22px; bottom:22px; left:0;
      width:3px;
      background:#ad332b;
      border-radius:0 3px 3px 0;
      opacity:0.6;
    }

    /* Quote hover focus */
    .quote-card .card-meta { transition:opacity 0.25s ease; }
    .quote-card:hover .card-meta { opacity:0.6; }
    .quote-card:hover .card-quote { transform:scale(1.005); }
    .card-quote { transition:transform 0.25s ease; }

    @media (hover:none) {
      .quote-card:hover .card-meta { opacity:1; }
      .quote-card:hover .card-quote { transform:none; }
      .quote-card:active .card-meta { opacity:0.5; }
      .quote-card:active .card-quote { transform:scale(1.005); }
    }

    /* ── Tabs ── */
    .content-tab {
      position:relative;
      padding:10px 4px;
      font-size:13px;
      font-weight:700;
      color:#7a7b75;
      transition:color 0.15s ease;
      letter-spacing:0.01em;
    }
    .content-tab.active { color:#31332e; }
    .content-tab.active::after {
      content:'';
      position:absolute;
      bottom:0; left:0; right:0;
      height:2px;
      background:#3d6285;
      border-radius:2px 2px 0 0;
    }

    /* ── Category chips ── */
    .cat-chip {
      transition:all 0.15s ease;
      background:#f5f4ed;
      color:#5e6059;
      font-weight:600;
      letter-spacing:0.01em;
      white-space:nowrap;
      flex-shrink:0;
    }
    .cat-chip.active {
      background:#3d6285;
      color:#f7f9ff;
    }

    .chip-scroll {
      -webkit-mask-image:linear-gradient(90deg,transparent 0,#000 12px,#000 calc(100% - 24px),transparent 100%);
      mask-image:linear-gradient(90deg,transparent 0,#000 12px,#000 calc(100% - 24px),transparent 100%);
      /* Desktop scroll fix */
      overflow-x:auto;
      scroll-behavior:smooth;
      cursor:grab;
    }
    .chip-scroll:active { cursor:grabbing; }

    /* ── Hashtag pills ── */
    .hashtag {
      display:inline-block;
      color:#5e6059;
      font-size:11px;
      font-weight:600;
      margin-right:8px;
      letter-spacing:0.01em;
    }
    .hashtag::before { content:'#'; opacity:0.5; margin-right:1px; }

    /* ── Platform mini icons ── */
    .platform-icon-mini {
      width:16px; height:16px;
      border-radius:4px;
      object-fit:contain;
    }
    .platform-dot {
      width:16px; height:16px;
      border-radius:4px;
      display:flex; align-items:center; justify-content:center;
      font-size:8px; font-weight:700;
    }

    /* ── Share CTA on card ── */
    .share-cta {
      display:inline-flex;
      align-items:center;
      gap:4px;
      background:#efeee7;
      color:#3d6285;
      font-size:11px;
      font-weight:700;
      padding:4px 10px;
      border-radius:20px;
      transition:all 0.15s ease;
      letter-spacing:0.02em;
    }
    .share-cta:hover { background:#e3e3db; }

    /* ── Shared badge ── */
    .shared-badge {
      display:inline-flex;
      align-items:center;
      gap:5px;
      font-size:11px;
      font-weight:700;
      color:#3d6285;
      letter-spacing:0.02em;
    }

    /* ── Search ── */
    .rq-search {
      background:#f5f4ed;
      border:1px solid transparent;
      transition:background 0.2s ease, border-color 0.2s ease;
    }
    .rq-search:focus {
      background:#ffffff;
      border-color:rgba(61,98,133,0.3);
      outline:none;
    }

    /* ── Sort button ── */
    .sort-btn {
      width:32px; height:32px;
      border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      color:#5e6059;
      transition:background 0.15s ease;
    }
    .sort-btn:hover { background:#f5f4ed; }
    .sort-btn:active { transform:scale(0.9); }

    /* ── Glass header ── */
    .glass-header {
      background:rgba(251,249,244,0.82);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      transition:box-shadow 0.2s ease;
    }
    .header-scrolled { box-shadow:0 8px 24px rgba(49,51,46,0.04); }

    /* ── Glass bottom nav ── */
    .glass-nav {
      background:rgba(255,255,255,0.85);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
    }

    /* ── Skeleton ── */
    .skeleton {
      background:linear-gradient(90deg,#f0eee6 25%,#f7f5ee 50%,#f0eee6 75%);
      background-size:200% 100%;
      animation:shimmer 1.5s infinite;
      border-radius:20px;
    }
    @keyframes shimmer {
      0% { background-position:200% 0; }
      100% { background-position:-200% 0; }
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @keyframes tabPulse {
      0%,100% { transform:scale(1); }
      50% { transform:scale(1.05); }
    }
    .tab-pulse { animation:tabPulse 0.4s ease-out; }

<script>

var supabaseClient = supabase.createClient(

)

// Platform icon map
var platformIcons = {
  'instagram':  { src:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/132px-Instagram_logo_2016.svg.png', type:'img' },
  'facebook':   { src:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/2023_Facebook_icon.svg/120px-2023_Facebook_icon.svg.png', type:'img' },
  'whatsapp':   { src:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/120px-WhatsApp.svg.png', type:'img' },
  'telegram':   { src:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/120px-Telegram_logo.svg.png', type:'img' },
  'tiktok':     { src:'https://upload.wikimedia.org/wikipedia/en/thumb/a/a9/TikTok_logo.svg/100px-TikTok_logo.svg.png', type:'img', extraClass:'bg-white p-0.5' },
  'snapchat':   { src:'https://upload.wikimedia.org/wikipedia/en/thumb/c/c4/Snapchat_logo.svg/120px-Snapchat_logo.svg.png', type:'img' },
  'x':          { type:'dot', bg:'#000', label:'𝕏', textColor:'#fff' },
  'twitter':    { type:'dot', bg:'#000', label:'𝕏', textColor:'#fff' },
  'native-share':{ type:'dot', bg:'#3d6285', label:'✓', textColor:'#fff' },
  'desktop':    { type:'dot', bg:'#5e6059', label:'💻', textColor:'#fff' },
  'desktop-download':{ type:'dot', bg:'#5e6059', label:'⬇', textColor:'#fff' },
}

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
var currentUser = null
var userShares = {}
var userSharePlatforms = {}   // { quote_id: ['instagram','whatsapp',...] }
var userSharedQuoteIds = []
var loadedQuoteIds = new Set()

var state = {
  tab:'all', category:'all', search:'',
  sortDir:'desc', offset:0, pageSize:20,
  loading:false, reachedEnd:false
}

var searchDebounce = null

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
async function init() {
  var s = await supabaseClient.auth.getSession()
  if (!s.data.session) { window.location.href='login.html'; return }
  currentUser = s.data.session.user

  sessionStorage.removeItem('gstw_selected_quote_id')
  sessionStorage.removeItem('gstw_selected_quote_text')
  sessionStorage.removeItem('gstw_selected_quote_source')
  sessionStorage.removeItem('gstw_selected_quote_category')

  await loadUserSharedQuotes()
  await loadCategories()
  checkJustShared()
  await resetAndLoad()
  setupListeners()
}

// ════════════════════════════════════════════
// LOAD USER SHARED QUOTES + PLATFORMS
// ════════════════════════════════════════════
async function loadUserSharedQuotes() {
  var result = await supabaseClient
    .from('shares')
    .select('quote_id, shared_at, platform')
    .eq('user_id', currentUser.id)
    .order('shared_at', { ascending: false })

  if (result.data) {
    userShares = {}
    userSharePlatforms = {}
    result.data.forEach(function(s) {
      if (!s.quote_id) return
      // Keep most recent share date
      if (!userShares[s.quote_id]) userShares[s.quote_id] = s.shared_at
      // Collect unique platforms
      if (!userSharePlatforms[s.quote_id]) userSharePlatforms[s.quote_id] = []
      var pNorm = (s.platform || '').toLowerCase().trim()
      if (pNorm && userSharePlatforms[s.quote_id].indexOf(pNorm) === -1) {
        userSharePlatforms[s.quote_id].push(pNorm)
      }
    })
    userSharedQuoteIds = Object.keys(userShares)
    updateSharedCount()
  }
}

function updateSharedCount() {
  var el = document.getElementById('sharedCount')
  if (el) el.textContent = userSharedQuoteIds.length > 0 ? '(' + userSharedQuoteIds.length + ')' : ''
}

// ════════════════════════════════════════════
// CATEGORIES
// ════════════════════════════════════════════
async function loadCategories() {
  var result = await supabaseClient
    .from('quotes')
    .select('category')
    .eq('status','live')
    .not('category','is',null)

  if (result.error || !result.data) return
  var unique = {}
  result.data.forEach(function(r) {
    if (r.category) { var c = r.category.toLowerCase().trim(); if (c) unique[c] = true }
  })

  var container = document.getElementById('categoryChips')
  Object.keys(unique).sort().forEach(function(cat) {
    var btn = document.createElement('button')
    btn.className = 'cat-chip px-3.5 py-1.5 rounded-full font-body capitalize'
    btn.style.fontSize = '12px'
    btn.textContent = cat
    btn.onclick = function() { setCategory(cat, btn) }
    container.appendChild(btn)
  })
}

// ════════════════════════════════════════════
// JUST SHARED CHECK
// ════════════════════════════════════════════
function checkJustShared() {
  var js = sessionStorage.getItem('gstw_just_shared')
  if (js === 'true') {
    sessionStorage.removeItem('gstw_just_shared')
    setTimeout(function() {
      setTab('shared')
      var tab = document.getElementById('tabShared')
      tab.classList.add('tab-pulse')
      setTimeout(function() { tab.classList.remove('tab-pulse') }, 400)
      showToast('Added to your Shared collection')
    }, 500)
  }
}

// ════════════════════════════════════════════
// RESET AND LOAD
// ════════════════════════════════════════════
async function resetAndLoad() {
  state.offset = 0
  state.reachedEnd = false
  loadedQuoteIds.clear()
  document.getElementById('quoteList').innerHTML =
    '<div class="skeleton h-40 w-full"></div>'
    + '<div class="skeleton h-36 w-full"></div>'
    + '<div class="skeleton h-36 w-full"></div>'
  document.getElementById('emptyState').classList.add('hidden')
  document.getElementById('endOfList').classList.add('hidden')
  document.getElementById('sortBtn').classList.toggle('hidden', state.tab !== 'shared')
  await loadPage(true)
}

// ════════════════════════════════════════════
// LOAD PAGE
// ════════════════════════════════════════════
async function loadPage(isFirstPage) {
  if (state.loading || state.reachedEnd) return
  state.loading = true
  if (!isFirstPage) document.getElementById('loadingMore').classList.remove('hidden')

  var query = supabaseClient.from('quotes').select('*').eq('status','live')

  if (state.tab === 'shared') {
    if (userSharedQuoteIds.length === 0) {
      renderPage([], isFirstPage)
      state.reachedEnd = true
      state.loading = false
      document.getElementById('loadingMore').classList.add('hidden')
      return
    }
    query = query.in('id', userSharedQuoteIds)
  }

  if (state.category !== 'all') query = query.eq('category', state.category)

  if (state.search) {
    var s = state.search.replace(/'/g, "''")
    query = query.or('text.ilike.%'+s+'%,source.ilike.%'+s+'%,category.ilike.%'+s+'%')
  }

  if (state.tab === 'all') query = query.order('published_at', { ascending: false })
  query = query.range(state.offset, state.offset + state.pageSize - 1)

  var result = await query
  document.getElementById('loadingMore').classList.add('hidden')

  if (result.error) {
    console.error('[Library] Load error:', result.error)
    state.loading = false
    document.getElementById('quoteList').innerHTML = ''
    showEmptyState('search_off', 'Something went wrong', result.error.message)
    return
  }

  var quotes = result.data || []

  // Tag search enhancement
  if (state.search && isFirstPage) {
    var sl = state.search.toLowerCase()
    var tagResult = await supabaseClient
      .from('quotes').select('*').eq('status','live')
      .or('tags.cs.{'+sl+'},hashtags.cs.{'+sl+'}')
      .range(0, state.pageSize - 1)
    if (tagResult.data) {
      tagResult.data.forEach(function(q) {
        if (!quotes.find(function(e) { return e.id === q.id })) quotes.push(q)
      })
    }
  }

  // Sort shared tab by share date
  if (state.tab === 'shared') {
    quotes.sort(function(a, b) {
      var aD = userShares[a.id] || 0, bD = userShares[b.id] || 0
      return state.sortDir === 'desc' ? new Date(bD) - new Date(aD) : new Date(aD) - new Date(bD)
    })
  }

  renderPage(quotes, isFirstPage)
  state.offset += state.pageSize
  if (quotes.length < state.pageSize) {
    state.reachedEnd = true
    if (loadedQuoteIds.size > 0) document.getElementById('endOfList').classList.remove('hidden')
  }
  state.loading = false
}

// ════════════════════════════════════════════
// RENDER PAGE
// ════════════════════════════════════════════
function renderPage(quotes, isFirstPage) {
  var container = document.getElementById('quoteList')

  if (isFirstPage) {
    container.innerHTML = ''
    if (quotes.length === 0) {
      if (state.tab === 'shared') {
        showEmptyState('auto_stories', "You haven't shared any quotes yet", 'Start spreading the word from the All tab', 'Browse Quotes', 'browseAll')
      } else if (state.search) {
        showEmptyState('search_off', 'No results found', 'No quotes match "' + state.search + '"')
      } else {
        showEmptyState('filter_list_off', 'Nothing here yet', 'Try a different filter')
      }
      return
    }
  }

  document.getElementById('emptyState').classList.add('hidden')

  quotes.forEach(function(quote) {
    if (loadedQuoteIds.has(quote.id)) return
    loadedQuoteIds.add(quote.id)

    var isInspiration = quote.source && !quote.source.includes(':')
    var publishDate = quote.published_at
      ? new Date(quote.published_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase()
      : ''
    var shareCount = quote.share_count || 0
    var isShared = !!userShares[quote.id]
    var sharedDate = isShared
      ? new Date(userShares[quote.id]).toLocaleDateString('en-US',{month:'short',day:'numeric'})
      : null
    var platforms = userSharePlatforms[quote.id] || []

    // Hashtags
    var hashtagsToShow = []
    if (quote.hashtags && Array.isArray(quote.hashtags) && quote.hashtags.length > 0) {
      hashtagsToShow = quote.hashtags.slice(0, 4)
    } else {
      hashtagsToShow.push('spreadtheword')
      if (quote.category) hashtagsToShow.push(quote.category.toLowerCase())
    }

    var hashtagHtml = hashtagsToShow.map(function(h) {
      return '<span class="hashtag">' + escapeHtml(h) + '</span>'
    }).join('')

    // Platform icons HTML
    var platformHtml = ''
    if (isShared && platforms.length > 0) {
      platformHtml = '<div class="flex items-center gap-1">'
      // Deduplicate display (e.g. 'native-share' doesn't need icon if specific platform exists)
      var displayPlatforms = platforms.filter(function(p) {
        return p !== 'native-share' && p !== 'desktop' && p !== 'desktop-download' && p !== 'unknown'
      })
      // If only generic shares, show a check
      if (displayPlatforms.length === 0) displayPlatforms = platforms.slice(0, 1)

      displayPlatforms.slice(0, 4).forEach(function(p) {
        var cfg = platformIcons[p]
        if (!cfg) return
        if (cfg.type === 'img') {
          platformHtml += '<img src="'+cfg.src+'" class="platform-icon-mini'+(cfg.extraClass?' '+cfg.extraClass:'')+'" alt="'+p+'" title="Shared on '+p+'">'
        } else {
          platformHtml += '<div class="platform-dot" style="background:'+cfg.bg+';color:'+cfg.textColor+'" title="Shared on '+p+'">'+cfg.label+'</div>'
        }
      })
      if (platforms.length > 4) {
        platformHtml += '<span class="font-body text-on-surface-variant" style="font-size:10px;font-weight:600;">+' + (platforms.length - 4) + '</span>'
      }
      platformHtml += '</div>'
    }

    // Build card
    var card = document.createElement('article')
    card.className = 'quote-card' + (isInspiration ? ' reflection-plate' : '')
    card.style.animation = 'fadeUp 0.4s ease-out both'

    // Footer varies by tab
    var footerHtml = ''

    if (state.tab === 'shared') {
      // Shared tab: show platforms + shared date + share count
      footerHtml =
        '<div class="card-meta flex items-center justify-between flex-wrap gap-y-2">'
          + '<div class="flex flex-wrap items-center">' + hashtagHtml + '</div>'
          + '<div class="flex items-center gap-2">'
            + platformHtml
            + '<span class="font-body text-outline" style="font-size:10px;font-weight:500;">' + shareCount + ' shares</span>'
          + '</div>'
        + '</div>'
    } else {
      // All tab: show platforms if shared, or Share CTA
      if (isShared) {
        footerHtml =
          '<div class="card-meta flex items-center justify-between flex-wrap gap-y-2">'
            + '<div class="flex flex-wrap items-center">' + hashtagHtml + '</div>'
            + '<div class="flex items-center gap-3">'
              + platformHtml
              + '<span class="share-cta"><span class="material-symbols-outlined text-[13px]">ios_share</span>Share</span>'
            + '</div>'
          + '</div>'
      } else {
        footerHtml =
          '<div class="card-meta flex items-center justify-between flex-wrap gap-y-2">'
            + '<div class="flex flex-wrap items-center">' + hashtagHtml + '</div>'
            + '<span class="share-cta"><span class="material-symbols-outlined text-[13px]">ios_share</span>Share</span>'
          + '</div>'
      }
    }

    // Top meta
    var topRightHtml = ''
    if (state.tab === 'shared' && sharedDate) {
      topRightHtml =
        '<span class="shared-badge">'
          + '<span class="material-symbols-outlined text-[13px] filled">check_circle</span>'
          + 'Shared ' + sharedDate
        + '</span>'
    } else {
      topRightHtml = '<span class="font-body text-outline" style="font-size:11px;font-weight:500;">' + shareCount + ' shares</span>'
    }

    card.innerHTML =
      '<div class="card-meta flex items-center justify-between mb-2">'
        + '<span class="font-body text-outline tracking-widest" style="font-size:10px;font-weight:500;">' + publishDate + '</span>'
        + topRightHtml
      + '</div>'
      + '<blockquote class="card-quote font-quote text-on-surface my-4" style="font-size:19px;line-height:1.5;">'
        + '\u201C' + escapeHtml(quote.text) + '\u201D'
      + '</blockquote>'
      + '<cite class="card-meta block not-italic font-body font-semibold tracking-widest uppercase mb-4 '
        + (isInspiration ? 'text-tertiary-dim' : 'text-primary')
        + '" style="font-size:11px;">\u2014 ' + escapeHtml((quote.source || '').toUpperCase()) + '</cite>'
      + footerHtml

    card.addEventListener('click', function() {
      selectQuoteAndShare(quote.id, quote.text, quote.source, quote.category)
    })

    container.appendChild(card)
  })
}

// ════════════════════════════════════════════
// EMPTY STATE
// ════════════════════════════════════════════
function showEmptyState(icon, title, msg, ctaText, ctaAction) {
  document.getElementById('emptyState').classList.remove('hidden')
  document.getElementById('emptyIcon').textContent = icon
  document.querySelector('#emptyState h3').textContent = title
  document.getElementById('emptyMsg').textContent = msg

  var ctaBtn = document.getElementById('emptyCta')
  if (ctaText && ctaAction) {
    ctaBtn.textContent = ctaText
    ctaBtn.setAttribute('data-action', ctaAction)
    ctaBtn.classList.remove('hidden')
  } else {
    ctaBtn.classList.add('hidden')
  }
}

function handleEmptyCta() {
  var action = document.getElementById('emptyCta').getAttribute('data-action')
  if (action === 'browseAll') {
    setTab('all')
  }
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function escapeHtml(str) {
  if (!str) return ''
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')
}

// ════════════════════════════════════════════
// SELECT QUOTE → EDITOR
// ════════════════════════════════════════════
function selectQuoteAndShare(id, text, source, category) {
  sessionStorage.removeItem('gstw_final_image')
  sessionStorage.removeItem('gstw_personal_msg')
  sessionStorage.removeItem('gstw_hashtags')
  sessionStorage.removeItem('gstw_full_caption')
  sessionStorage.removeItem('gstw_overlay_x')
  sessionStorage.removeItem('gstw_overlay_y')
  sessionStorage.removeItem('gstw_bg_type')
  sessionStorage.removeItem('gstw_bg_value')

  sessionStorage.setItem('gstw_selected_quote_id', id)
  sessionStorage.setItem('gstw_selected_quote_text', text)
  sessionStorage.setItem('gstw_selected_quote_source', source)
  sessionStorage.setItem('gstw_selected_quote_category', (category||'').toLowerCase())

  window.location.href = 'editor.html'
}

// ════════════════════════════════════════════
// TAB / CATEGORY / SORT
// ════════════════════════════════════════════
function setTab(tab) {
  if (state.tab === tab) return
  state.tab = tab
  document.getElementById('tabAll').classList.toggle('active', tab === 'all')
  document.getElementById('tabShared').classList.toggle('active', tab === 'shared')
  resetAndLoad()
}

function setCategory(cat, btn) {
  if (state.category === cat) return
  state.category = cat
  document.querySelectorAll('#categoryChips .cat-chip').forEach(function(t) { t.classList.remove('active') })
  btn.classList.add('active')
  resetAndLoad()
}

function toggleSort() {
  state.sortDir = state.sortDir === 'desc' ? 'asc' : 'desc'
  document.getElementById('sortIcon').textContent = state.sortDir === 'desc' ? 'south' : 'north'
  showToast(state.sortDir === 'desc' ? 'Newest first' : 'Oldest first')
  resetAndLoad()
}

// ════════════════════════════════════════════
// LISTENERS
// ════════════════════════════════════════════
function setupListeners() {
  // Search
  var input = document.getElementById('searchInput')
  input.addEventListener('input', function() {
    clearTimeout(searchDebounce)
    searchDebounce = setTimeout(function() {
      state.search = input.value.trim()
      resetAndLoad()
    }, 300)
  })

  // Header scroll shadow
  window.addEventListener('scroll', function() {
    document.getElementById('pageHeader').classList.toggle('header-scrolled', window.scrollY > 8)
  })

  // Infinite scroll
  var observer = new IntersectionObserver(function(entries) {
    if (entries[0].isIntersecting && !state.loading && !state.reachedEnd) loadPage(false)
  }, { rootMargin:'400px' })
  observer.observe(document.getElementById('scrollSentinel'))

  // Desktop chip scroll with drag
  var chipContainer = document.getElementById('categoryChips')
  var isDragging = false, startX = 0, scrollLeft = 0

  chipContainer.addEventListener('mousedown', function(e) {
    isDragging = true
    startX = e.pageX - chipContainer.offsetLeft
    scrollLeft = chipContainer.scrollLeft
    chipContainer.style.cursor = 'grabbing'
  })
  chipContainer.addEventListener('mouseleave', function() {
    isDragging = false
    chipContainer.style.cursor = 'grab'
  })
  chipContainer.addEventListener('mouseup', function() {
    isDragging = false
    chipContainer.style.cursor = 'grab'
  })
  chipContainer.addEventListener('mousemove', function(e) {
    if (!isDragging) return
    e.preventDefault()
    var x = e.pageX - chipContainer.offsetLeft
    var walk = (x - startX) * 1.5
    chipContainer.scrollLeft = scrollLeft - walk
  })

  // Also support wheel horizontal scroll on desktop
  chipContainer.addEventListener('wheel', function(e) {
    if (Math.abs(e.deltaX) < Math.abs(e.deltaY)) {
      e.preventDefault()
      chipContainer.scrollLeft += e.deltaY
    }
  }, { passive: false })
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
function showToast(msg) {
  var existing = document.getElementById('libToast')
  if (existing) existing.remove()
  var t = document.createElement('div')
  t.id = 'libToast'
  t.className = 'fixed top-24 left-1/2 -translate-x-1/2 z-[200] bg-inverse-surface/90 backdrop-blur-md text-inverse-on-surface font-body font-semibold px-5 py-2.5 rounded-full shadow-float whitespace-nowrap flex items-center gap-2'
  t.style.fontSize = '13px'
  t.innerHTML = '<span class="material-symbols-outlined text-primary-container text-[14px] filled">check_circle</span> ' + msg
  document.body.appendChild(t)
  setTimeout(function() { if (t.parentNode) t.remove() }, 2200)
}

init()

</script>
