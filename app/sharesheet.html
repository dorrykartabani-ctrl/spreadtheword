<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Share — Go Spread The Word</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':       '#1E4060',
            'primary-dim':   '#152E45',
            'primary-light': '#2B5780',
            'action':        '#E25B4D',
            'action-dim':    '#C84A3E',
            'gold':          '#D4A24C',
            'gold-dim':      '#B88A3D',
            'cream':         '#F7F4ED',
            'dark':          '#16202A',
            'text-dark':     '#1A1A1A',
            'text-muted':    '#5C6B7A',
            'text-light':    '#8E9AA8',
            'border-soft':   'rgba(92, 107, 122, 0.15)',
            'card-bg':       '#FFFFFF',
            'surface':       '#F0EDE6',
          },
          fontFamily: {
            'headline': ['Plus Jakarta Sans', 'sans-serif'],
            'body':     ['Manrope', 'sans-serif'],
          },
          boxShadow: {
            'natural':     '0 4px 16px rgba(26, 32, 42, 0.06)',
            'lifted':      '0 8px 32px rgba(26, 32, 42, 0.10)',
            'tactical':    '0 4px 20px rgba(30, 64, 96, 0.25)',
            'action-glow': '0 4px 20px rgba(226, 91, 77, 0.35)',
            'sheet':       '0 -8px 40px rgba(0, 0, 0, 0.20)',
          },
        },
      },
    }
  </script>

  <style>
    body {
      font-family: 'Manrope', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
      height: 100dvh;
    }
    .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .tactical-gradient { background: linear-gradient(145deg, #152E45, #1E4060); }
    .action-gradient   { background: linear-gradient(145deg, #E25B4D, #C84A3E); }

    /* Bottom sheet */
    #shareSheet {
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      transform: translateY(100%);
    }
    #shareSheet.open { transform: translateY(0); }

    /* Overlay */
    #overlay {
      transition: opacity 0.3s ease;
      opacity: 0;
    }
    #overlay.open { opacity: 1; }

    /* Platform button */
    .platform-btn {
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
    }
    .platform-btn:active { transform: scale(0.96); }
    .platform-btn.shared {
      background: rgba(30, 64, 96, 0.08) !important;
    }
    .platform-btn.shared .btn-label { color: #1E4060; font-weight: 700; }
    .platform-btn .check-icon {
      display: none;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
    }
    .platform-btn.shared .check-icon { display: block; }

    /* Drag handle gesture */
    #dragHandle { cursor: grab; }
    #dragHandle:active { cursor: grabbing; }

    /* Scrollbar hidden */
    ::-webkit-scrollbar { display: none; }

    /* Safe area */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }

    /* Success ripple */
    @keyframes ripple {
      0%   { transform: scale(0); opacity: 0.4; }
      100% { transform: scale(4); opacity: 0; }
    }
    .ripple {
      position: absolute;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(30, 64, 96, 0.3);
      animation: ripple 0.6s ease-out;
      pointer-events: none;
    }
  </style>
</head>

<body class="text-text-dark">

<!-- ============================================================
     BACKGROUND — Blurred scripture image
============================================================ -->
<div class="fixed inset-0 z-0">
  <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80"
       alt=""
       class="w-full h-full object-cover scale-110 blur-md">

  <!-- Scripture overlay on background -->
  <div class="absolute inset-0 bg-dark/50 flex flex-col items-center justify-center text-center px-10">
    <span class="text-gold/60 text-5xl leading-none mb-2" style="font-family:Georgia,serif">"</span>
    <p class="font-headline font-extrabold text-3xl text-white leading-tight">
      Be strong and courageous...
    </p>
    <p class="font-body italic text-lg text-gold/80 mt-3">— Joshua 1:9</p>
  </div>
</div>

<!-- ============================================================
     DARK OVERLAY (behind sheet)
============================================================ -->
<div id="overlay" class="fixed inset-0 z-10 bg-dark/60" onclick="closeSheet()"></div>

<!-- ============================================================
     BOTTOM SHARE SHEET
============================================================ -->
<div id="shareSheet"
     class="fixed inset-x-0 bottom-0 z-50 bg-card-bg rounded-t-3xl shadow-sheet flex flex-col"
     style="max-height: 72dvh;">

  <!-- Drag Handle -->
  <div id="dragHandle" class="flex justify-center pt-3 pb-2" onclick="">
    <div class="w-10 h-1 bg-text-light/40 rounded-full"></div>
  </div>

  <!-- Sheet Header -->
  <header class="px-5 pb-3 flex items-center justify-between">
    <div class="w-9"></div>
    <div class="text-center">
      <h1 class="font-headline font-bold text-base text-text-dark">Share Your Message</h1>
      <p id="sharedCount" class="text-[10px] text-text-light font-body mt-0.5 hidden">
        Shared to <span id="sharedNum">0</span> platform(s) ✓
      </p>
    </div>
    <button onclick="closeSheet()" class="w-9 h-9 flex items-center justify-center rounded-full bg-surface hover:bg-cream transition-colors active:scale-90">
      <span class="material-symbols-outlined text-text-muted text-[20px]">close</span>
    </button>
  </header>

  <!-- Scrollable Content -->
  <div class="flex-1 overflow-y-auto px-5 pb-4">

    <!-- Mini Preview -->
    <div class="flex flex-col items-center mb-5">
      <div class="relative w-[90px] h-[120px] rounded-2xl overflow-hidden shadow-lifted border border-border-soft">
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&q=80"
             alt="Your post preview"
             class="w-full h-full object-cover brightness-70">
        <div class="absolute inset-0 flex flex-col items-center justify-center px-2 text-center">
          <p class="text-white font-headline font-extrabold text-[8px] leading-[11px]">
            "Be strong and courageous..."
          </p>
          <p class="text-white/80 font-body text-[7px] mt-1">— Joshua 1:9</p>
        </div>
      </div>
      <p class="font-body italic text-[11px] text-text-muted mt-2">#SpreadTheWord #GreatCommission</p>
    </div>

    <!-- Platform Grid -->
    <div class="grid grid-cols-2 gap-2.5 mb-4">

      <!-- Instagram -->
      <button onclick="shareToplatform(this, 'Instagram')" class="platform-btn h-14 bg-surface rounded-2xl flex items-center px-4 gap-3 border border-border-soft">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/132px-Instagram_logo_2016.svg.png"
             alt="Instagram" class="w-6 h-6 rounded-lg flex-shrink-0">
        <span class="btn-label font-body font-semibold text-sm text-text-dark">Instagram</span>
        <span class="material-symbols-outlined text-primary text-[16px] filled check-icon">check_circle</span>
      </button>

      <!-- WhatsApp -->
      <button onclick="shareToplatform(this, 'WhatsApp')" class="platform-btn h-14 bg-surface rounded-2xl flex items-center px-4 gap-3 border border-border-soft">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/120px-WhatsApp.svg.png"
             alt="WhatsApp" class="w-6 h-6 rounded-lg flex-shrink-0">
        <span class="btn-label font-body font-semibold text-sm text-text-dark">WhatsApp</span>
        <span class="material-symbols-outlined text-primary text-[16px] filled check-icon">check_circle</span>
      </button>

      <!-- TikTok -->
      <button onclick="shareToplatform(this, 'TikTok')" class="platform-btn h-14 bg-surface rounded-2xl flex items-center px-4 gap-3 border border-border-soft">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/a/a9/TikTok_logo.svg/100px-TikTok_logo.svg.png"
             alt="TikTok" class="w-6 h-6 rounded-lg flex-shrink-0 bg-white p-0.5">
        <span class="btn-label font-body font-semibold text-sm text-text-dark">TikTok</span>
        <span class="material-symbols-outlined text-primary text-[16px] filled check-icon">check_circle</span>
      </button>

      <!-- Telegram -->
      <button onclick="shareToplatform(this, 'Telegram')" class="platform-btn h-14 bg-surface rounded-2xl flex items-center px-4 gap-3 border border-border-soft">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/120px-Telegram_logo.svg.png"
             alt="Telegram" class="w-6 h-6 rounded-lg flex-shrink-0">
        <span class="btn-label font-body font-semibold text-sm text-text-dark">Telegram</span>
        <span class="material-symbols-outlined text-primary text-[16px] filled check-icon">check_circle</span>
      </button>

      <!-- Facebook -->
      <button onclick="shareToplatform(this, 'Facebook')" class="platform-btn h-14 bg-surface rounded-2xl flex items-center px-4 gap-3 border border-border-soft">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/2023_Facebook_icon.svg/120px-2023_Facebook_icon.svg.png"
             alt="Facebook" class="w-6 h-6 rounded-lg flex-shrink-0">
        <span class="btn-label font-body font-semibold text-sm text-text-dark">Facebook</span>
        <span class="material-symbols-outlined text-primary text-[16px] filled check-icon">check_circle</span>
      </button>

      <!-- Snapchat -->
      <button onclick="shareToplatform(this, 'Snapchat')" class="platform-btn h-14 bg-surface rounded-2xl flex items-center px-4 gap-3 border border-border-soft">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/c4/Snapchat_logo.svg/120px-Snapchat_logo.svg.png"
             alt="Snapchat" class="w-6 h-6 rounded-lg flex-shrink-0">
        <span class="btn-label font-body font-semibold text-sm text-text-dark">Snapchat</span>
        <span class="material-symbols-outlined text-primary text-[16px] filled check-icon">check_circle</span>
      </button>

    </div>

    <!-- Divider -->
    <div class="h-px bg-border-soft my-3"></div>

    <!-- Secondary Actions -->
    <div class="flex gap-2.5 mb-4">

      <button onclick="saveToDevice()" class="flex-1 h-12 flex items-center justify-center rounded-2xl border-2 border-border-soft text-text-muted font-body font-bold text-sm gap-2 hover:border-primary hover:text-primary transition-all active:scale-95">
        <span class="material-symbols-outlined text-[18px]">download</span>
        Save
      </button>

      <button onclick="copyImage()" class="flex-1 h-12 flex items-center justify-center rounded-2xl border-2 border-border-soft text-text-muted font-body font-bold text-sm gap-2 hover:border-primary hover:text-primary transition-all active:scale-95">
        <span class="material-symbols-outlined text-[18px]">content_copy</span>
        Copy
      </button>

      <button onclick="nativeShare()" class="flex-1 h-12 flex items-center justify-center rounded-2xl border-2 border-border-soft text-text-muted font-body font-bold text-sm gap-2 hover:border-primary hover:text-primary transition-all active:scale-95">
        <span class="material-symbols-outlined text-[18px]">ios_share</span>
        More
      </button>

    </div>

    <!-- Deploy All Button (if multiple selected) -->
    <button id="deployAllBtn"
            onclick="deployAll()"
            class="hidden w-full py-3.5 tactical-gradient text-white font-headline font-bold text-sm rounded-2xl mb-3 flex items-center justify-center gap-2 shadow-tactical active:scale-[0.98] transition-transform">
      <span class="material-symbols-outlined text-gold text-[18px] filled">send</span>
      Deploy to All Selected
    </button>

    <!-- Footer Note -->
    <p class="font-body text-[10px] text-text-light text-center pb-2">
      Quote, source and hashtags included in every share
    </p>

  </div>

  <!-- Done Button -->
  <div class="px-5 pt-2 pb-safe border-t border-border-soft bg-card-bg" style="padding-bottom: max(16px, env(safe-area-inset-bottom));">
    <button id="doneBtn" onclick="finishSharing()"
            class="w-full py-3.5 bg-surface border-2 border-border-soft text-text-muted font-headline font-bold text-sm rounded-2xl hover:border-primary hover:text-primary transition-all active:scale-[0.98]">
      Done
    </button>
  </div>

</div>

<!-- ============================================================
     SUCCESS TOAST (appears per platform share)
============================================================ -->
<div id="toast" class="hidden fixed top-6 left-1/2 -translate-x-1/2 z-[100] bg-dark/90 backdrop-blur-md text-white text-xs font-bold px-5 py-3 rounded-full shadow-lifted whitespace-nowrap flex items-center gap-2">
  <span class="material-symbols-outlined text-gold text-[16px] filled">check_circle</span>
  <span id="toastMsg">Shared to Instagram</span>
</div>

<!-- ============================================================
     JAVASCRIPT
============================================================ -->
<script>

  // ---- OPEN SHEET ON LOAD ----
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('shareSheet').classList.add('open');
      document.getElementById('overlay').classList.add('open');
    }, 100);
  });

  // ---- CLOSE SHEET ----
  function closeSheet() {
    document.getElementById('shareSheet').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 400);
  }

  // ---- PLATFORM SHARE ----
  let sharedPlatforms = [];

  function shareToplatform(btn, platform) {
    // Toggle shared state
    if (btn.classList.contains('shared')) {
      btn.classList.remove('shared');
      sharedPlatforms = sharedPlatforms.filter(p => p !== platform);
    } else {
      btn.classList.add('shared');
      sharedPlatforms.push(platform);
      showToast(`Ready to share to ${platform}`);
      addRipple(btn);

      // TODO: Trigger native Web Share API or deep link
      // navigator.share({ title: 'GSTW', text: quoteText, url: window.location.href });
    }

    updateSharedCount();
  }

  function updateSharedCount() {
    const count   = sharedPlatforms.length;
    const countEl = document.getElementById('sharedCount');
    const numEl   = document.getElementById('sharedNum');
    const deployBtn = document.getElementById('deployAllBtn');
    const doneBtn   = document.getElementById('doneBtn');

    if (count > 0) {
      countEl.classList.remove('hidden');
      numEl.textContent = count;
      deployBtn.classList.remove('hidden');
      deployBtn.classList.add('flex');

      // Update done button
      doneBtn.className = 'w-full py-3.5 tactical-gradient text-white font-headline font-bold text-sm rounded-2xl active:scale-[0.98] transition-all';
      doneBtn.textContent = `Spread to ${count} Platform${count > 1 ? 's' : ''}`;
    } else {
      countEl.classList.add('hidden');
      deployBtn.classList.add('hidden');
      deployBtn.classList.remove('flex');

      doneBtn.className = 'w-full py-3.5 bg-surface border-2 border-border-soft text-text-muted font-headline font-bold text-sm rounded-2xl hover:border-primary hover:text-primary transition-all active:scale-[0.98]';
      doneBtn.textContent = 'Done';
    }
  }

  // ---- DEPLOY ALL ----
  function deployAll() {
    if (sharedPlatforms.length === 0) return;
    showToast(`Spreading to ${sharedPlatforms.join(', ')}!`);

    // TODO: Connect to Supabase to log shares
    setTimeout(() => {
      showSuccessAndClose();
    }, 800);
  }

  // ---- FINISH SHARING ----
  function finishSharing() {
    if (sharedPlatforms.length > 0) {
      deployAll();
    } else {
      closeSheet();
    }
  }

  // ---- SECONDARY ACTIONS ----
  function saveToDevice() {
    showToast('Image saved to your device');
    // TODO: Canvas.toBlob() → download
  }

  function copyImage() {
    showToast('Image copied to clipboard');
    // TODO: ClipboardItem API
  }

  function nativeShare() {
    if (navigator.share) {
      navigator.share({
        title: 'Be strong and courageous — Joshua 1:9',
        text: '"Be strong and courageous. Do not be afraid..." — Joshua 1:9 #SpreadTheWord',
        url: window.location.href
      }).catch(console.error);
    } else {
      showToast('Use the platforms above to share');
    }
  }

  // ---- SUCCESS STATE ----
  function showSuccessAndClose() {
    showToast('Mission deployed! The Word is spreading 🚀');
    setTimeout(() => {
      closeSheet();
    }, 2000);
  }

  // ---- RIPPLE EFFECT ----
  function addRipple(btn) {
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.left = '50%';
    ripple.style.top  = '50%';
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 700);
  }

  // ---- TOAST ----
  let toastTimer;
  function showToast(msg) {
    const toast   = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMsg');
    toastMsg.textContent = msg;
    toast.classList.remove('hidden');
    toast.classList.add('flex');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toast.classList.add('hidden');
      toast.classList.remove('flex');
    }, 2200);
  }

  // ---- SWIPE DOWN TO CLOSE ----
  let touchStartY = 0;
  const sheet = document.getElementById('shareSheet');

  sheet.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  sheet.addEventListener('touchmove', e => {
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 0) {
      sheet.style.transform = `translateY(${dy}px)`;
    }
  }, { passive: true });

  sheet.addEventListener('touchend', e => {
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (dy > 80) {
      closeSheet();
    } else {
      sheet.style.transform = 'translateY(0)';
    }
  });

</script>

</body>
</html>
