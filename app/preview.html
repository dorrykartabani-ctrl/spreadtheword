<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Preview & Share — Go Spread The Word</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED','dark':'#16202A',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
          },
          boxShadow:{
            'natural':'0 4px 16px rgba(26,32,42,0.06)',
            'lifted':'0 8px 32px rgba(26,32,42,0.10)',
            'tactical':'0 4px 20px rgba(30,64,96,0.25)',
            'card':'0 16px 40px -8px rgba(30,64,96,0.10)',
          },
        },
      },
    }
  </script>

  <style>
    body{
      font-family:'Manrope',sans-serif;
      background-color:#F0EDE6;
      -webkit-tap-highlight-color:transparent;
      min-height:100dvh;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}
    .material-symbols-outlined{
      font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      vertical-align:middle;
    }
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .tactical-gradient{background:linear-gradient(145deg,#152E45,#1E4060)}

    ::-webkit-scrollbar{display:none}
    body{-ms-overflow-style:none;scrollbar-width:none}

    @keyframes pulse-glow{
      0%,100%{box-shadow:0 4px 20px rgba(30,64,96,0.25)}
      50%{box-shadow:0 8px 40px rgba(30,64,96,0.50)}
    }
    #shareBtn{animation:pulse-glow 2s ease-in-out infinite}

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }
    .fade-up{animation:fadeUp 0.4s ease-out both}
    .fade-up-2{animation:fadeUp 0.4s ease-out 0.15s both}

    .modal-inner{
      max-height:90dvh;
      overflow-y:auto;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }
    .modal-inner::-webkit-scrollbar{display:none}

    /* Platform tabs */
    .platform-tab{transition:all 0.2s ease;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .platform-tab.active{background:#1E4060;color:white}
    .platform-tab:not(.active){color:#5C6B7A;background:#F0EDE6}

    /* Platform mockup base */
    .mockup{
      background:white;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 8px 32px rgba(0,0,0,0.15);
      max-width:100%;
    }

    /* Instagram mockup */
    .ig-header{padding:12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #EFEFEF}
    .ig-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);padding:2px}
    .ig-avatar-inner{width:100%;height:100%;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-weight:700;color:#262626;font-size:12px}
    .ig-username{font-size:14px;font-weight:600;color:#262626;flex:1}
    .ig-more{color:#262626;font-size:16px}
    .ig-image{aspect-ratio:1;background:#F5F5F5}
    .ig-actions{padding:12px;display:flex;align-items:center;gap:16px;color:#262626}
    .ig-caption{padding:0 12px 12px;font-size:13px;color:#262626;line-height:1.4}
    .ig-caption strong{font-weight:600}

    /* Facebook mockup */
    .fb-header{padding:12px;display:flex;align-items:center;gap:10px}
    .fb-avatar{width:40px;height:40px;border-radius:50%;background:#1877F2;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px}
    .fb-username{font-size:15px;font-weight:600;color:#050505}
    .fb-time{font-size:12px;color:#65676B;display:flex;align-items:center;gap:4px}
    .fb-caption{padding:0 12px 12px;font-size:14px;color:#050505;line-height:1.4}
    .fb-image{width:100%;aspect-ratio:1;background:#F5F5F5}
    .fb-actions{padding:8px 12px;border-top:1px solid #CED0D4;display:flex;justify-content:space-around;color:#65676B;font-size:13px;font-weight:600}

    /* WhatsApp mockup */
    .wa-container{background:#ECE5DD;padding:12px}
    .wa-bubble{background:#DCF8C6;border-radius:8px;padding:6px;max-width:280px;margin-left:auto;box-shadow:0 1px 0.5px rgba(0,0,0,0.13)}
    .wa-image{aspect-ratio:1;background:#F5F5F5;border-radius:4px;margin-bottom:4px}
    .wa-caption{font-size:13px;color:#111;padding:2px 4px;line-height:1.4}
    .wa-time{font-size:11px;color:#667781;text-align:right;padding:0 4px}

    /* X / Twitter mockup */
    .tw-header{padding:12px;display:flex;align-items:start;gap:10px}
    .tw-avatar{width:40px;height:40px;border-radius:50%;background:#1DA1F2;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px}
    .tw-body{flex:1}
    .tw-name{font-size:14px;font-weight:700;color:#0F1419;display:inline}
    .tw-handle{font-size:14px;color:#536471;margin-left:4px}
    .tw-text{font-size:15px;color:#0F1419;line-height:1.4;margin-top:2px;margin-bottom:8px}
    .tw-image{width:100%;aspect-ratio:1;background:#F5F5F5;border-radius:16px;overflow:hidden}
    .tw-actions{display:flex;justify-content:space-between;padding:12px 0 4px;color:#536471;font-size:13px;max-width:300px}
  </style>
</head>

<body class="text-text-dark flex flex-col items-center">

<!-- ═══════════════════════════════════════════ -->
<!-- TOP BAR -->
<!-- ═══════════════════════════════════════════ -->
<header class="w-full max-w-[430px] mx-auto h-14 bg-card-bg flex items-center justify-between px-4
  sticky top-0 z-50 border-b border-border-soft shadow-natural">
  <button onclick="goBack()"
    class="w-10 h-10 flex items-center justify-center text-text-muted active:scale-90 transition-all">
    <span class="material-symbols-outlined text-[22px]">arrow_back</span>
  </button>
  <h1 class="font-headline font-bold text-base text-text-dark">Preview & Share</h1>
  <button onclick="goHome()"
    class="w-10 h-10 flex items-center justify-center text-text-muted active:scale-90 transition-all">
    <span class="material-symbols-outlined text-[22px]">home</span>
  </button>
</header>

<!-- ═══════════════════════════════════════════ -->
<!-- MAIN -->
<!-- ═══════════════════════════════════════════ -->
<main class="w-full max-w-[430px] mx-auto flex-1 overflow-y-auto pb-36">
  <div class="px-5 py-6 space-y-5">

    <!-- ─────────────────────────────────────── -->
    <!-- PLATFORM PREVIEW TABS -->
    <!-- ─────────────────────────────────────── -->
    <section class="fade-up">
      <p class="text-[10px] font-bold uppercase tracking-widest text-text-light mb-2">Preview as</p>
      <div class="flex gap-2 overflow-x-auto pb-1" style="-ms-overflow-style:none;scrollbar-width:none">
        <button onclick="switchPreview('instagram',this)"
          class="platform-tab active text-[11px] font-bold px-3 py-1.5 rounded-full">Instagram</button>
        <button onclick="switchPreview('facebook',this)"
          class="platform-tab text-[11px] font-bold px-3 py-1.5 rounded-full">Facebook</button>
        <button onclick="switchPreview('whatsapp',this)"
          class="platform-tab text-[11px] font-bold px-3 py-1.5 rounded-full">WhatsApp</button>
        <button onclick="switchPreview('twitter',this)"
          class="platform-tab text-[11px] font-bold px-3 py-1.5 rounded-full">X</button>
      </div>
    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- MOCKUP CONTAINER -->
    <!-- ─────────────────────────────────────── -->
    <section class="fade-up">
      <div id="mockupContainer" class="w-full">
        <!-- Rendered by JS based on platform -->
      </div>
      <button onclick="goBack()"
        class="text-primary font-bold text-sm flex items-center gap-1.5 active:scale-95 mx-auto mt-3">
        <span class="material-symbols-outlined text-[16px]">edit</span>
        Edit Image
      </button>
    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- PERSONAL MESSAGE -->
    <!-- ─────────────────────────────────────── -->
    <section class="fade-up-2 bg-card-bg rounded-2xl p-4 space-y-3 shadow-natural border border-border-soft">
      <div class="flex items-center justify-between">
        <p class="text-[10px] font-bold uppercase tracking-widest text-text-light">Personal Message</p>
        <span class="text-[10px] text-text-light font-body">Optional</span>
      </div>
      <textarea id="personalMsg" maxlength="150" oninput="updateCaption()"
        placeholder="Add your own words to the post..."
        class="w-full h-20 bg-surface border border-border-soft rounded-xl p-3 text-sm font-body
        text-text-dark focus:outline-none focus:ring-2 focus:ring-primary resize-none placeholder:text-text-light"></textarea>
      <div class="flex justify-between items-center">
        <span id="charCount" class="text-[10px] text-text-light font-bold">0 / 150</span>
      </div>
    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- HASHTAGS -->
    <!-- ─────────────────────────────────────── -->
    <section class="fade-up-2 bg-card-bg rounded-2xl p-4 space-y-3 shadow-natural border border-border-soft">
      <div class="flex justify-between items-center">
        <p class="text-[10px] font-bold uppercase tracking-widest text-text-light">Hashtags</p>
        <span id="hashtagCounter" class="text-[10px] text-text-light font-body">2 / 5</span>
      </div>
      <div id="hashtagsContainer" class="flex flex-wrap gap-2"></div>
      <div id="hashtagInput" class="hidden">
        <div class="flex gap-2 mb-2">
          <input id="hashtagField" type="text" placeholder="#YourHashtag"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addHashtagFromInput()}"
            class="flex-1 bg-surface border border-border-soft rounded-xl px-3 py-2 text-sm font-body
            text-text-dark focus:outline-none focus:ring-2 focus:ring-primary placeholder:text-text-light">
          <button onclick="addHashtagFromInput()"
            class="tactical-gradient text-white font-bold text-xs px-4 py-2 rounded-xl active:scale-95">
            Add
          </button>
        </div>
        <div class="flex flex-wrap gap-1.5">
          <button onclick="addHashtag('#Faith')" class="text-[10px] font-bold text-text-muted border border-border-soft px-2 py-0.5 rounded-full active:scale-95">#Faith</button>
          <button onclick="addHashtag('#BibleVerse')" class="text-[10px] font-bold text-text-muted border border-border-soft px-2 py-0.5 rounded-full active:scale-95">#BibleVerse</button>
          <button onclick="addHashtag('#Scripture')" class="text-[10px] font-bold text-text-muted border border-border-soft px-2 py-0.5 rounded-full active:scale-95">#Scripture</button>
          <button onclick="addHashtag('#DailyWord')" class="text-[10px] font-bold text-text-muted border border-border-soft px-2 py-0.5 rounded-full active:scale-95">#DailyWord</button>
        </div>
      </div>
    </section>

  </div>
</main>

<!-- ═══════════════════════════════════════════ -->
<!-- FOOTER — SHARE BUTTON -->
<!-- ═══════════════════════════════════════════ -->
<footer class="w-full fixed bottom-0 z-50 bg-card-bg/95 backdrop-blur-xl border-t border-border-soft">
  <div class="max-w-[430px] mx-auto px-5 pt-3"
    style="padding-bottom:max(20px,env(safe-area-inset-bottom))">
    <button id="shareBtn" onclick="spreadTheWord()"
      class="w-full py-4 tactical-gradient text-white font-headline font-bold text-base rounded-2xl
      flex items-center justify-center gap-3 active:scale-[0.98] transition-transform">
      <span class="material-symbols-outlined text-gold text-[22px] filled">campaign</span>
      Spread The Word
    </button>
    <p id="shareHint" class="text-center text-[10px] text-text-light mt-2 mb-1"></p>
  </div>
</footer>

<!-- ═══════════════════════════════════════════ -->
<!-- SUCCESS MODAL -->
<!-- ═══════════════════════════════════════════ -->
<div id="successModal"
  class="hidden fixed inset-0 bg-dark/70 backdrop-blur-sm z-[100] flex items-end justify-center">
  <div class="w-full max-w-[430px] bg-card-bg rounded-t-3xl modal-inner">
    <div class="p-6 text-center">
      <div class="w-10 h-1 bg-text-light/30 rounded-full mx-auto mb-5"></div>
      <div class="w-16 h-16 tactical-gradient rounded-2xl flex items-center justify-center
        mx-auto mb-4 shadow-tactical">
        <span class="material-symbols-outlined text-gold text-[32px] filled">military_tech</span>
      </div>
      <h2 class="font-headline font-extrabold text-xl text-text-dark mb-1">Word Shared!</h2>
      <p id="successDesc" class="font-body text-text-muted text-sm leading-relaxed mb-5">
        Every share plants a seed for the Kingdom.
      </p>

      <div class="bg-gold/10 border border-gold/30 rounded-xl p-3
        flex items-center gap-3 mb-5 text-left">
        <span class="material-symbols-outlined text-gold-dim text-[18px] filled flex-shrink-0">
          check_circle
        </span>
        <div>
          <p class="text-[12px] font-bold text-gold-dim">Caption copied</p>
          <p class="text-[11px] text-text-muted">Paste it when you post</p>
        </div>
      </div>

      <div class="mb-5">
        <p class="text-[10px] font-bold uppercase tracking-widest text-text-light mb-3">
          Share to Another Platform
        </p>
        <div id="platformPicker" class="grid grid-cols-3 gap-2"></div>
      </div>

      <button onclick="goHome()"
        class="w-full py-3 text-text-muted font-bold text-sm active:scale-95">
        Back to Home
      </button>
    </div>
  </div>
</div>
<script>

  var supabaseClient = supabase.createClient(
    'https://nhymadutuhpjgkiurify.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM'
  )

  var currentUser    = null
  var currentQuoteId = null
  var imageDataUrl   = null
  var imageFile      = null
  var fullCaption    = ''
  var hashtags       = ['#SpreadTheWord', '#GreatCommission']
  var userNickname   = 'you'
  var currentPreview = 'instagram'
  var MAX_TAGS = 5

  function isMobileDevice() {
    return /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  }

  var platformOptions = [
    { name: 'Instagram', icon: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/132px-Instagram_logo_2016.svg.png' },
    { name: 'WhatsApp',  icon: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/120px-WhatsApp.svg.png' },
    { name: 'Facebook',  icon: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/2023_Facebook_icon.svg/120px-2023_Facebook_icon.svg.png' },
    { name: 'TikTok',    icon: 'https://upload.wikimedia.org/wikipedia/en/thumb/a/a9/TikTok_logo.svg/100px-TikTok_logo.svg.png' },
    { name: 'Telegram',  icon: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/120px-Telegram_logo.svg.png' },
    { name: 'Snapchat',  icon: 'https://upload.wikimedia.org/wikipedia/en/thumb/c/c4/Snapchat_logo.svg/120px-Snapchat_logo.svg.png' },
    { name: 'X',         icon: null },
    { name: 'Messages',  icon: null },
    { name: 'Other',     icon: null }
  ]

  // ════════════════════════════════════════════
  // INIT
  // ════════════════════════════════════════════
  async function initPage() {
    var sessionResult = await supabaseClient.auth.getSession()
    if (!sessionResult.data.session) {
      window.location.href = 'login.html'
      return
    }
    currentUser    = sessionResult.data.session.user
    currentQuoteId = sessionStorage.getItem('gstw_quote_id') || null

    // Get nickname
    var profileResult = await supabaseClient
      .from('profiles')
      .select('nickname, full_name')
      .eq('id', currentUser.id)
      .single()

    if (profileResult.data) {
      userNickname = profileResult.data.nickname
        || (profileResult.data.full_name ? profileResult.data.full_name.split(' ')[0].toLowerCase() : 'you')
    }

    // Load image
    imageDataUrl = sessionStorage.getItem('gstw_final_image') || null

    // Convert to file
    if (imageDataUrl) {
      try {
        var response = await fetch(imageDataUrl)
        var blob     = await response.blob()
        imageFile    = new File([blob], 'GSTW-' + Date.now() + '.png', { type: 'image/png' })
      } catch(e) {
        console.error('Could not create image file:', e)
      }
    }

    // Load saved caption state
    var savedMsg = sessionStorage.getItem('gstw_personal_msg')
    if (savedMsg) document.getElementById('personalMsg').value = savedMsg

    var savedHashtags = sessionStorage.getItem('gstw_hashtags')
    if (savedHashtags) {
      try { hashtags = JSON.parse(savedHashtags) } catch(e) {}
    }

    // Render everything
    renderHashtags()
    updateCaption()
    renderMockup(currentPreview)

    // Smart hint
    var hintEl = document.getElementById('shareHint')
    if (hintEl) {
      hintEl.textContent = isMobileDevice()
        ? 'Opens your share sheet with image attached'
        : 'Downloads image & copies caption'
    }
  }

  // ════════════════════════════════════════════
  // SWITCH PREVIEW
  // ════════════════════════════════════════════
  function switchPreview(platform, btn) {
    currentPreview = platform
    document.querySelectorAll('.platform-tab').forEach(function(t) { t.classList.remove('active') })
    if (btn) btn.classList.add('active')
    renderMockup(platform)
  }

  // ════════════════════════════════════════════
  // RENDER PLATFORM MOCKUP
  // ════════════════════════════════════════════
  function renderMockup(platform) {
    var container = document.getElementById('mockupContainer')
    if (!container) return

    var imgSrc = imageDataUrl || ''
    var msg    = document.getElementById('personalMsg') ? document.getElementById('personalMsg').value.trim() : ''
    var tagStr = hashtags.join(' ')

    var initials = userNickname.substring(0, 2).toUpperCase()

    if (platform === 'instagram') {
      container.innerHTML =
        '<div class="mockup">'
          + '<div class="ig-header">'
            + '<div class="ig-avatar"><div class="ig-avatar-inner">' + initials + '</div></div>'
            + '<span class="ig-username">' + userNickname + '</span>'
            + '<span class="material-symbols-outlined ig-more">more_horiz</span>'
          + '</div>'
          + '<div class="ig-image">'
            + (imgSrc ? '<img src="' + imgSrc + '" style="width:100%;height:100%;object-fit:cover">' : '')
          + '</div>'
          + '<div class="ig-actions">'
            + '<span class="material-symbols-outlined">favorite_border</span>'
            + '<span class="material-symbols-outlined">chat_bubble_outline</span>'
            + '<span class="material-symbols-outlined">send</span>'
            + '<span style="margin-left:auto"><span class="material-symbols-outlined">bookmark_border</span></span>'
          + '</div>'
          + '<div class="ig-caption">'
            + '<strong>' + userNickname + '</strong> '
            + (msg ? msg + '<br>' : '')
            + '<span style="color:#00376B">' + tagStr + '</span>'
          + '</div>'
        + '</div>'
    }

    else if (platform === 'facebook') {
      container.innerHTML =
        '<div class="mockup">'
          + '<div class="fb-header">'
            + '<div class="fb-avatar">' + initials + '</div>'
            + '<div>'
              + '<div class="fb-username">' + userNickname + '</div>'
              + '<div class="fb-time">Just now · <span class="material-symbols-outlined" style="font-size:12px">public</span></div>'
            + '</div>'
          + '</div>'
          + (msg ? '<div class="fb-caption">' + msg + '</div>' : '')
          + '<div class="fb-image">'
            + (imgSrc ? '<img src="' + imgSrc + '" style="width:100%;height:100%;object-fit:cover">' : '')
          + '</div>'
          + '<div class="fb-actions">'
            + '<span>👍 Like</span>'
            + '<span>💬 Comment</span>'
            + '<span>↗ Share</span>'
          + '</div>'
        + '</div>'
    }

    else if (platform === 'whatsapp') {
      container.innerHTML =
        '<div class="mockup">'
          + '<div class="wa-container">'
            + '<div class="wa-bubble">'
              + '<div class="wa-image">'
                + (imgSrc ? '<img src="' + imgSrc + '" style="width:100%;height:100%;object-fit:cover;border-radius:4px">' : '')
              + '</div>'
              + (msg ? '<div class="wa-caption">' + msg + '</div>' : '')
              + '<div class="wa-caption" style="color:#25D366">' + tagStr + '</div>'
              + '<div class="wa-time">' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) + ' ✓✓</div>'
            + '</div>'
          + '</div>'
        + '</div>'
    }

    else if (platform === 'twitter') {
      var tweetText = (msg ? msg + ' ' : '') + hashtags.slice(0, 2).join(' ')
      container.innerHTML =
        '<div class="mockup">'
          + '<div class="tw-header">'
            + '<div class="tw-avatar">' + initials + '</div>'
            + '<div class="tw-body">'
              + '<div>'
                + '<span class="tw-name">' + userNickname + '</span>'
                + '<span class="tw-handle">@' + userNickname + ' · Just now</span>'
              + '</div>'
              + '<div class="tw-text">' + tweetText + '</div>'
              + '<div class="tw-image">'
                + (imgSrc ? '<img src="' + imgSrc + '" style="width:100%;height:100%;object-fit:cover">' : '')
              + '</div>'
              + '<div class="tw-actions">'
                + '<span>💬</span>'
                + '<span>🔁</span>'
                + '<span>❤</span>'
                + '<span>📊</span>'
                + '<span>↗</span>'
              + '</div>'
            + '</div>'
          + '</div>'
        + '</div>'
    }
  }

  // ════════════════════════════════════════════
  // CAPTION BUILDER
  // ════════════════════════════════════════════
  function updateCaption() {
    var msgEl = document.getElementById('personalMsg')
    var countEl = document.getElementById('charCount')
    var personalMsg = msgEl ? msgEl.value.trim() : ''
    var hashStr = hashtags.join(' ')

    if (countEl) {
      var len = msgEl ? msgEl.value.length : 0
      countEl.textContent = len + ' / 150'
      countEl.className = 'text-[10px] font-bold ' + (len > 130 ? 'text-action' : 'text-text-light')
    }

    var parts = []
    if (personalMsg) parts.push(personalMsg)
    if (hashStr) parts.push(hashStr)

    fullCaption = parts.join('\n\n') || '#SpreadTheWord'

    sessionStorage.setItem('gstw_personal_msg', personalMsg)
    sessionStorage.setItem('gstw_hashtags', JSON.stringify(hashtags))
    sessionStorage.setItem('gstw_full_caption', fullCaption)

    // Re-render mockup with updated text
    renderMockup(currentPreview)
  }

  // ════════════════════════════════════════════
  // HASHTAGS
  // ════════════════════════════════════════════
  function renderHashtags() {
    var container = document.getElementById('hashtagsContainer')
    if (!container) return
    var html = ''
    hashtags.forEach(function(tag) {
      var safeTag = tag.replace(/'/g, "\\'")
      html += '<span class="inline-flex items-center bg-primary/10 text-primary px-2.5 py-1 rounded-full text-[11px] font-bold">'
      html += tag
      html += ' <button onclick="removeHashtag(\'' + safeTag + '\')" class="ml-1 opacity-60"><span class="material-symbols-outlined text-[12px]">close</span></button></span>'
    })
    if (hashtags.length < MAX_TAGS) {
      html += '<button onclick="toggleHashtagInput()" class="inline-flex items-center border-2 border-dashed border-border-soft text-text-muted px-2.5 py-1 rounded-full text-[11px] font-medium">'
      html += '<span class="material-symbols-outlined text-[13px] mr-0.5">add</span> Add</button>'
    }
    container.innerHTML = html
    updateCounter()
    updateCaption()
  }

  function updateCounter() {
    var el = document.getElementById('hashtagCounter')
    if (el) el.textContent = hashtags.length + ' / ' + MAX_TAGS
  }

  function toggleHashtagInput() {
    var input = document.getElementById('hashtagInput')
    input.classList.toggle('hidden')
    if (!input.classList.contains('hidden')) {
      setTimeout(function() { document.getElementById('hashtagField').focus() }, 50)
    }
  }

  function addHashtagFromInput() {
    var field = document.getElementById('hashtagField')
    var tag = field.value.trim()
    if (!tag) return
    if (tag.charAt(0) !== '#') tag = '#' + tag
    addHashtag(tag)
    field.value = ''
  }

  function addHashtag(tag) {
    if (hashtags.indexOf(tag) !== -1) { showToast('Already added'); return }
    if (hashtags.length >= MAX_TAGS) { showToast('Maximum 5 hashtags'); return }
    hashtags.push(tag)
    renderHashtags()
  }

  function removeHashtag(tag) {
    hashtags = hashtags.filter(function(h) { return h !== tag })
    renderHashtags()
  }

  // ════════════════════════════════════════════
  // SHARE
  // ════════════════════════════════════════════
  async function spreadTheWord() {
    if (fullCaption && navigator.clipboard) {
      try { await navigator.clipboard.writeText(fullCaption) } catch(e) {}
    }

    if (isMobileDevice()) {
      if (imageFile && navigator.canShare && navigator.canShare({ files: [imageFile] })) {
        try {
          await navigator.share({
            files: [imageFile],
            title: 'Go Spread The Word',
            text: fullCaption
          })
          await logShare('native-share')
          showSuccess('shared via your device')
          return
        } catch(e) {
          if (e.name === 'AbortError') {
            showToast('Share cancelled')
            return
          }
        }
      }
      if (navigator.share) {
        try {
          await navigator.share({ title: 'Go Spread The Word', text: fullCaption })
          await logShare('native-share')
          showSuccess('shared via your device')
          return
        } catch(e) {
          if (e.name === 'AbortError') return
        }
      }
      desktopShareFlow()
      return
    }
    desktopShareFlow()
  }

  async function desktopShareFlow() {
    if (imageDataUrl) {
      var link = document.createElement('a')
      link.download = 'GSTW-' + Date.now() + '.png'
      link.href = imageDataUrl
      link.click()
    }
    showToast('Image downloaded & caption copied!')
    await logShare('desktop-download')
    setTimeout(function() { showSuccess('downloaded to your device') }, 1000)
  }

  async function logShare(platform) {
    if (!currentUser || !currentQuoteId) return
    try {
      await supabaseClient.from('shares').insert({
        user_id: currentUser.id,
        quote_id: currentQuoteId,
        platform: platform
      })
    } catch(e) { console.error('Log share failed:', e) }
  }

  function showSuccess(method) {
    var modal = document.getElementById('successModal')
    if (!modal) return
    var descEl = document.getElementById('successDesc')
    if (descEl && method) {
      descEl.textContent = 'Successfully ' + method + '. Every share plants a seed.'
    }
    renderPlatformPicker()
    modal.classList.remove('hidden')
  }

  function renderPlatformPicker() {
    var container = document.getElementById('platformPicker')
    if (!container) return
    container.innerHTML = ''
    platformOptions.forEach(function(p) {
      var iconHtml = ''
      if (p.icon) {
        iconHtml = '<img src="' + p.icon + '" class="w-7 h-7 rounded-lg' + (p.name === 'TikTok' ? ' bg-white p-0.5' : '') + '" alt="' + p.name + '">'
      } else if (p.name === 'X') {
        iconHtml = '<div class="w-7 h-7 rounded-lg bg-black flex items-center justify-center"><span class="text-white font-bold text-[12px]">𝕏</span></div>'
      } else if (p.name === 'Messages') {
        iconHtml = '<div class="w-7 h-7 rounded-lg bg-green-500 flex items-center justify-center"><span class="material-symbols-outlined text-white text-[16px]">chat</span></div>'
      } else {
        iconHtml = '<div class="w-7 h-7 rounded-lg bg-surface flex items-center justify-center"><span class="material-symbols-outlined text-text-muted text-[16px]">more_horiz</span></div>'
      }
      var btn = document.createElement('button')
      btn.className = 'flex flex-col items-center gap-1.5 p-3 rounded-2xl border-2 border-border-soft bg-surface active:scale-95 transition-transform'
      btn.onclick = function() { shareToAnother(p.name) }
      btn.innerHTML = iconHtml + '<span class="text-[10px] font-bold text-text-dark">' + p.name + '</span>'
      container.appendChild(btn)
    })
  }

  async function shareToAnother(platform) {
    if (fullCaption && navigator.clipboard) {
      try { await navigator.clipboard.writeText(fullCaption) } catch(e) {}
    }
    await logShare(platform)
    if (isMobileDevice()) {
      if (imageFile && navigator.canShare && navigator.canShare({ files: [imageFile] })) {
        try {
          await navigator.share({ files: [imageFile], title: 'Go Spread The Word', text: fullCaption })
          showToast('Shared to ' + platform + '!')
          return
        } catch(e) { if (e.name === 'AbortError') return }
      }
    }
    if (imageDataUrl) {
      var link = document.createElement('a')
      link.download = 'GSTW-' + platform + '-' + Date.now() + '.png'
      link.href = imageDataUrl
      link.click()
    }
    showToast('Image downloaded for ' + platform)
  }

  function goBack() { window.location.href = 'editor.html' }
  function goHome() { window.location.href = 'index.html' }

  function showToast(msg) {
    var existing = document.getElementById('previewToast')
    if (existing) existing.remove()
    var t = document.createElement('div')
    t.id = 'previewToast'
    t.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-[200] bg-dark/90 backdrop-blur-md text-white text-xs font-bold px-5 py-3 rounded-full shadow-lifted whitespace-nowrap flex items-center gap-2'
    t.innerHTML = '<span class="material-symbols-outlined text-gold text-[14px]" style="font-variation-settings:\'FILL\' 1">check_circle</span> ' + msg
    document.body.appendChild(t)
    setTimeout(function() { if (t.parentNode) t.remove() }, 2500)
  }

  initPage()

</script>
