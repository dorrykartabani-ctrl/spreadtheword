<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Preview Your Post — GSTW</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED','dark':'#16202A',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif']
          },
          boxShadow:{
            'natural':'0 4px 16px rgba(26,32,42,0.06)',
            'lifted':'0 8px 32px rgba(26,32,42,0.10)',
            'tactical':'0 4px 20px rgba(30,64,96,0.25)',
            'card':'0 16px 40px -8px rgba(30,64,96,0.10)',
          },
        },
      },
    }
  </script>

  <style>
    body{
      font-family:'Manrope',sans-serif;
      background-color:#F0EDE6;
      -webkit-tap-highlight-color:transparent;
      min-height:100dvh;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}
    .material-symbols-outlined{
      font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      vertical-align:middle;
    }
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .tactical-gradient{background:linear-gradient(145deg,#152E45,#1E4060)}
    ::-webkit-scrollbar{display:none}
    body{-ms-overflow-style:none;scrollbar-width:none}

    .hashtag-tag{transition:all 0.15s ease}
    .hashtag-tag:active{transform:scale(0.95)}

    .caption-preview{
      font-family:'Manrope',sans-serif;
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.6;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }
    .fade-up{animation:fadeUp 0.4s ease-out both}
    .fade-up-2{animation:fadeUp 0.4s ease-out 0.1s both}
    .fade-up-3{animation:fadeUp 0.4s ease-out 0.2s both}

    @keyframes pulse-glow{
      0%,100%{box-shadow:0 4px 20px rgba(30,64,96,0.25)}
      50%{box-shadow:0 4px 32px rgba(30,64,96,0.45)}
    }
    #nextBtn{animation:pulse-glow 2.5s ease-in-out infinite}
  </style>
</head>

<body class="text-text-dark flex flex-col items-center">

<!-- ═══════════════════════════════════════════ -->
<!-- TOP BAR -->
<!-- ═══════════════════════════════════════════ -->
<header class="w-full max-w-[430px] mx-auto h-14 bg-card-bg flex items-center justify-between px-4 sticky top-0 z-50 border-b border-border-soft shadow-natural">
  <div class="flex items-center gap-2">
    <button onclick="goBack()"
      class="w-10 h-10 flex items-center justify-center text-text-muted active:scale-90 transition-all">
      <span class="material-symbols-outlined text-[22px]">arrow_back</span>
    </button>
    <button onclick="goHome()"
      class="w-10 h-10 flex items-center justify-center text-text-muted active:scale-90 transition-all">
      <span class="material-symbols-outlined text-[22px]">home</span>
    </button>
  </div>
  <h1 class="font-headline font-bold text-base text-text-dark">Preview Your Post</h1>
  <div class="w-10"></div>
</header>

<!-- ═══════════════════════════════════════════ -->
<!-- MAIN CONTENT -->
<!-- ═══════════════════════════════════════════ -->
<main class="w-full max-w-[430px] mx-auto flex-1 overflow-y-auto pb-36">
  <div class="px-5 py-6 space-y-5">

    <!-- ─────────────────────────────────────── -->
    <!-- FINAL IMAGE PREVIEW -->
    <!-- ─────────────────────────────────────── -->
    <section class="fade-up flex flex-col items-center">
      <div class="bg-card-bg rounded-2xl p-4 shadow-card border border-border-soft w-full">
        <p class="text-[10px] font-bold uppercase tracking-widest text-text-light mb-3 text-center">
          Your Image — Ready to Share
        </p>
        <div class="flex justify-center">
          <div id="imageContainer"
            class="relative rounded-2xl overflow-hidden shadow-lifted bg-dark"
            style="width:280px;height:280px">
            <img id="finalImage" src="" alt="Your post"
              class="w-full h-full object-cover"
              style="display:none">
            <!-- Fallback if image not generated -->
            <div id="imageFallback"
              class="absolute inset-0 flex items-center justify-center">
              <div class="text-center px-6">
                <span class="material-symbols-outlined text-text-light text-[40px] mb-2">image</span>
                <p class="text-text-light text-xs font-bold">Generating preview...</p>
              </div>
            </div>
          </div>
        </div>
        <button onclick="goBack()"
          class="mt-3 text-primary font-bold text-sm flex items-center gap-1.5 active:scale-95 mx-auto">
          <span class="material-symbols-outlined text-[16px]">edit</span>
          Edit Image
        </button>
      </div>
    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- PERSONAL MESSAGE -->
    <!-- ─────────────────────────────────────── -->
    <section class="fade-up-2 bg-card-bg rounded-2xl p-5 space-y-3 shadow-natural border border-border-soft">
      <div class="flex items-center justify-between">
        <h2 class="font-headline font-bold text-[15px] text-text-dark">
          Personal Message
        </h2>
        <span class="text-[11px] text-text-light font-body">(optional)</span>
      </div>
      <p class="text-[12px] text-text-muted leading-relaxed">
        Add your own words above the caption. This won't appear on the image.
      </p>
      <div class="relative">
        <textarea id="personalMsg"
          maxlength="150"
          oninput="updateCaption()"
          placeholder="Needed this today. God is good 🙏"
          class="w-full h-24 bg-surface border border-border-soft rounded-xl p-3.5
          text-text-dark placeholder:text-text-light text-sm font-body
          focus:outline-none focus:ring-2 focus:ring-primary resize-none"></textarea>
        <span id="charCount"
          class="absolute bottom-2.5 right-3 text-[10px] text-text-light font-bold">
          0 / 150
        </span>
      </div>
    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- HASHTAGS -->
    <!-- ─────────────────────────────────────── -->
    <section class="fade-up-2 bg-card-bg rounded-2xl p-5 space-y-4 shadow-natural border border-border-soft">
      <div class="flex justify-between items-center">
        <h2 class="font-headline font-bold text-[15px] text-text-dark">Hashtags</h2>
        <span id="hashtagCounter"
          class="text-text-light text-[11px] font-bold bg-surface px-2.5 py-1 rounded-full border border-border-soft">
          2 / 5
        </span>
      </div>

      <div id="hashtagsContainer" class="flex flex-wrap gap-2"></div>

      <div id="hashtagInput" class="hidden space-y-2">
        <div class="flex gap-2">
          <input id="hashtagField"
            type="text"
            placeholder="#YourHashtag"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addHashtagFromInput()}"
            class="flex-1 bg-surface border border-border-soft rounded-xl px-3 py-2.5 text-sm font-body
            text-text-dark focus:outline-none focus:ring-2 focus:ring-primary placeholder:text-text-light">
          <button onclick="addHashtagFromInput()"
            class="tactical-gradient text-white font-bold text-xs px-4 py-2.5 rounded-xl active:scale-95">
            Add
          </button>
        </div>
        <div class="flex flex-wrap gap-1.5">
          <span class="text-[10px] font-bold text-text-light uppercase tracking-widest self-center mr-1">
            Suggested:
          </span>
          <button onclick="addHashtag('#Faith')"
            class="text-[11px] font-bold text-text-muted border border-border-soft px-2.5 py-1 rounded-full active:scale-95">#Faith</button>
          <button onclick="addHashtag('#BibleVerse')"
            class="text-[11px] font-bold text-text-muted border border-border-soft px-2.5 py-1 rounded-full active:scale-95">#BibleVerse</button>
          <button onclick="addHashtag('#Courage')"
            class="text-[11px] font-bold text-text-muted border border-border-soft px-2.5 py-1 rounded-full active:scale-95">#Courage</button>
          <button onclick="addHashtag('#DailyWord')"
            class="text-[11px] font-bold text-text-muted border border-border-soft px-2.5 py-1 rounded-full active:scale-95">#DailyWord</button>
          <button onclick="addHashtag('#GoSpreadTheWord')"
            class="text-[11px] font-bold text-text-muted border border-border-soft px-2.5 py-1 rounded-full active:scale-95">#GoSpreadTheWord</button>
          <button onclick="addHashtag('#Scripture')"
            class="text-[11px] font-bold text-text-muted border border-border-soft px-2.5 py-1 rounded-full active:scale-95">#Scripture</button>
          <button onclick="addHashtag('#DailyInspiration')"
            class="text-[11px] font-bold text-text-muted border border-border-soft px-2.5 py-1 rounded-full active:scale-95">#DailyInspiration</button>
        </div>
      </div>
    </section>

    <!-- ─────────────────────────────────────── -->
    <!-- CAPTION PREVIEW -->
    <!-- ─────────────────────────────────────── -->
    <section class="fade-up-3 bg-card-bg rounded-2xl p-5 space-y-3 shadow-natural border border-border-soft">
      <div class="flex justify-between items-center">
        <h2 class="font-headline font-bold text-[15px] text-text-dark">Caption Preview</h2>
        <button onclick="copyCaption()"
          class="flex items-center gap-1 text-primary font-bold text-[11px] active:scale-95 bg-primary/10 px-3 py-1.5 rounded-full">
          <span class="material-symbols-outlined text-[14px]">content_copy</span>
          Copy
        </button>
      </div>
      <div class="bg-surface rounded-xl p-4 border border-border-soft">
        <p id="captionPreview" class="caption-preview text-text-dark text-[13px]"></p>
      </div>
      <p id="captionNote" class="text-[10px] text-text-light font-bold text-center">
        This caption will be copied automatically when you share
      </p>
    </section>

  </div>
</main>

<!-- ═══════════════════════════════════════════ -->
<!-- FOOTER -->
<!-- ═══════════════════════════════════════════ -->
<footer class="w-full fixed bottom-0 z-50 bg-card-bg/90 backdrop-blur-xl border-t border-border-soft">
  <div class="max-w-[430px] mx-auto px-5 pt-3"
    style="padding-bottom:max(20px,env(safe-area-inset-bottom))">
    <button id="nextBtn" onclick="goToShare()"
      class="w-full py-4 tactical-gradient text-white font-headline font-bold text-base rounded-2xl
      flex items-center justify-center gap-3 active:scale-[0.98] transition-transform">
      <span class="material-symbols-outlined text-gold text-[22px] filled">campaign</span>
      Ready — Spread The Word
    </button>
  </div>
</footer>

<!-- ═══════════════════════════════════════════ -->
<!-- SCRIPT -->
<!-- ═══════════════════════════════════════════ -->
<script>

  // ════════════════════════════════════════════
  // SUPABASE
  // ════════════════════════════════════════════
  var supabaseClient = supabase.createClient(
    'https://nhymadutuhpjgkiurify.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM'
  )

  // ════════════════════════════════════════════
  // STATE
  // ════════════════════════════════════════════
  var hashtags = ['#SpreadTheWord', '#GreatCommission']
  var MAX_TAGS = 5
  var quoteRef = ''

  // ════════════════════════════════════════════
  // INIT
  // ════════════════════════════════════════════
  async function initPage() {
    // Auth check
    var sessionResult = await supabaseClient.auth.getSession()
    if (!sessionResult.data.session) {
      window.location.href = 'login.html'
      return
    }

    // Load quote reference for caption
    quoteRef = sessionStorage.getItem('gstw_quote_ref') || '— GSTW'

    // Load final image
    var finalImage = sessionStorage.getItem('gstw_final_image')
    var imgEl      = document.getElementById('finalImage')
    var fallback   = document.getElementById('imageFallback')

    if (finalImage && imgEl) {
      imgEl.src = finalImage
      imgEl.style.display = 'block'
      if (fallback) fallback.style.display = 'none'
    } else {
      // No image generated — show fallback
      if (fallback) {
        fallback.innerHTML = '<div class="text-center px-6">'
          + '<span class="material-symbols-outlined text-gold text-[40px] mb-2 filled">warning</span>'
          + '<p class="text-text-muted text-xs font-bold">Image not ready</p>'
          + '<button onclick="goBack()" class="mt-2 text-primary font-bold text-sm underline">Go back to editor</button>'
          + '</div>'
      }
    }

    // Load saved hashtags if any
    var savedHashtags = sessionStorage.getItem('gstw_hashtags')
    if (savedHashtags) {
      try { hashtags = JSON.parse(savedHashtags) } catch(e) {}
    }

    // Load saved personal message if any
    var savedMsg = sessionStorage.getItem('gstw_personal_msg')
    if (savedMsg) {
      var msgEl = document.getElementById('personalMsg')
      if (msgEl) {
        msgEl.value = savedMsg
      }
    }

    // Render
    renderHashtags()
    updateCaption()
  }

  // ════════════════════════════════════════════
  // CAPTION BUILDER
  // ════════════════════════════════════════════
function updateCaption() {
  var msgEl   = document.getElementById('personalMsg')
  var capEl   = document.getElementById('captionPreview')
  var countEl = document.getElementById('charCount')
  if (!capEl) return

  var personalMsg = msgEl ? msgEl.value.trim() : ''
  var hashStr     = hashtags.join(' ')

  // Update char counter
  if (countEl) {
    var len = msgEl ? msgEl.value.length : 0
    countEl.textContent = len + ' / 150'
    countEl.className = 'absolute bottom-2.5 right-3 text-[10px] font-bold ' +
      (len > 130 ? 'text-action' : 'text-text-light')
  }

  // Build caption — NO quote text, NO source reference (both on image)
  var parts = []

  if (personalMsg) {
    parts.push(personalMsg)
  }

  if (hashStr) {
    parts.push(hashStr)
  }

  var caption = parts.join('\n\n')

  // If no personal message and only hashtags, just show hashtags
  if (!caption.trim()) {
    caption = '#SpreadTheWord'
  }

  capEl.textContent = caption

  // Save to sessionStorage for share page
  sessionStorage.setItem('gstw_personal_msg', personalMsg)
  sessionStorage.setItem('gstw_hashtags', JSON.stringify(hashtags))
  sessionStorage.setItem('gstw_full_caption', caption)
}

  // ════════════════════════════════════════════
  // COPY CAPTION
  // ════════════════════════════════════════════
  function copyCaption() {
    var el = document.getElementById('captionPreview')
    if (!el) return
    var text = el.textContent
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        showToast('Caption copied to clipboard')
      })
    } else {
      var ta = document.createElement('textarea')
      ta.value = text
      document.body.appendChild(ta)
      ta.select()
      document.execCommand('copy')
      document.body.removeChild(ta)
      showToast('Caption copied')
    }
  }

  // ════════════════════════════════════════════
  // HASHTAGS
  // ════════════════════════════════════════════
  function renderHashtags() {
    var container = document.getElementById('hashtagsContainer')
    if (!container) return

    var html = ''
    hashtags.forEach(function(tag) {
      var safeTag = tag.replace(/'/g, "\\'")
      html += '<span class="hashtag-tag inline-flex items-center bg-primary/10 text-primary px-3 py-1.5 rounded-full text-[12px] font-bold">'
      html += tag
      html += ' <button onclick="removeHashtag(\'' + safeTag + '\')" class="ml-1.5 opacity-60 hover:opacity-100">'
      html += '<span class="material-symbols-outlined text-[13px]">close</span></button></span>'
    })

    if (hashtags.length < MAX_TAGS) {
      html += '<button onclick="toggleHashtagInput()" class="inline-flex items-center border-2 border-dashed border-border-soft text-text-muted px-3 py-1.5 rounded-full text-[12px] font-medium active:scale-95 transition-all">'
      html += '<span class="material-symbols-outlined text-[15px] mr-1">add</span> Add</button>'
    }

    container.innerHTML = html
    updateHashtagCounter()
    updateCaption()
  }

  function updateHashtagCounter() {
    var el = document.getElementById('hashtagCounter')
    if (el) el.textContent = hashtags.length + ' / ' + MAX_TAGS
  }

  function toggleHashtagInput() {
    var input = document.getElementById('hashtagInput')
    if (!input) return
    input.classList.toggle('hidden')
    if (!input.classList.contains('hidden')) {
      setTimeout(function() {
        var field = document.getElementById('hashtagField')
        if (field) field.focus()
      }, 50)
    }
  }

  function addHashtagFromInput() {
    var field = document.getElementById('hashtagField')
    if (!field) return
    var tag = field.value.trim()
    if (!tag) return
    if (tag.charAt(0) !== '#') tag = '#' + tag
    addHashtag(tag)
    field.value = ''
  }

  function addHashtag(tag) {
    if (hashtags.indexOf(tag) !== -1) { showToast('Already added'); return }
    if (hashtags.length >= MAX_TAGS)  { showToast('Maximum 5 hashtags'); return }
    hashtags.push(tag)
    renderHashtags()
    showToast(tag + ' added')
  }

  function removeHashtag(tag) {
    hashtags = hashtags.filter(function(h) { return h !== tag })
    renderHashtags()
  }

  // ════════════════════════════════════════════
  // NAVIGATION
  // ════════════════════════════════════════════
  function goBack()    { window.location.href = 'editor.html' }
  function goHome()    { window.location.href = 'index.html' }
  function goToShare() {
    // Save final caption state before navigating
    updateCaption()
    window.location.href = 'share.html'
  }

  // ════════════════════════════════════════════
  // TOAST
  // ════════════════════════════════════════════
  function showToast(msg) {
    var existing = document.getElementById('previewToast')
    if (existing) existing.remove()
    var t = document.createElement('div')
    t.id = 'previewToast'
    t.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-[200] bg-dark/90 backdrop-blur-md text-white text-xs font-bold px-5 py-3 rounded-full shadow-lifted whitespace-nowrap flex items-center gap-2'
    t.innerHTML = '<span class="material-symbols-outlined text-gold text-[14px]" style="font-variation-settings:\'FILL\' 1">check_circle</span> ' + msg
    document.body.appendChild(t)
    setTimeout(function() { if (t.parentNode) t.remove() }, 2200)
  }

  // ════════════════════════════════════════════
  // START
  // ════════════════════════════════════════════
  initPage()

</script>
</body>
</html>
