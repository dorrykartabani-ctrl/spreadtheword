<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Create — Go Spread The Word</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Manrope:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Oswald:wght@600&family=Bebas+Neue&family=Merriweather:ital,wght@1,700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED','dark':'#16202A',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    *{box-sizing:border-box}
    body{
      font-family:'Manrope',sans-serif;
      background:#F0EDE6;
      -webkit-tap-highlight-color:transparent;
      overflow-y:auto;
      min-height:100dvh;
      user-select:none;
      margin:0;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .tactical-gradient{background:linear-gradient(145deg,#152E45,#1E4060)}

    /* Font classes */
    .font-lora{font-family:'Lora',serif!important}
    .font-jakarta{font-family:'Plus Jakarta Sans',sans-serif!important}
    .font-playfair{font-family:'Playfair Display',serif!important}
    .font-oswald{font-family:'Oswald',sans-serif!important;text-transform:uppercase}
    .font-bebas{font-family:'Bebas Neue',sans-serif!important;letter-spacing:0.08em}
    .font-merri{font-family:'Merriweather',serif!important}

    /* Preview canvas */
    .preview-canvas{
      position:relative;
      width:100%;
      aspect-ratio:1;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 8px 32px rgba(0,0,0,0.15);
      background:#16202A;
      touch-action:none;
    }

    /* Quote overlay — draggable */
    #quoteOverlay{cursor:grab;touch-action:none;position:absolute;z-index:10}
    #quoteOverlay:active{cursor:grabbing}

    /* Tool buttons */
    .tool-btn{transition:all 0.15s ease;-webkit-tap-highlight-color:transparent}
    .tool-btn.active{background:#1E4060!important;color:white!important}

    /* Sub panel */
    #subPanel{transition:max-height 0.3s ease,opacity 0.2s;max-height:0;opacity:0;overflow:hidden}
    #subPanel.open{max-height:200px;opacity:1}

    /* Font options */
    .font-opt{transition:all 0.15s ease;cursor:pointer}
    .font-opt.selected{background:#1E4060!important;color:white!important;border-color:#1E4060!important}

    /* Color swatches */
    .color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform 0.15s;border:3px solid transparent;flex-shrink:0}
    .color-swatch:active{transform:scale(0.9)}
    .color-swatch.selected{border-color:white;transform:scale(1.15);box-shadow:0 0 0 2px rgba(30,64,96,0.3)}

    /* Background options */
    .bg-thumb{width:56px;height:56px;border-radius:12px;overflow:hidden;cursor:pointer;border:3px solid transparent;flex-shrink:0;transition:all 0.15s}
    .bg-thumb:active{transform:scale(0.95)}
    .bg-thumb.selected{border-color:#1E4060;box-shadow:0 0 0 2px rgba(30,64,96,0.3)}

    /* Filter options */
    .filter-btn{transition:all 0.15s}
    .filter-btn.active{background:#1E4060;color:white;border-color:#1E4060}

    /* Text style options */
    .style-btn{transition:all 0.15s}
    .style-btn.active{background:#1E4060;color:white;border-color:#1E4060}

    /* Range slider */
    input[type="range"]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;background:#E0DDD6;outline:none}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#1E4060;cursor:pointer}

    /* No scrollbar */
    .no-scrollbar::-webkit-scrollbar{display:none}
    .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}

    @keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite;display:inline-block}
  </style>
</head>

<body>

<div class="max-w-[430px] mx-auto flex flex-col min-h-[100dvh]">

  <!-- Hidden file inputs -->
  <input type="file" id="selfieInput" accept="image/*" capture="user" class="hidden" onchange="handleImageSelect(this)">
  <input type="file" id="galleryInput" accept="image/*" class="hidden" onchange="handleImageSelect(this)">

  <!-- ═══════════════════════════════════════════ -->
  <!-- HEADER — Minimal -->
  <!-- ═══════════════════════════════════════════ -->
  <header class="flex items-center justify-between px-4 py-3 bg-surface border-b border-border-soft">
    <button onclick="goBack()" class="w-10 h-10 flex items-center justify-center text-text-muted active:scale-90 transition-transform">
      <span class="material-symbols-outlined text-[22px]">arrow_back</span>
    </button>
    <span class="font-headline font-bold text-sm text-text-dark">Create</span>
    <div class="w-10"></div>

  <!-- PREVIEW — Square 1:1 -->

    <div class="preview-canvas" id="previewCanvas">

      <div id="quoteOverlay"

        <span id="quoteMark" class="text-[36px] leading-none text-gold/60 mb-1" style="font-family:Georgia,serif">"</span>
        <p id="quoteText" class="font-lora font-semibold text-[16px] text-white leading-snug"

        <p id="quoteRef" class="mt-3 font-body font-bold text-[11px] text-white/90 tracking-wider"
          style="opacity:0;transition:opacity 0.3s"></p>
      </div>
    </div>
  </section>

      </div>
      <div class="bg-thumb" onclick="selectPreset(this,'https://images.unsplash.com/photo-1477346611705-65d1883cee1e?w=800&q=80')">

      </div>
      <div class="bg-thumb" onclick="selectPreset(this,'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80')">

      </div>

        <img src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=100&q=60" class="w-full h-full object-cover" alt="">
      </div>
      <div class="bg-thumb" onclick="selectPreset(this,'https://images.unsplash.com/photo-1490730141103-6cac27aaab94?w=800&q=80')">
        <img src="https://images.unsplash.com/photo-1490730141103-6cac27aaab94?w=100&q=60" class="w-full h-full object-cover" alt="">

    </div>
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- FILTERS — Horizontal scroll -->
  <!-- ═══════════════════════════════════════════ -->
  <section class="px-4 pt-4">
    <p class="text-[10px] font-bold text-text-light uppercase tracking-widest mb-2">Filter</p>
    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">

  <!-- ═══════════════════════════════════════════ -->

    <!-- Tool buttons row -->

          <div class="color-swatch" style="background:#86EFAC" onclick="setColor('#86EFAC',this)"></div>

      </div>

      <!-- Text style -->
      <div id="toolStyle" class="hidden">
        <div class="flex gap-2">

          <button onclick="setTextStyle('shadow',this)" class="style-btn text-[10px] font-bold px-3 py-1.5 rounded-lg border border-border-soft bg-card-bg text-text-muted">Shadow</button>
          <button onclick="setTextStyle('outline',this)" class="style-btn text-[10px] font-bold px-3 py-1.5 rounded-lg border border-border-soft bg-card-bg text-text-muted">Outline</button>
          <button onclick="setTextStyle('pill',this)" class="style-btn text-[10px] font-bold px-3 py-1.5 rounded-lg border border-border-soft bg-card-bg text-text-muted">Background</button>
        </div>

        <div class="flex items-center justify-between mb-2">
          <span class="text-[10px] font-bold text-text-light">Darkness</span>

        </div>
        <input type="range" min="0" max="80" value="30" oninput="setDarkness(this.value)">
      </div>

    </div>
  </section>

  <!-- NEXT BUTTON -->
  <!-- ═══════════════════════════════════════════ -->
  <section class="px-4 pt-5 pb-8">
    <button onclick="goNext()"

    </button>
  </section>

</div>

  document.addEventListener('DOMContentLoaded', function() {

  async function initEditor() {

    var selectedId     = sessionStorage.getItem('gstw_selected_quote_id')

    if (selectedText && selectedSource) {
      if (qt) qt.textContent = selectedText
      if (qr) qr.textContent = '— ' + selectedSource.toUpperCase()
      window.currentQuoteId = selectedId
    } else {
      var result = await supabaseClient
        .from('quotes')
        .select('*')
        .eq('status', 'live')
        .order('published_at', { ascending: false })
        .limit(1)

      if (result.data && result.data.length > 0) {
        if (qt) qt.textContent = result.data[0].text
        if (qr) qr.textContent = '— ' + result.data[0].source.toUpperCase()
        window.currentQuoteId = result.data[0].id
      } else {
        if (qt) qt.textContent = 'The Word is with you today.'
        if (qr) qr.textContent = '— GSTW'
      }
    }

    if (qt) qt.style.opacity = '1'
    if (qr) qr.style.opacity = '1'

    // Restore saved background
    var savedBgType  = sessionStorage.getItem('gstw_bg_type')
    var savedBgValue = sessionStorage.getItem('gstw_bg_value')
    if (savedBgType && savedBgValue) {
      selectedBgType = savedBgType
      selectedBgValue = savedBgValue
      applyBackground(savedBgType, savedBgValue)
    }
  }

  // ════════════════════════════════════════════
  // CAMERA / GALLERY
  // ════════════════════════════════════════════
  function takeSelfie() {
    document.getElementById('selfieInput').click()
  }

  function openGallery() {
    document.getElementById('galleryInput').click()
  }

  function handleImageSelect(input) {
    var file = input.files[0]
    if (!file) return
    var reader = new FileReader()
    reader.onload = function(e) {
      selectedBgType = 'image'
      selectedBgValue = e.target.result
      applyBackground('image', e.target.result)
      clearBgSelections()
      showToast('Photo loaded')
    }
    reader.readAsDataURL(file)
    input.value = ''
  }

  // ════════════════════════════════════════════
  // BACKGROUNDS
  // ════════════════════════════════════════════
  function applyBackground(type, value) {
    var bg = document.getElementById('bgLayer')
    if (!bg) return

    if (type === 'image') {
      bg.style.backgroundImage = "url('" + value + "')"
      bg.style.backgroundSize = 'cover'
      bg.style.backgroundPosition = 'center'
      bg.style.background = ''
      bg.style.backgroundImage = "url('" + value + "')"
      bg.style.backgroundSize = 'cover'
      bg.style.backgroundPosition = 'center'
    } else if (type === 'color') {
      bg.style.backgroundImage = 'none'
      bg.style.background = value
    } else if (type === 'gradient') {
      bg.style.backgroundImage = 'none'
      bg.style.background = value
    }
  }

  function clearBgSelections() {
    document.querySelectorAll('.bg-thumb').forEach(function(t) { t.classList.remove('selected') })
  }

  function selectPreset(el, url) {
    clearBgSelections()
    el.classList.add('selected')
    selectedBgType = 'image'
    selectedBgValue = url
    applyBackground('image', url)
  }

  function selectSolid(el, color) {
    clearBgSelections()
    el.classList.add('selected')
    selectedBgType = 'color'
    selectedBgValue = color
    applyBackground('color', color)
  }

  function selectGradient(el, gradient) {
    clearBgSelections()
    el.classList.add('selected')
    selectedBgType = 'gradient'
    selectedBgValue = gradient
    applyBackground('gradient', gradient)
  }

  // ════════════════════════════════════════════
  // FILTERS
  // ════════════════════════════════════════════
  function setFilter(name, btn) {
    currentFilter = name
    var bg = document.getElementById('bgLayer')
    if (bg) bg.style.filter = filterCSS[name] || ''

    document.querySelectorAll('.filter-btn').forEach(function(b) {
      b.classList.remove('active', 'bg-primary', 'text-white')
      b.classList.add('text-text-muted')
    })
    btn.classList.add('active', 'bg-primary', 'text-white')
    btn.classList.remove('text-text-muted')
  }

  // ════════════════════════════════════════════
  // TEXT TOOLS
  // ════════════════════════════════════════════
  function toggleTool(name, btn) {
    var panel = document.getElementById('subPanel')
    var toolEl = document.getElementById('tool' + name.charAt(0).toUpperCase() + name.slice(1))

    if (currentTool === name) {
      panel.classList.remove('open')
      if (currentToolBtn) currentToolBtn.classList.remove('active')
      currentTool = null
      currentToolBtn = null
      return
    }

    document.querySelectorAll('#subPanel > div').forEach(function(d) { d.classList.add('hidden') })
    if (toolEl) toolEl.classList.remove('hidden')
    panel.classList.add('open')

    if (currentToolBtn) currentToolBtn.classList.remove('active')
    btn.classList.add('active')
    currentTool = name
    currentToolBtn = btn
  }

  function setFont(fontClass, btn) {
    var qt = document.getElementById('quoteText')
    var qr = document.getElementById('quoteRef')
    if (!qt || !qr) return
    fontClasses.forEach(function(f) { qt.classList.remove(f); qr.classList.remove(f) })
    qt.classList.add(fontClass)
    qr.classList.add(fontClass)
    qt.style.fontFamily = fontMap[fontClass]
    qr.style.fontFamily = fontMap[fontClass]
    qt.style.textTransform = fontClass === 'font-oswald' ? 'uppercase' : 'none'
    document.querySelectorAll('.font-opt').forEach(function(b) { b.classList.remove('selected') })
    btn.classList.add('selected')
  }

  function setSize(val) {
    var qt = document.getElementById('quoteText')
    if (qt) qt.style.fontSize = val + 'px'
    var label = document.getElementById('sizeLabel')
    if (label) label.textContent = val + 'px'
  }

  function setColor(hex, swatch) {
    var qt = document.getElementById('quoteText')
    var qr = document.getElementById('quoteRef')
    if (qt) qt.style.color = hex
    if (qr) qr.style.color = hex
    var dot = document.getElementById('colorDot')
    if (dot) dot.style.background = hex
    document.querySelectorAll('.color-swatch').forEach(function(s) {
      s.classList.remove('selected')
      s.style.borderColor = 'transparent'
    })
    swatch.classList.add('selected')
    swatch.style.borderColor = hex === '#000000' ? '#666' : 'white'
  }

  function setDarkness(val) {
    var dark = document.getElementById('darkLayer')
    if (dark) dark.style.background = 'rgba(0,0,0,' + (val / 100) + ')'
    var label = document.getElementById('darkLabel')
    if (label) label.textContent = val + '%'
  }

  var alignCycle = ['center','left','right']
  var alignIcons = { center:'format_align_center', left:'format_align_left', right:'format_align_right' }
  var alignIdx = 0

  function cycleAlign() {
    var qt = document.getElementById('quoteText')
    var qr = document.getElementById('quoteRef')
    var overlay = document.getElementById('quoteOverlay')
    var icon = document.getElementById('alignIcon')
    if (!qt || !qr || !overlay || !icon) return
    alignIdx = (alignIdx + 1) % alignCycle.length
    var a = alignCycle[alignIdx]
    qt.style.textAlign = a
    qr.style.textAlign = a
    overlay.style.textAlign = a
    icon.textContent = alignIcons[a]
  }

  function setTextStyle(style, btn) {
    currentTextStyle = style
    var qt = document.getElementById('quoteText')
    var qr = document.getElementById('quoteRef')
    var overlay = document.getElementById('quoteOverlay')
    if (!qt) return

    // Reset all styles
    qt.style.textShadow = 'none'
    qt.style.webkitTextStroke = ''
    qr.style.textShadow = 'none'
    overlay.style.background = 'transparent'
    overlay.style.borderRadius = '0'
    overlay.style.padding = '16px'

    if (style === 'shadow') {
      qt.style.textShadow = '0 2px 8px rgba(0,0,0,0.5)'
      qr.style.textShadow = '0 2px 8px rgba(0,0,0,0.5)'
    } else if (style === 'outline') {
      qt.style.webkitTextStroke = '1px rgba(0,0,0,0.5)'
      qr.style.webkitTextStroke = '0.5px rgba(0,0,0,0.5)'
    } else if (style === 'pill') {
      overlay.style.background = 'rgba(0,0,0,0.35)'
      overlay.style.borderRadius = '16px'
      overlay.style.padding = '20px'
    }

    document.querySelectorAll('.style-btn').forEach(function(b) {
      b.classList.remove('active', 'bg-primary', 'text-white')
      b.classList.add('text-text-muted')
    })
    btn.classList.add('active', 'bg-primary', 'text-white')
    btn.classList.remove('text-text-muted')
  }

  // ════════════════════════════════════════════
  // DRAG
  // ════════════════════════════════════════════
  function onDragStart(e) {
    var overlay = document.getElementById('quoteOverlay')
    if (!overlay) return
    dragActive = true
    var cx = e.touches ? e.touches[0].clientX : e.clientX
    var cy = e.touches ? e.touches[0].clientY : e.clientY
    var canvas = document.getElementById('previewCanvas')
    var rect = overlay.getBoundingClientRect()
    var canvasRect = canvas.getBoundingClientRect()
    overlayStartX = rect.left - canvasRect.left
    overlayStartY = rect.top - canvasRect.top
    overlay.style.left = overlayStartX + 'px'
    overlay.style.top = overlayStartY + 'px'
    dragStartX = cx
    dragStartY = cy
    if (e.cancelable) e.preventDefault()
  }

  function onDragMove(e) {
    if (!dragActive) return
    var overlay = document.getElementById('quoteOverlay')
    var canvas = document.getElementById('previewCanvas')
    if (!overlay || !canvas) return
    var cx = e.touches ? e.touches[0].clientX : e.clientX
    var cy = e.touches ? e.touches[0].clientY : e.clientY
    var canvasRect = canvas.getBoundingClientRect()
    var maxX = canvasRect.width - overlay.offsetWidth
    var maxY = canvasRect.height - overlay.offsetHeight
    var newX = Math.max(0, Math.min(overlayStartX + (cx - dragStartX), maxX))
    var newY = Math.max(0, Math.min(overlayStartY + (cy - dragStartY), maxY))
    overlay.style.left = newX + 'px'
    overlay.style.top = newY + 'px'
    if (e.cancelable) e.preventDefault()
  }

  function onDragEnd() { dragActive = false }

  // ════════════════════════════════════════════
  // NAVIGATION
  // ════════════════════════════════════════════
  function goBack() { window.location.href = 'index.html' }

  function goNext() {
    var qt = document.getElementById('quoteText')
    var qr = document.getElementById('quoteRef')
    var overlay = document.getElementById('quoteOverlay')
    var canvas  = document.getElementById('previewCanvas')
    var darkLayer = document.getElementById('darkLayer')

    // Save state
    sessionStorage.setItem('gstw_quote_text', qt ? qt.textContent : '')
    sessionStorage.setItem('gstw_quote_ref', qr ? qr.textContent : '')
    sessionStorage.setItem('gstw_font_size', qt ? (qt.style.fontSize || '16px') : '16px')
    sessionStorage.setItem('gstw_text_color', qt ? (qt.style.color || '#FFFFFF') : '#FFFFFF')
    sessionStorage.setItem('gstw_text_align', qt ? (qt.style.textAlign || 'center') : 'center')
    sessionStorage.setItem('gstw_font_family', qt ? (qt.style.fontFamily || "'Lora', serif") : "'Lora', serif")
    sessionStorage.setItem('gstw_text_transform', qt ? (qt.style.textTransform || 'none') : 'none')
    sessionStorage.setItem('gstw_text_style', currentTextStyle)
    sessionStorage.setItem('gstw_filter', currentFilter)
    sessionStorage.setItem('gstw_darkness', darkLayer ? (darkLayer.style.background || 'rgba(0,0,0,0.3)') : 'rgba(0,0,0,0.3)')
    sessionStorage.setItem('gstw_quote_id', window.currentQuoteId || '')
    sessionStorage.setItem('gstw_bg_type', selectedBgType)
    sessionStorage.setItem('gstw_bg_value', selectedBgValue)

    // Save position as percentages
    if (overlay && canvas) {
      var canvasRect = canvas.getBoundingClientRect()
      var overlayRect = overlay.getBoundingClientRect()
      var xPct = ((overlayRect.left - canvasRect.left) / canvasRect.width) * 100
      var yPct = ((overlayRect.top - canvasRect.top) / canvasRect.height) * 100
      sessionStorage.setItem('gstw_overlay_x', xPct)
      sessionStorage.setItem('gstw_overlay_y', yPct)
    }

    // Show loading
    var btn = document.querySelector('[onclick="goNext()"]')
    if (btn) {
      btn.innerHTML = '<span class="material-symbols-outlined text-[20px] spin">progress_activity</span> Generating...'
      btn.style.pointerEvents = 'none'
    }

    setTimeout(function() {
      generateImage(qt, qr)
    }, 100)
  }

  // ════════════════════════════════════════════
  // GENERATE IMAGE — Canvas API
  // ════════════════════════════════════════════
  function generateImage(qt, qr) {
    var canvas = document.createElement('canvas')
    canvas.width = 1080
    canvas.height = 1080
    var ctx = canvas.getContext('2d')

    ctx.fillStyle = '#16202A'
    ctx.fillRect(0, 0, 1080, 1080)

    var xPct = parseFloat(sessionStorage.getItem('gstw_overlay_x')) || 15
    var yPct = parseFloat(sessionStorage.getItem('gstw_overlay_y')) || 30
    var align = qt ? (qt.style.textAlign || 'center') : 'center'
    var textColor = qt ? (qt.style.color || '#FFFFFF') : '#FFFFFF'
    var fontSize = parseInt(qt ? (qt.style.fontSize || '16') : '16')
    var fontFam = qt ? (qt.style.fontFamily || "'Lora', serif") : "'Lora', serif"
    var textTransform = qt ? (qt.style.textTransform || 'none') : 'none'
    var darkness = sessionStorage.getItem('gstw_darkness') || 'rgba(0,0,0,0.3)'
    var textStyle = sessionStorage.getItem('gstw_text_style') || 'clean'
    var filter = sessionStorage.getItem('gstw_filter') || 'none'

    function drawText(ctx, text, x, y, maxWidth, lineHeight, align) {
      if (textTransform === 'uppercase') text = text.toUpperCase()
      var words = text.split(' ')
      var line = ''
      var lines = []
      for (var n = 0; n < words.length; n++) {
        var testLine = line + words[n] + ' '
        if (ctx.measureText(testLine).width > maxWidth && n > 0) {
          lines.push(line.trim())
          line = words[n] + ' '
        } else { line = testLine }
      }
      lines.push(line.trim())

      if (textStyle === 'shadow') {
        ctx.shadowColor = 'rgba(0,0,0,0.5)'
        ctx.shadowBlur = 8
        ctx.shadowOffsetY = 2
      }

      for (var i = 0; i < lines.length; i++) {
        var lx = x
        if (align === 'center') lx = x + maxWidth / 2
        if (align === 'right') lx = x + maxWidth
        ctx.fillText(lines[i], lx, y + (i * lineHeight))
      }
      ctx.shadowColor = 'transparent'
      ctx.shadowBlur = 0
      ctx.shadowOffsetY = 0
      return y + (lines.length * lineHeight)
    }

    function drawContent() {
      ctx.fillStyle = darkness
      ctx.fillRect(0, 0, 1080, 1080)

      var padding = 60
      var textX = Math.max(padding, xPct * 10.8)
      var textY = Math.max(padding, yPct * 10.8)
      var maxW = 900

      if (align === 'center') { ctx.textAlign = 'center'; textX = 90 }
      else if (align === 'right') { ctx.textAlign = 'right' }
      else { ctx.textAlign = 'left' }

      // Pill background if selected
      if (textStyle === 'pill') {
        var pillX = align === 'center' ? 60 : textX - 20
        var pillW = align === 'center' ? 960 : maxW + 40
        ctx.fillStyle = 'rgba(0,0,0,0.35)'
        ctx.beginPath()
        ctx.roundRect(pillX, textY - 20, pillW, 500, 20)
        ctx.fill()
      }

      // Quote mark
      ctx.font = "600 120px Georgia, serif"
      ctx.fillStyle = 'rgba(212,162,76,0.5)'
      ctx.textBaseline = 'top'
      ctx.fillText('"', align === 'center' ? 540 : textX, textY - 40)

      // Quote text
      var scaled = fontSize * 3.2
      ctx.font = '600 ' + scaled + 'px ' + fontFam
      ctx.fillStyle = textColor
      ctx.textBaseline = 'top'

      var endY = drawText(ctx, qt ? qt.textContent : '', textX, textY + 80, maxW, scaled * 1.35, align)

      // Reference
      ctx.font = 'bold ' + Math.round(fontSize * 1.4) + 'px "Plus Jakarta Sans", sans-serif'
      ctx.fillStyle = textColor
      ctx.globalAlpha = 0.9
      if (textStyle === 'shadow') {
        ctx.shadowColor = 'rgba(0,0,0,0.4)'
        ctx.shadowBlur = 6
        ctx.shadowOffsetY = 2
      }
      ctx.fillText(qr ? qr.textContent : '', align === 'center' ? 540 : textX, endY + 25)
      ctx.globalAlpha = 1
      ctx.shadowColor = 'transparent'

      try {
        sessionStorage.setItem('gstw_final_image', canvas.toDataURL('image/png'))
      } catch(e) {
        sessionStorage.removeItem('gstw_final_image')
      }
      window.location.href = 'preview.html'
    }

    if (selectedBgType === 'image') {
      var img = new Image()
      img.crossOrigin = 'anonymous'
      img.onload = function() {
        var scale = Math.max(1080 / img.width, 1080 / img.height)
        var sw = img.width * scale
        var sh = img.height * scale
        if (filter !== 'none' && filterCSS[filter]) ctx.filter = filterCSS[filter]
        ctx.drawImage(img, (1080 - sw) / 2, (1080 - sh) / 2, sw, sh)
        ctx.filter = 'none'
        drawContent()
      }
      img.onerror = function() {
        ctx.fillStyle = '#1E4060'
        ctx.fillRect(0, 0, 1080, 1080)
        drawContent()
      }
      img.src = selectedBgValue
    } else if (selectedBgType === 'gradient') {
      var gradient = ctx.createLinearGradient(0, 0, 1080, 1080)
      var colors = selectedBgValue.match(/#[0-9A-Fa-f]{6}/g)
      if (colors && colors.length >= 2) {
        gradient.addColorStop(0, colors[0])
        gradient.addColorStop(1, colors[1])
      }
      ctx.fillStyle = gradient
      ctx.fillRect(0, 0, 1080, 1080)
      drawContent()
    } else {
      ctx.fillStyle = selectedBgValue
      ctx.fillRect(0, 0, 1080, 1080)
      drawContent()
    }
  }

  // ════════════════════════════════════════════
  // TOAST
  // ════════════════════════════════════════════
  function showToast(msg) {
    var existing = document.getElementById('editorToast')
    if (existing) existing.remove()
    var t = document.createElement('div')
    t.id = 'editorToast'
    t.className = 'fixed top-20 left-1/2 z-[200] bg-dark/90 backdrop-blur-md text-white text-xs font-bold px-5 py-3 rounded-full shadow-lg whitespace-nowrap flex items-center gap-2'
    t.style.transform = 'translateX(-50%)'
    t.innerHTML = '<span class="material-symbols-outlined text-gold text-[14px]" style="font-variation-settings:\'FILL\' 1">check_circle</span> ' + msg
    document.body.appendChild(t)
    setTimeout(function() { if (t.parentNode) t.remove() }, 2200)
  }

</script>
