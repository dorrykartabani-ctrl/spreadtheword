<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GSTW</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Oswald:wght@600&family=Bebas+Neue&family=Merriweather:ital,wght@1,700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'dark':'#16202A',
            'rq-bg':'#fbf9f4','rq-container-low':'#f5f4ed',
            'rq-container-lowest':'#ffffff','rq-container-high':'#eeece4',
            'rq-primary':'#3d6285','rq-secondary':'#92B4D1',
            'text-dark':'#31332e','text-muted':'#5e6059','text-light':'#8a8c85',
            'border-soft':'rgba(94,96,89,0.15)',
            'card-bg':'#FFFFFF','surface':'#fbf9f4','cream':'#f5f4ed',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
            'quote':['Lora','serif'],
          },
        },
      },
    }
  </script>

  <style>
    *{box-sizing:border-box}
    body{
      font-family:'Manrope',sans-serif;
      background:#fbf9f4;
      color:#31332e;
      -webkit-tap-highlight-color:transparent;
      overflow-y:auto;
      min-height:100dvh;
      user-select:none;
      margin:0;
      letter-spacing:-0.005em;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-0.02em}
    .font-quote{font-family:'Lora',serif}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .tactical-gradient{background:linear-gradient(145deg,#152E45,#1E4060)}

    /* Font classes */
    .font-lora{font-family:'Lora',serif!important}
    .font-jakarta{font-family:'Plus Jakarta Sans',sans-serif!important}
    .font-playfair{font-family:'Playfair Display',serif!important}
    .font-oswald{font-family:'Oswald',sans-serif!important;text-transform:uppercase}
    .font-bebas{font-family:'Bebas Neue',sans-serif!important;letter-spacing:0.08em}
    .font-merri{font-family:'Merriweather',serif!important}

    /* Glass surfaces */
    .glass-header{
      background:rgba(251,249,244,0.85);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
    }
    .glass-footer{
      background:rgba(255,255,255,0.92);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-top:1px solid rgba(94,96,89,0.10);
    }

    /* Preview canvas */
    .canvas-frame{
      background:#ffffff;
      border-radius:24px;
      padding:6px;
      box-shadow:0 20px 40px rgba(49,51,46,0.06);
    }
    .preview-canvas{
      position:relative;
      width:100%;
      aspect-ratio:1;
      border-radius:20px;
      overflow:hidden;
      background:#16202A;
      touch-action:none;
    }

    /* Quote overlay — draggable */
    #quoteOverlay{
      cursor:grab;
      touch-action:none;
      position:absolute;
      z-index:10;
    }
    #quoteOverlay:active{cursor:grabbing}

    /* Drag hint */
    .drag-hint{
      position:absolute;
      bottom:16px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.6);
      color:white;
      font-size:11px;
      font-weight:600;
      padding:6px 12px;
      border-radius:99px;
      z-index:20;
      pointer-events:none;
      display:flex;
      align-items:center;
      gap:4px;
      animation:hintPulse 2s ease-in-out;
    }
    @keyframes hintPulse{
      0%,100%{opacity:0}
      15%,85%{opacity:1}
    }

    /* Media action buttons */
    .media-btn{
      transition:all 0.15s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .media-btn:active{transform:scale(0.97)}

    /* Tool dock */
    .tool-dock{
      background:#ffffff;
      border-radius:20px;
      padding:6px;
      display:flex;
      gap:2px;
      box-shadow:0 4px 16px rgba(49,51,46,0.04);
    }
    .dock-btn{
      flex:1;
      padding:10px 4px;
      border-radius:14px;
      background:transparent;
      color:#5e6059;
      font-size:11px;
      font-weight:700;
      transition:all 0.15s ease;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      -webkit-tap-highlight-color:transparent;
    }
    .dock-btn:hover{background:#f5f4ed}
    .dock-btn.active{
      background:#1E4060;
      color:#ffffff;
      box-shadow:0 4px 12px rgba(30,64,96,0.2);
    }
    .dock-btn.active .dock-icon{color:#ffffff}
    .dock-icon{color:#5e6059;transition:color 0.15s ease;font-size:22px !important}

    /* Tool panel */
    .tool-panel{
      background:#ffffff;
      border-radius:20px;
      padding:16px;
      margin-top:10px;
      max-height:0;
      opacity:0;
      overflow:hidden;
      transition:max-height 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.25s ease, padding 0.25s ease;
      padding-top:0;
      padding-bottom:0;
      box-shadow:0 4px 16px rgba(49,51,46,0.04);
    }
    .tool-panel.open{
      max-height:400px;
      opacity:1;
      padding-top:16px;
      padding-bottom:16px;
    }

    /* Sub-tool tabs (within a panel) */
    .subtab{
      padding:6px 12px;
      border-radius:10px;
      font-size:11px;
      font-weight:700;
      color:#5e6059;
      background:#f5f4ed;
      transition:all 0.15s ease;
      white-space:nowrap;
      -webkit-tap-highlight-color:transparent;
    }
    .subtab.active{
      background:#1E4060;
      color:#ffffff;
    }

    /* Background thumbs */
    .bg-thumb{
      width:60px;
      height:60px;
      border-radius:14px;
      overflow:hidden;
      cursor:pointer;
      border:3px solid transparent;
      flex-shrink:0;
      transition:all 0.15s;
      -webkit-tap-highlight-color:transparent;
    }
    .bg-thumb:active{transform:scale(0.95)}
    .bg-thumb.selected{
      border-color:#1E4060;
      box-shadow:0 4px 12px rgba(30,64,96,0.2);
    }

    /* Color swatches */
    .color-swatch{
      width:32px;
      height:32px;
      border-radius:50%;
      cursor:pointer;
      transition:transform 0.15s;
      border:3px solid transparent;
      flex-shrink:0;
      -webkit-tap-highlight-color:transparent;
    }
    .color-swatch:active{transform:scale(0.9)}
    .color-swatch.selected{
      border-color:white;
      transform:scale(1.1);
      box-shadow:0 0 0 2px #1E4060;
    }

    /* Font options */
    .font-opt{
      padding:8px 14px;
      border-radius:12px;
      font-size:13px;
      background:#f5f4ed;
      color:#31332e;
      transition:all 0.15s ease;
      white-space:nowrap;
      -webkit-tap-highlight-color:transparent;
    }
    .font-opt:active{transform:scale(0.97)}
    .font-opt.selected{
      background:#1E4060;
      color:#ffffff;
    }

    /* Style buttons */
    .style-btn{
      padding:8px 14px;
      border-radius:12px;
      font-size:11px;
      font-weight:700;
      background:#f5f4ed;
      color:#5e6059;
      transition:all 0.15s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .style-btn:active{transform:scale(0.97)}
    .style-btn.active{
      background:#1E4060;
      color:#ffffff;
    }

    /* Range slider */
    input[type="range"]{
      -webkit-appearance:none;
      width:100%;
      height:6px;
      border-radius:3px;
      background:#f5f4ed;
      outline:none;
    }
    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      width:22px;
      height:22px;
      border-radius:50%;
      background:#1E4060;
      cursor:pointer;
      box-shadow:0 2px 8px rgba(30,64,96,0.3);
    }
    input[type="range"]::-moz-range-thumb{
      width:22px;
      height:22px;
      border-radius:50%;
      background:#1E4060;
      cursor:pointer;
      border:none;
      box-shadow:0 2px 8px rgba(30,64,96,0.3);
    }

    /* No scrollbar */
    .no-scrollbar::-webkit-scrollbar{display:none}
    .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}

       /* Chip scroll fade */
    .chip-scroll{
      -webkit-mask-image:linear-gradient(90deg,transparent 0,#000 12px,#000 calc(100% - 24px),transparent 100%);
      mask-image:linear-gradient(90deg,transparent 0,#000 12px,#000 calc(100% - 24px),transparent 100%);
    }

    /* Enable horizontal scroll on desktop via wheel */
    .desktop-scroll{
      overflow-x:auto;
      overflow-y:hidden;
      scroll-behavior:smooth;
    }
    .desktop-scroll::-webkit-scrollbar{
      height:6px;
    }
    .desktop-scroll::-webkit-scrollbar-track{
      background:transparent;
    }
    .desktop-scroll::-webkit-scrollbar-thumb{
      background:rgba(94,96,89,0.2);
      border-radius:3px;
    }
    .desktop-scroll::-webkit-scrollbar-thumb:hover{
      background:rgba(94,96,89,0.4);
    }
    @media (hover:hover){
      .desktop-scroll{
        overflow-x:auto;
        -ms-overflow-style:auto;
        scrollbar-width:thin;
      }
    }

    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin 1s linear infinite;display:inline-block}

    /* Reset button in header */
    .header-btn{
      width:40px;
      height:40px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#5e6059;
      transition:all 0.15s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .header-btn:hover{background:#f5f4ed}
    .header-btn:active{transform:scale(0.9)}

    .pb-safe{padding-bottom:env(safe-area-inset-bottom,16px)}
  </style>
</head>

<body>

<!-- Hidden file inputs -->
<input type="file" id="selfieInput" accept="image/*" capture="user" class="hidden" onchange="handleImageSelect(this)">
<input type="file" id="galleryInput" accept="image/*" class="hidden" onchange="handleImageSelect(this)">

<div class="max-w-[430px] mx-auto flex flex-col min-h-[100dvh]">

  <!-- ═══════════════════════════════════════════ -->
  <!-- HEADER -->
  <!-- ═══════════════════════════════════════════ -->
  <header class="glass-header sticky top-0 z-40 flex items-center justify-between px-4 py-3">
    <button onclick="goBack()" class="header-btn" aria-label="Back">
      <span class="material-symbols-outlined text-[22px]">arrow_back</span>
    </button>
    <span class="font-headline font-bold text-sm text-text-dark">Create</span>
    <button onclick="resetEditor()" class="header-btn" aria-label="Reset" title="Reset">
      <span class="material-symbols-outlined text-[20px]">refresh</span>
    </button>
  </header>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PREVIEW CANVAS -->
  <!-- ═══════════════════════════════════════════ -->
  <section class="px-4 pt-4">
    <div class="canvas-frame">
      <div class="preview-canvas" id="previewCanvas">
        <!-- Background layer -->
        <div id="bgLayer" class="absolute inset-0 bg-cover bg-center"></div>

        <!-- Darkness overlay -->
        <div id="darkLayer" class="absolute inset-0" style="background:rgba(0,0,0,0.3)"></div>

              <!-- Quote overlay (draggable) -->
        <div id="quoteOverlay" class="absolute left-[10%] top-[25%] w-[80%] p-4 flex flex-col text-center">
          <p id="quoteText" class="font-quote font-semibold text-[18px] text-white leading-snug" style="opacity:0;transition:opacity 0.3s"></p>
          <p id="quoteRef" class="mt-3 font-body font-bold text-[11px] text-white/90 tracking-wider" style="opacity:0;transition:opacity 0.3s"></p>
        </div>

        <!-- Drag hint (first time only) -->
        <div id="dragHint" class="drag-hint">
          <span class="material-symbols-outlined text-[14px]">drag_pan</span>
          Drag to position
        </div>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MEDIA ACTIONS -->
  <!-- ═══════════════════════════════════════════ -->
  <section class="px-4 pt-4">
    <div class="grid grid-cols-2 gap-3">
      <button onclick="takeSelfie()" class="media-btn bg-gold text-dark font-headline font-bold text-sm py-3 rounded-2xl flex items-center justify-center gap-2 shadow-lg">
        <span class="material-symbols-outlined text-[20px]">photo_camera</span>
        Take Selfie
      </button>
      <button onclick="openGallery()" class="media-btn bg-white text-text-dark font-headline font-bold text-sm py-3 rounded-2xl flex items-center justify-center gap-2 shadow" style="box-shadow:0 4px 16px rgba(49,51,46,0.04)">
        <span class="material-symbols-outlined text-[20px]">photo_library</span>
        Gallery
      </button>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- TOOL DOCK -->
  <!-- ═══════════════════════════════════════════ -->
  <section class="px-4 pt-4">
    <div class="tool-dock">
      <button id="dockBackground" onclick="openTool('background')" class="dock-btn">
        <span class="dock-icon material-symbols-outlined">wallpaper</span>
        Background
      </button>
      <button id="dockText" onclick="openTool('text')" class="dock-btn">
        <span class="dock-icon material-symbols-outlined">text_fields</span>
        Text
      </button>
      <button id="dockFilter" onclick="openTool('filter')" class="dock-btn">
        <span class="dock-icon material-symbols-outlined">tune</span>
        Filter
      </button>
      <button id="dockAdjust" onclick="openTool('adjust')" class="dock-btn">
        <span class="dock-icon material-symbols-outlined">contrast</span>
        Adjust
      </button>
    </div>

    <!-- ─────────────────────────────────────── -->
    <!-- TOOL PANELS -->
    <!-- ─────────────────────────────────────── -->

    <!-- BACKGROUND PANEL -->
    <div id="panelBackground" class="tool-panel">
      <p class="text-[10px] font-bold text-text-light uppercase tracking-widest mb-3">Choose a background</p>
           <div class="chip-scroll desktop-scroll flex gap-2 overflow-x-auto pb-1" onwheel="if(event.deltaY!==0){event.preventDefault();this.scrollLeft+=event.deltaY}">
        <button onclick="openGallery()" class="bg-thumb bg-cream flex items-center justify-center border-2 border-border-soft" style="border-style:dashed">
          <span class="material-symbols-outlined text-text-muted text-[24px]">add_photo_alternate</span>
        </button>
        <div class="bg-thumb selected" onclick="selectPreset(this,'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-thumb" onclick="selectPreset(this,'https://images.unsplash.com/photo-1477346611705-65d1883cee1e?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1477346611705-65d1883cee1e?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-thumb" onclick="selectPreset(this,'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-thumb" onclick="selectPreset(this,'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-thumb" onclick="selectPreset(this,'https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-thumb" onclick="selectPreset(this,'https://images.unsplash.com/photo-1490730141103-6cac27aaab94?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1490730141103-6cac27aaab94?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-thumb" style="background:#16202A" onclick="selectSolid(this,'#16202A')"></div>
        <div class="bg-thumb" style="background:#1E4060" onclick="selectSolid(this,'#1E4060')"></div>
        <div class="bg-thumb" style="background:#000000" onclick="selectSolid(this,'#000000')"></div>
        <div class="bg-thumb" style="background:linear-gradient(145deg,#152E45,#1E4060)" onclick="selectGradient(this,'linear-gradient(145deg,#152E45,#1E4060)')"></div>
        <div class="bg-thumb" style="background:linear-gradient(145deg,#D4A24C,#8B6914)" onclick="selectGradient(this,'linear-gradient(145deg,#D4A24C,#8B6914)')"></div>
        <div class="bg-thumb" style="background:linear-gradient(145deg,#3d6285,#92B4D1)" onclick="selectGradient(this,'linear-gradient(145deg,#3d6285,#92B4D1)')"></div>
      </div>
    </div>

    <!-- TEXT PANEL -->
    <div id="panelText" class="tool-panel">
      <!-- Sub-tabs -->
      <div class="flex gap-2 mb-4 overflow-x-auto no-scrollbar">
        <button onclick="showTextTab('font',this)" class="subtab active">Font</button>
        <button onclick="showTextTab('size',this)" class="subtab">Size</button>
        <button onclick="showTextTab('color',this)" class="subtab">Color</button>
        <button onclick="showTextTab('align',this)" class="subtab">Align</button>
        <button onclick="showTextTab('style',this)" class="subtab">Style</button>
      </div>

      <!-- Font -->
      <div id="textFont" class="text-sub">
        <div class="desktop-scroll flex gap-2 overflow-x-auto" onwheel="if(event.deltaY!==0){event.preventDefault();this.scrollLeft+=event.deltaY}"">
          <button onclick="setFont('font-lora',this)" class="font-opt selected" style="font-family:'Lora',serif">Lora</button>
          <button onclick="setFont('font-jakarta',this)" class="font-opt font-bold" style="font-family:'Plus Jakarta Sans'">Jakarta</button>
          <button onclick="setFont('font-playfair',this)" class="font-opt font-bold" style="font-family:'Playfair Display',serif">Playfair</button>
          <button onclick="setFont('font-oswald',this)" class="font-opt font-bold" style="font-family:'Oswald'">OSWALD</button>
          <button onclick="setFont('font-bebas',this)" class="font-opt" style="font-family:'Bebas Neue';letter-spacing:0.08em">BEBAS</button>
          <button onclick="setFont('font-merri',this)" class="font-opt font-bold" style="font-family:'Merriweather',serif">Merri</button>
        </div>
      </div>

      <!-- Size -->
      <div id="textSize" class="text-sub hidden">
        <div class="flex items-center justify-between mb-3">
          <span class="text-[11px] font-bold text-text-muted">Text Size</span>
          <span id="sizeLabel" class="text-xs font-bold text-primary">18px</span>
        </div>
        <input type="range" min="12" max="32" value="18" oninput="setSize(this.value)">
      </div>

      <!-- Color -->
      <div id="textColor" class="text-sub hidden">
        <div class="desktop-scroll flex gap-2 overflow-x-auto" onwheel="if(event.deltaY!==0){event.preventDefault();this.scrollLeft+=event.deltaY}"">
          <div class="color-swatch selected" style="background:#FFFFFF" onclick="setColor('#FFFFFF',this)"></div>
          <div class="color-swatch" style="background:#FDE047" onclick="setColor('#FDE047',this)"></div>
          <div class="color-swatch" style="background:#D4A24C" onclick="setColor('#D4A24C',this)"></div>
          <div class="color-swatch" style="background:#1E4060" onclick="setColor('#1E4060',this)"></div>
          <div class="color-swatch" style="background:#000000" onclick="setColor('#000000',this)"></div>
          <div class="color-swatch" style="background:#F87171" onclick="setColor('#F87171',this)"></div>
          <div class="color-swatch" style="background:#93C5FD" onclick="setColor('#93C5FD',this)"></div>
          <div class="color-swatch" style="background:#86EFAC" onclick="setColor('#86EFAC',this)"></div>
          <div class="color-swatch" style="background:#F9A8D4" onclick="setColor('#F9A8D4',this)"></div>
        </div>
      </div>

      <!-- Align -->
      <div id="textAlign" class="text-sub hidden">
        <div class="flex gap-2">
          <button onclick="setAlign('left',this)" class="style-btn flex-1 flex items-center justify-center gap-1">
            <span class="material-symbols-outlined text-[16px]">format_align_left</span>Left
          </button>
          <button onclick="setAlign('center',this)" class="style-btn active flex-1 flex items-center justify-center gap-1">
            <span class="material-symbols-outlined text-[16px]">format_align_center</span>Center
          </button>
          <button onclick="setAlign('right',this)" class="style-btn flex-1 flex items-center justify-center gap-1">
            <span class="material-symbols-outlined text-[16px]">format_align_right</span>Right
          </button>
        </div>
      </div>

      <!-- Style -->
      <div id="textStyle" class="text-sub hidden">
        <div class="flex gap-2 flex-wrap">
          <button onclick="setTextStyle('clean',this)" class="style-btn active">Clean</button>
          <button onclick="setTextStyle('shadow',this)" class="style-btn">Shadow</button>
          <button onclick="setTextStyle('outline',this)" class="style-btn">Outline</button>
          <button onclick="setTextStyle('pill',this)" class="style-btn">Background</button>

  async function initEditor() {

        if (qr) qr.textContent = '— ' + (quote.source || 'GSTW').toUpperCase()
        window.currentQuoteId = quote.id
        if (quote.background_url) quoteBgUrl = quote.background_url

        if (qr) qr.textContent = '— GSTW'

    quoteHashtags = quoteHashtagsFromDb

    if (qt) qt.style.opacity = '1'
    if (qr) qr.style.opacity = '1'

  // ════════════════════════════════════════════
  // AUTO-FIT LONG QUOTES
  // ════════════════════════════════════════════
  function autoFitQuote() {
    var qt = document.getElementById('quoteText')
    if (!qt) return
    var text = qt.textContent || ''
    var len = text.length

    // Reduce font size for longer quotes
    var size = 18
    if (len > 200) size = 13
    else if (len > 150) size = 14
    else if (len > 100) size = 16
    else size = 18

    qt.style.fontSize = size + 'px'
    var sizeLabel = document.getElementById('sizeLabel')
    if (sizeLabel) sizeLabel.textContent = size + 'px'
    var sizeInput = document.querySelector('input[type="range"][min="12"]')
    if (sizeInput) sizeInput.value = size
  }

    sessionStorage.removeItem('gstw_bg_type')
    sessionStorage.removeItem('gstw_bg_value')
    sessionStorage.removeItem('gstw_overlay_x')
    sessionStorage.removeItem('gstw_overlay_y')
    location.reload()
  }

  // ════════════════════════════════════════════

  function applyBackground(type, value) {
    var bg = document.getElementById('bgLayer')

    if (type === 'image') {
      bg.style.background = 'none'
      bg.style.backgroundImage = "url('" + value + "')"
      bg.style.backgroundSize = 'cover'
      bg.style.backgroundPosition = 'center'

      bg.style.backgroundImage = 'none'
      bg.style.background = value

  // ════════════════════════════════════════════
  // DRAG

  function onDragStart(e) {
    var overlay = document.getElementById('quoteOverlay')
    if (!overlay) return
    dragActive = true
    hasBeenDragged = true
    var hint = document.getElementById('dragHint')
    if (hint) hint.style.display = 'none'

    var cx = e.touches ? e.touches[0].clientX : e.clientX
    var cy = e.touches ? e.touches[0].clientY : e.clientY
    var canvas = document.getElementById('previewCanvas')
    var rect = overlay.getBoundingClientRect()
    var canvasRect = canvas.getBoundingClientRect()
    overlayStartX = rect.left - canvasRect.left
    overlayStartY = rect.top - canvasRect.top
    overlay.style.left = overlayStartX + 'px'
    overlay.style.top = overlayStartY + 'px'
    dragStartX = cx
    dragStartY = cy
    if (e.cancelable) e.preventDefault()
  }

  function onDragMove(e) {
    if (!dragActive) return
    var overlay = document.getElementById('quoteOverlay')
    var canvas = document.getElementById('previewCanvas')
    if (!overlay || !canvas) return
    var cx = e.touches ? e.touches[0].clientX : e.clientX
    var cy = e.touches ? e.touches[0].clientY : e.clientY
    var canvasRect = canvas.getBoundingClientRect()
    var maxX = canvasRect.width - overlay.offsetWidth
    var maxY = canvasRect.height - overlay.offsetHeight
    var newX = Math.max(0, Math.min(overlayStartX + (cx - dragStartX), maxX))
    var newY = Math.max(0, Math.min(overlayStartY + (cy - dragStartY), maxY))
    overlay.style.left = newX + 'px'
    overlay.style.top = newY + 'px'
    if (e.cancelable) e.preventDefault()
  }

    sessionStorage.setItem('gstw_quote_id', window.currentQuoteId || '')
    sessionStorage.setItem('gstw_bg_type', selectedBgType)
    sessionStorage.setItem('gstw_bg_value', selectedBgValue)

    // Save position + width as percentages
    if (overlay && canvas) {
      var canvasRect = canvas.getBoundingClientRect()
      var overlayRect = overlay.getBoundingClientRect()
      var xPct = ((overlayRect.left - canvasRect.left) / canvasRect.width) * 100
      var yPct = ((overlayRect.top - canvasRect.top) / canvasRect.height) * 100

    setTimeout(function() {
      generateImage(qt, qr)

  // ════════════════════════════════════════════
  // GENERATE IMAGE — Canvas API
  // ════════════════════════════════════════════
  function generateImage(qt, qr) {
    var canvas = document.createElement('canvas')
    canvas.width = 1080
    canvas.height = 1080
    var ctx = canvas.getContext('2d')

    ctx.fillStyle = '#16202A'
    ctx.fillRect(0, 0, 1080, 1080)

    var xPct = parseFloat(sessionStorage.getItem('gstw_overlay_x')) || 10
    var yPct = parseFloat(sessionStorage.getItem('gstw_overlay_y')) || 25
    var wPct = parseFloat(sessionStorage.getItem('gstw_overlay_w')) || 80
    var align = currentAlign
    var textColor = qt ? (qt.style.color || '#FFFFFF') : '#FFFFFF'
    var fontSize = parseInt(qt ? (qt.style.fontSize || '18') : '18')
    var fontFam = qt ? (qt.style.fontFamily || "'Lora', serif") : "'Lora', serif"
    var textTransform = qt ? (qt.style.textTransform || 'none') : 'none'
    var darkness = sessionStorage.getItem('gstw_darkness') || 'rgba(0,0,0,0.3)'
    var textStyle = sessionStorage.getItem('gstw_text_style') || 'clean'
    var filter = sessionStorage.getItem('gstw_filter') || 'none'

    function wrapText(ctx, text, maxWidth) {
      if (textTransform === 'uppercase') text = text.toUpperCase()
      var words = text.split(' ')
      var line = ''
      var lines = []
      for (var n = 0; n < words.length; n++) {
        var testLine = line + words[n] + ' '
        if (ctx.measureText(testLine).width > maxWidth && n > 0) {
          lines.push(line.trim())
          line = words[n] + ' '
        } else { line = testLine }
      }
      lines.push(line.trim())
      return lines
    }

    function drawTextLines(ctx, lines, x, y, maxWidth, lineHeight, align, style, color) {
      var textX = x
      if (align === 'center') textX = x + maxWidth / 2
      if (align === 'right') textX = x + maxWidth

      for (var i = 0; i < lines.length; i++) {
        var lineY = y + (i * lineHeight)

        // Outline: draw stroke first, then fill
        if (style === 'outline') {
          ctx.lineWidth = 2
          ctx.strokeStyle = 'rgba(0,0,0,0.6)'
          ctx.strokeText(lines[i], textX, lineY)
        }

        // Shadow: apply before fill
        if (style === 'shadow') {
          ctx.shadowColor = 'rgba(0,0,0,0.6)'
          ctx.shadowBlur = 12
          ctx.shadowOffsetY = 3
        }

        ctx.fillStyle = color
        ctx.fillText(lines[i], textX, lineY)

        // Reset shadow
        ctx.shadowColor = 'transparent'
        ctx.shadowBlur = 0
        ctx.shadowOffsetY = 0
      }
      return y + (lines.length * lineHeight)
    }

    function drawContent() {
      // Apply darkness overlay
      ctx.fillStyle = darkness
      ctx.fillRect(0, 0, 1080, 1080)

      // Position calculations (percentages → pixels on 1080 canvas)
      var textX = Math.round(xPct * 10.8)
      var textY = Math.round(yPct * 10.8)
      var textW = Math.round(wPct * 10.8)

      // Ensure padding within overlay
      var innerPadding = textStyle === 'pill' ? 24 : 16
      var contentX = textX + innerPadding
      var contentY = textY + innerPadding
      var contentW = textW - (innerPadding * 2)

      if (align === 'center') ctx.textAlign = 'center'
      else if (align === 'right') ctx.textAlign = 'right'
      else ctx.textAlign = 'left'
      ctx.textBaseline = 'top'

         // Quote text (no decorative mark)
      var scaledFontSize = Math.round(fontSize * 3.2)
      ctx.font = '600 ' + scaledFontSize + 'px ' + fontFam
      var quoteText = qt ? qt.textContent : ''
      var lines = wrapText(ctx, quoteText, contentW)
      var lineHeight = scaledFontSize * 1.4
      var quoteStartY = contentY + 20

      // Draw pill background BEFORE text if selected
      if (textStyle === 'pill') {
        // Calculate total content height
        var totalTextHeight = 20 + (lines.length * lineHeight) + 60 + (fontSize * 1.4) + 30
        ctx.fillStyle = 'rgba(0,0,0,0.4)'
        ctx.beginPath()
        if (ctx.roundRect) {
          ctx.roundRect(textX, textY, textW, totalTextHeight, 24)
        } else {
          // Fallback for older browsers
          ctx.rect(textX, textY, textW, totalTextHeight)
        }
        ctx.fill()
      }

      var endY = drawTextLines(ctx, lines, contentX, quoteStartY, contentW, lineHeight, align, textStyle, textColor)

      // Reference
      var refFontSize = Math.round(fontSize * 1.5)
      ctx.font = 'bold ' + refFontSize + 'px "Plus Jakarta Sans", sans-serif'
      var refText = qr ? qr.textContent : ''
      var refX = align === 'center' ? textX + textW / 2 : align === 'right' ? textX + textW - innerPadding : contentX
      var refY = endY + 30

      if (textStyle === 'shadow') {
        ctx.shadowColor = 'rgba(0,0,0,0.5)'
        ctx.shadowBlur = 8
        ctx.shadowOffsetY = 2
      }
      if (textStyle === 'outline') {
        ctx.lineWidth = 1.5
        ctx.strokeStyle = 'rgba(0,0,0,0.6)'
        ctx.strokeText(refText, refX, refY)
      }
      ctx.fillStyle = textColor
      ctx.globalAlpha = 0.95
      ctx.fillText(refText, refX, refY)
      ctx.globalAlpha = 1
      ctx.shadowColor = 'transparent'
      ctx.shadowBlur = 0
      ctx.shadowOffsetY = 0

      try {
        sessionStorage.setItem('gstw_final_image', canvas.toDataURL('image/png'))
      } catch(e) {
        console.error('Could not save image:', e)
        sessionStorage.removeItem('gstw_final_image')
      }
      window.location.href = 'preview.html'
    }

    if (selectedBgType === 'image') {
      var img = new Image()
      img.crossOrigin = 'anonymous'
      img.onload = function() {
        var scale = Math.max(1080 / img.width, 1080 / img.height)
        var sw = img.width * scale
        var sh = img.height * scale
        if (filter !== 'none' && filterCSS[filter]) ctx.filter = filterCSS[filter]
        ctx.drawImage(img, (1080 - sw) / 2, (1080 - sh) / 2, sw, sh)
        ctx.filter = 'none'
        drawContent()
      }
      img.onerror = function() {
        ctx.fillStyle = '#1E4060'
        ctx.fillRect(0, 0, 1080, 1080)
        drawContent()
      }
      img.src = selectedBgValue
    } else if (selectedBgType === 'gradient') {
      var gradient = ctx.createLinearGradient(0, 0, 1080, 1080)
      var colors = selectedBgValue.match(/#[0-9A-Fa-f]{6}/g)
      if (colors && colors.length >= 2) {
        gradient.addColorStop(0, colors[0])
        gradient.addColorStop(1, colors[1])
      }
      ctx.fillStyle = gradient
      ctx.fillRect(0, 0, 1080, 1080)
      drawContent()
    } else {
      ctx.fillStyle = selectedBgValue
      ctx.fillRect(0, 0, 1080, 1080)
      drawContent()
    }
  }

  // ════════════════════════════════════════════
  // TOAST
  // ════════════════════════════════════════════
  function showToast(msg) {
    var existing = document.getElementById('editorToast')
    if (existing) existing.remove()
    var t = document.createElement('div')
    t.id = 'editorToast'
    t.className = 'fixed top-20 left-1/2 z-[200] bg-text-dark/95 backdrop-blur-md text-white text-xs font-bold px-5 py-2.5 rounded-full whitespace-nowrap flex items-center gap-2'
    t.style.transform = 'translateX(-50%)'
    t.style.boxShadow = '0 20px 40px rgba(49,51,46,0.15)'
    t.innerHTML = '<span class="material-symbols-outlined text-gold text-[14px]" style="font-variation-settings:\'FILL\' 1">check_circle</span> ' + msg
    document.body.appendChild(t)
    setTimeout(function() { if (t.parentNode) t.remove() }, 2200)
  }

</script>
