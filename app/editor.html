<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Create — GSTW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rq-cream: #FAF8F5;
      --rq-warm: #F5F0E8;
      --rq-gold: #C9A84C;
      --rq-gold-light: #E8D5A3;
      --rq-brown: #8B6914;
      --rq-text: #2C2416;
      --rq-text-soft: #6B5B3E;
      --rq-glass: rgba(255,255,255,0.7);
      --rq-glass-border: rgba(201,168,76,0.2);
      --rq-shadow: 0 8px 32px rgba(44,36,22,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--rq-cream);
      color: var(--rq-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 80%, rgba(139,105,20,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .app-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(250,248,245,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--rq-glass-border);
    }

    .header-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--rq-glass-border);
      background: var(--rq-glass);
      color: var(--rq-text-soft);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .header-btn:hover { background: white; color: var(--rq-text); }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--rq-text);
      letter-spacing: -0.3px;
    }

    .reset-btn {
      font-size: 13px;
      font-weight: 500;
      color: var(--rq-text-soft);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .reset-btn:hover { background: rgba(201,168,76,0.1); color: var(--rq-brown); }

    /* ── Canvas Area ── */
    .canvas-section {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .canvas-frame {
      width: 100%;
      max-width: 340px;
      aspect-ratio: 1;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--rq-shadow), 0 0 0 1px var(--rq-glass-border);
      position: relative;
      background: #1a1a2e;
    }

    #mainCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Media Actions ── */
    .media-actions {
      display: flex;
      gap: 10px;
    }

    .media-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid var(--rq-glass-border);
      background: var(--rq-glass);
      color: var(--rq-text-soft);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .media-btn:hover {
      background: white;
      color: var(--rq-text);
      border-color: var(--rq-gold-light);
      box-shadow: 0 4px 12px rgba(201,168,76,0.15);
    }

    /* ── Tool Dock ── */
    .tool-dock {
      margin: 0 16px;
      border-radius: 16px;
      border: 1px solid var(--rq-glass-border);
      background: var(--rq-glass);
      backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .tool-tabs {
      display: flex;
      border-bottom: 1px solid var(--rq-glass-border);
    }

    .tool-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 4px;
      font-size: 10px;
      font-weight: 500;
      color: var(--rq-text-soft);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: none;
      position: relative;
    }

    .tool-tab svg { width: 18px; height: 18px; }

    .tool-tab.active {
      color: var(--rq-brown);
      background: rgba(201,168,76,0.08);
    }

    .tool-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      right: 20%;
      height: 2px;
      background: var(--rq-gold);
      border-radius: 2px 2px 0 0;
    }

    .tool-panel {
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      max-height: 280px;
      overflow-y: auto;
    }

    .tool-panel.active { display: flex; }

    /* Panel components */
    .panel-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--rq-text-soft);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .color-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .color-swatch.active,
    .color-swatch:hover {
      border-color: var(--rq-gold);
      transform: scale(1.15);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-row label {
      font-size: 12px;
      color: var(--rq-text-soft);
      min-width: 80px;
    }

    .slider-row input[type=range] {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      accent-color: var(--rq-gold);
    }

    .slider-row .val {
      font-size: 12px;
      color: var(--rq-text);
      font-weight: 500;
      min-width: 30px;
      text-align: right;
    }

    .bg-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .bg-thumb {
      aspect-ratio: 1;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      overflow: hidden;
      position: relative;
    }

    .bg-thumb.active,
    .bg-thumb:hover {
      border-color: var(--rq-gold);
      transform: scale(1.05);
    }

    .bg-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bg-thumb-color {
      width: 100%;
      height: 100%;
    }

    .font-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .font-option {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--rq-glass-border);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      color: var(--rq-text);
      background: white;
    }

    .font-option.active,
    .font-option:hover {
      border-color: var(--rq-gold);
      background: rgba(201,168,76,0.08);
    }

    .pill-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .pill-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--rq-glass-border);
      cursor: pointer;
      transition: all 0.2s;
      background: white;
    }

    .pill-option.active,
    .pill-option:hover {
      border-color: var(--rq-gold);
      background: rgba(201,168,76,0.08);
    }

    .pill-preview {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .filter-thumb {
      aspect-ratio: 1;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      overflow: hidden;
      position: relative;
      background: #ddd;
    }

    .filter-thumb.active,
    .filter-thumb:hover { border-color: var(--rq-gold); }

    .filter-thumb canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .filter-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 9px;
      font-weight: 600;
      color: white;
      padding: 4px 2px;
      background: rgba(0,0,0,0.4);
    }

    /* ── Bottom CTA ── */
    .bottom-cta {
      position: sticky;
      bottom: 0;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: rgba(250,248,245,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--rq-glass-border);
      margin-top: auto;
    }

    .cta-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--rq-gold) 0%, var(--rq-brown) 100%);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(201,168,76,0.35);
      letter-spacing: -0.2px;
    }

    .cta-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(201,168,76,0.45);
    }

    .cta-btn:active { transform: translateY(0); }

    /* ── Spacer ── */
    .scroll-spacer { height: 16px; }

    /* ── Hidden inputs ── */
    #photoInput, #galleryInput { display: none; }

    /* ── Toggle switch ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }

    .toggle-label {
      font-size: 13px;
      color: var(--rq-text);
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 11px;
      background: #ddd;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track { background: var(--rq-gold); }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .toggle input:checked + .toggle-track::after { transform: translateX(18px); }

    /* Scrollbar */
    .tool-panel::-webkit-scrollbar { width: 3px; }
    .tool-panel::-webkit-scrollbar-track { background: transparent; }
    .tool-panel::-webkit-scrollbar-thumb { background: var(--rq-gold-light); border-radius: 2px; }
  </style>
</head>
<body>
<div class="app-container">

  <!-- Header -->
  <header class="header">
    <a href="home.html" class="header-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </a>
    <span class="header-title">Create</span>
    <button class="reset-btn" onclick="resetEditor()">Reset</button>
  </header>

  <!-- Canvas -->
  <section class="canvas-section">
    <div class="canvas-frame">
      <canvas id="mainCanvas" width="1080" height="1080"></canvas>
    </div>
    <div class="media-actions">
      <button class="media-btn" onclick="document.getElementById('photoInput').click()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Selfie
      </button>
      <button class="media-btn" onclick="document.getElementById('galleryInput').click()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        Gallery
      </button>
    </div>
  </section>

  <!-- Tool Dock -->
  <div class="tool-dock">
    <div class="tool-tabs">
      <button class="tool-tab active" onclick="switchTab('background')" id="tab-background">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        Background
      </button>
      <button class="tool-tab" onclick="switchTab('text')" id="tab-text">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>
        </svg>
        Text
      </button>
      <button class="tool-tab" onclick="switchTab('filter')" id="tab-filter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        Filter
      </button>
      <button class="tool-tab" onclick="switchTab('adjust')" id="tab-adjust">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>
        </svg>
        Adjust
      </button>
    </div>

    <!-- Background Panel -->
    <div class="tool-panel active" id="panel-background">
      <div>
        <div class="panel-label">Preset Backgrounds</div>
        <div class="bg-grid" id="bgGrid"></div>
      </div>
      <div>
        <div class="panel-label">Solid Colors</div>
        <div class="color-grid" id="bgColorGrid"></div>
      </div>
    </div>

    <!-- Text Panel -->
    <div class="tool-panel" id="panel-text">
      <div>
        <div class="panel-label">Text Color</div>
        <div class="color-grid" id="textColorGrid"></div>
      </div>
      <div>
        <div class="panel-label">Font</div>
        <div class="font-grid" id="fontGrid"></div>
      </div>
      <div>
        <div class="panel-label">Text Size</div>
        <div class="slider-row">
          <label>Size</label>
          <input type="range" min="40" max="120" value="72" id="fontSizeSlider" oninput="updateFontSize(this.value)"/>
          <span class="val" id="fontSizeVal">72</span>
        </div>
      </div>
      <div>
        <div class="panel-label">Quote Width</div>
        <div class="slider-row">
          <label>Width</label>
          <input type="range" min="50" max="95" value="78" id="widthSlider" oninput="updateOverlayWidth(this.value)"/>
          <span class="val" id="widthVal">78%</span>
        </div>
      </div>
      <div>
        <div class="panel-label">Pill Style</div>
        <div class="pill-options" id="pillOptions"></div>
      </div>
      <div>
        <div class="toggle-row">
          <span class="toggle-label">Show Attribution</span>
          <label class="toggle">
            <input type="checkbox" id="attributionToggle" checked onchange="drawCanvas()"/>
            <div class="toggle-track"></div>
          </label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Show Logo</span>
          <label class="toggle">
            <input type="checkbox" id="logoToggle" checked onchange="drawCanvas()"/>
            <div class="toggle-track"></div>
          </label>
        </div>
      </div>
    </div>

    <!-- Filter Panel -->
    <div class="tool-panel" id="panel-filter">
      <div class="panel-label">Photo Filters</div>
      <div class="filter-grid" id="filterGrid"></div>
    </div>

    <!-- Adjust Panel -->
    <div class="tool-panel" id="panel-adjust">
      <div class="slider-row">
        <label>Brightness</label>
        <input type="range" min="-100" max="100" value="0" id="brightnessSlider" oninput="updateAdjust()"/>
        <span class="val" id="brightnessVal">0</span>
      </div>
      <div class="slider-row">
        <label>Contrast</label>
        <input type="range" min="-100" max="100" value="0" id="contrastSlider" oninput="updateAdjust()"/>
        <span class="val" id="contrastVal">0</span>
      </div>
      <div class="slider-row">
        <label>Saturation</label>
        <input type="range" min="-100" max="100" value="0" id="saturationSlider" oninput="updateAdjust()"/>
        <span class="val" id="satVal">0</span>
      </div>
      <div class="slider-row">
        <label>Overlay</label>
        <input type="range" min="0" max="80" value="35" id="overlaySlider" oninput="updateAdjust()"/>
        <span class="val" id="overlayVal">35</span>
      </div>
      <div class="slider-row">
        <label>Blur</label>
        <input type="range" min="0" max="20" value="0" id="blurSlider" oninput="updateAdjust()"/>
        <span class="val" id="blurVal">0</span>
      </div>
    </div>
  </div>

  <div class="scroll-spacer"></div>

  <!-- Bottom CTA -->
  <div class="bottom-cta">
    <button class="cta-btn" onclick="goToPreview()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
      Preview & Share
    </button>
  </div>

</div>

<!-- Hidden inputs -->
<input type="file" id="photoInput" accept="image/*" capture="user" onchange="loadUserPhoto(this)"/>
<input type="file" id="galleryInput" accept="image/*" onchange="loadUserPhoto(this)"/>

const BG_COLORS = [
  '#1a1a2e', '#16213e', '#0f3460', '#533483',
  '#2d6a4f', '#1b4332', '#7b2d8b', '#c9184a',
  '#b5451b', '#d4a017', '#2b2d42', '#3d405b',
];

const TEXT_COLORS = [
  '#FFFFFF', '#FAF8F5', '#F5F0E8', '#E8D5A3',
  '#C9A84C', '#FFD700', '#000000', '#1a1a2e',
  '#2d6a4f', '#c9184a', '#FF6B6B', '#74C69D',
];

const FONTS = [
  { name: 'Inter', label: 'Inter — Clean & Modern', style: 'font-family:Inter,sans-serif' },
  { name: 'Playfair Display', label: 'Playfair — Classic Serif', style: 'font-family:"Playfair Display",serif' },
  { name: 'Georgia', label: 'Georgia — Traditional', style: 'font-family:Georgia,serif' },
  { name: 'Arial', label: 'Arial — Simple & Bold', style: 'font-family:Arial,sans-serif' },
];

const PILL_STYLES = [
  { id: 'none', label: 'No background', preview: { bg: 'transparent', color: '#fff', border: '1px solid rgba(255,255,255,0.3)' } },
  { id: 'dark', label: 'Dark glass', preview: { bg: 'rgba(0,0,0,0.5)', color: '#fff', border: 'none' } },
  { id: 'light', label: 'Light glass', preview: { bg: 'rgba(255,255,255,0.85)', color: '#222', border: 'none' } },
  { id: 'gold', label: 'Gold accent', preview: { bg: 'rgba(201,168,76,0.9)', color: '#1a1a2e', border: 'none' } },
];

const FILTERS = [
  { id: 'none', label: 'Original' },
  { id: 'warm', label: 'Warm' },
  { id: 'cool', label: 'Cool' },
  { id: 'fade', label: 'Fade' },
  { id: 'dramatic', label: 'Drama' },
  { id: 'bw', label: 'B&W' },
];

// ── Canvas ─────────────────────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function drawCanvas() {
  ctx.clearRect(0, 0, 1080, 1080);

  // 1. Background
  if (state.userPhoto) {
    drawImageCover(ctx, state.userPhoto, 0, 0, 1080, 1080);
  } else if (state.bgImage) {
    drawImageCover(ctx, state.bgImage, 0, 0, 1080, 1080);
  } else {
    ctx.fillStyle = state.bgValue || '#1a1a2e';
    ctx.fillRect(0, 0, 1080, 1080);
  }

  // 2. Apply filter
  applyFilter(state.filter);

  // 3. Overlay
  const overlayAlpha = state.overlayOpacity / 100;
  ctx.fillStyle = `rgba(0,0,0,${overlayAlpha})`;
  ctx.fillRect(0, 0, 1080, 1080);

  // 4. Quote text
  if (state.quote) {
    drawQuoteText();
  }

  // 5. Logo
  if (state.showLogo) {
    drawLogo();
  }
}

function drawImageCover(ctx, img, x, y, w, h) {
  const scale = Math.max(w / img.width, h / img.height);
  const sw = img.width * scale;
  const sh = img.height * scale;
  const sx = x + (w - sw) / 2;
  const sy = y + (h - sh) / 2;
  ctx.drawImage(img, sx, sy, sw, sh);
}

function drawQuoteText() {
  const text = state.quote.text || '';
  const attribution = state.quote.attribution || state.quote.book || '';
  const maxW = (state.overlayWidth / 100) * 1080;
  const cx = 540;

  ctx.save();

  // Auto-fit font size
  let fontSize = state.fontSize;
  ctx.font = `${state.fontFamily === 'Playfair Display' ? 'italic ' : ''}${fontSize}px "${state.fontFamily}", sans-serif`;
  while (fontSize > 36) {
    ctx.font = `${state.fontFamily === 'Playfair Display' ? 'italic ' : ''}${fontSize}px "${state.fontFamily}", sans-serif`;
    const lines = wrapText(ctx, text, maxW);
    const totalH = lines.length * (fontSize * 1.4);
    if (totalH < 700) break;
    fontSize -= 4;
  }

  const lines = wrapText(ctx, text, maxW);
  const lineH = fontSize * 1.4;
  const totalTextH = lines.length * lineH;

  // Pill background
  const padding = { x: 60, y: 48 };
  const pillW = maxW + padding.x * 2;
  const pillH = totalTextH + padding.y * 2 + (state.showAttribution && attribution ? 80 : 0);
  const pillX = cx - pillW / 2;
  const pillY = 540 - pillH / 2;
  const radius = 28;

  if (state.pillStyle !== 'none') {
    const ps = PILL_STYLES.find(p => p.id === state.pillStyle);
    if (ps) {
      ctx.save();
      ctx.beginPath();
      roundRect(ctx, pillX, pillY, pillW, pillH, radius);
      ctx.fillStyle = ps.preview.bg;
      ctx.fill();
      ctx.restore();
    }
  }

  // Quote text
  ctx.fillStyle = state.textColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  // Opening quote mark
  ctx.save();
  ctx.font = `bold ${fontSize * 1.8}px "${state.fontFamily}", sans-serif`;
  ctx.globalAlpha = 0.3;
  ctx.fillText('"', cx - maxW / 2, pillY + padding.y - fontSize * 0.8);
  ctx.restore();

  // Lines
  lines.forEach((line, i) => {
    ctx.font = `${state.fontFamily === 'Playfair Display' ? 'italic ' : ''}${fontSize}px "${state.fontFamily}", sans-serif`;
    const y = pillY + padding.y + i * lineH;
    ctx.fillText(line, cx, y);
  });

  // Attribution
  if (state.showAttribution && attribution) {
    const attrY = pillY + padding.y + totalTextH + 24;
    ctx.font = `500 ${Math.round(fontSize * 0.45)}px "Inter", sans-serif`;
    ctx.globalAlpha = 0.75;
    ctx.fillText(`— ${attribution}`, cx, attrY);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let current = '';

  for (const word of words) {
    const test = current ? `${current} ${word}` : word;
    if (ctx.measureText(test).width > maxWidth && current) {
      lines.push(current);
      current = word;
    } else {
      current = test;
    }
  }
  if (current) lines.push(current);
  return lines;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawLogo() {
  ctx.save();
  ctx.font = '500 36px "Inter", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('GSTW', 540, 1048);
  ctx.restore();
}

function applyFilter(filter) {
  if (filter === 'none') return;
  const imageData = ctx.getImageData(0, 0, 1080, 1080);
  const data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    let r = data[i], g = data[i+1], b = data[i+2];

    if (filter === 'warm') {
      r = Math.min(255, r + 30);
      b = Math.max(0, b - 20);
    } else if (filter === 'cool') {
      b = Math.min(255, b + 30);
      r = Math.max(0, r - 20);
    } else if (filter === 'fade') {
      r = Math.round(r * 0.8 + 40);
      g = Math.round(g * 0.8 + 40);
      b = Math.round(b * 0.8 + 40);
    } else if (filter === 'dramatic') {
      const lum = 0.299 * r + 0.587 * g + 0.114 * b;
      const factor = lum > 128 ? 1.3 : 0.7;
      r = Math.min(255, Math.round(r * factor));
      g = Math.min(255, Math.round(g * factor));
      b = Math.min(255, Math.round(b * factor));
    } else if (filter === 'bw') {
      const gray = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
      r = g = b = gray;
    }

    data[i] = r; data[i+1] = g; data[i+2] = b;
  }

  ctx.putImageData(imageData, 0, 0);

  // Apply brightness/contrast/saturation adjustments via CSS filter on canvas
  // (pixel-level for export quality)
  applyAdjustments(data);
  ctx.putImageData(imageData, 0, 0);
}

function applyAdjustments() {
  if (state.brightness === 0 && state.contrast === 0 && state.saturation === 0) return;

  const imageData = ctx.getImageData(0, 0, 1080, 1080);
  const data = imageData.data;
  const b = state.brightness / 100;
  const c = (state.contrast / 100) + 1;
  const s = (state.saturation / 100) + 1;

  for (let i = 0; i < data.length; i += 4) {
    let r = data[i] / 255;
    let g = data[i+1] / 255;
    let bl2 = data[i+2] / 255;

    // Brightness
    r += b; g += b; bl2 += b;

    // Contrast
    r = (r - 0.5) * c + 0.5;
    g = (g - 0.5) * c + 0.5;
    bl2 = (bl2 - 0.5) * c + 0.5;

    // Saturation
    const gray = 0.299 * r + 0.587 * g + 0.114 * bl2;
    r = gray + (r - gray) * s;
    g = gray + (g - gray) * s;
    bl2 = gray + (bl2 - gray) * s;

    data[i]   = Math.max(0, Math.min(255, Math.round(r * 255)));
    data[i+1] = Math.max(0, Math.min(255, Math.round(g * 255)));
    data[i+2] = Math.max(0, Math.min(255, Math.round(bl2 * 255)));
  }

  ctx.putImageData(imageData, 0, 0);
}

// ── UI Builders ────────────────────────────────────────────────
function buildBgGrid() {
  const grid = document.getElementById('bgGrid');
  grid.innerHTML = '';
  PRESET_BGS.forEach((bg, i) => {
    const div = document.createElement('div');
    div.className = 'bg-thumb' + (i === 0 ? ' active' : '');
    div.innerHTML = `<img src="${bg.url}" loading="lazy" crossorigin="anonymous"/>`;
    div.onclick = () => selectBg(bg.url, div, 'preset');
    grid.appendChild(div);
  });
}

function buildBgColorGrid() {
  const grid = document.getElementById('bgColorGrid');
  grid.innerHTML = '';
  BG_COLORS.forEach(color => {
    const div = document.createElement('div');
    div.className = 'color-swatch';
    div.style.background = color;
    div.onclick = () => selectBgColor(color, div);
    grid.appendChild(div);
  });
}

function buildTextColorGrid() {
  const grid = document.getElementById('textColorGrid');
  grid.innerHTML = '';
  TEXT_COLORS.forEach(color => {
    const div = document.createElement('div');
    div.className = 'color-swatch' + (color === '#FFFFFF' ? ' active' : '');
    div.style.background = color;
    div.style.border = color === '#FAF8F5' || color === '#F5F0E8' || color === '#E8D5A3' ? '1px solid #ccc' : '';
    div.onclick = () => {
      document.querySelectorAll('#textColorGrid .color-swatch').forEach(s => s.classList.remove('active'));
      div.classList.add('active');
      state.textColor = color;
      drawCanvas();
    };
    grid.appendChild(div);
  });
}

function buildFontGrid() {
  const grid = document.getElementById('fontGrid');
  grid.innerHTML = '';
  FONTS.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'font-option' + (i === 0 ? ' active' : '');
    div.style = f.style;
    div.textContent = f.label;
    div.onclick = () => {
      document.querySelectorAll('.font-option').forEach(o => o.classList.remove('active'));
      div.classList.add('active');
      state.fontFamily = f.name;
      drawCanvas();
    };
    grid.appendChild(div);
  });
}

function buildPillOptions() {
  const container = document.getElementById('pillOptions');
  container.innerHTML = '';
  PILL_STYLES.forEach(ps => {
    const div = document.createElement('div');
    div.className = 'pill-option' + (ps.id === 'none' ? ' active' : '');
    const preview = document.createElement('span');
    preview.className = 'pill-preview';
    preview.style.cssText = `background:${ps.preview.bg};color:${ps.preview.color};border:${ps.preview.border || 'none'}`;
    preview.textContent = 'Quote';
    const label = document.createElement('span');
    label.style.fontSize = '13px';
    label.style.color = 'var(--rq-text)';
    label.textContent = ps.label;
    div.appendChild(preview);
    div.appendChild(label);
    div.onclick = () => {
      document.querySelectorAll('.pill-option').forEach(o => o.classList.remove('active'));
      div.classList.add('active');
      state.pillStyle = ps.id;
      drawCanvas();
    };
    container.appendChild(div);
  });
}

function buildFilterGrid() {
  const grid = document.getElementById('filterGrid');
  grid.innerHTML = '';
  FILTERS.forEach(f => {
    const div = document.createElement('div');
    div.className = 'filter-thumb' + (f.id === 'none' ? ' active' : '');
    div.innerHTML = `<div style="width:100%;height:100%;background:#667eea;opacity:0.7"></div><div class="filter-name">${f.label}</div>`;
    div.onclick = () => {
      document.querySelectorAll('.filter-thumb').forEach(t => t.classList.remove('active'));
      div.classList.add('active');
      state.filter = f.id;
      drawCanvas();
    };
    grid.appendChild(div);
  });
}

// ── Interactions ───────────────────────────────────────────────
function switchTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.tool-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
}

function selectBg(url, el, type) {
  document.querySelectorAll('.bg-thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  state.bgType = type;
  state.bgValue = url;
  state.userPhoto = null;
  loadBgImage(url);
}

function selectBgColor(color, el) {
  document.querySelectorAll('#bgColorGrid .color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.bg-thumb').forEach(t => t.classList.remove('active'));
  state.bgType = 'color';
  state.bgValue = color;
  state.bgImage = null;
  state.userPhoto = null;
  drawCanvas();
}

function loadBgImage(url) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    state.bgImage = img;
    drawCanvas();
  };
  img.onerror = () => {
    state.bgImage = null;
    state.bgValue = '#1a1a2e';
    drawCanvas();
  };
  img.src = url;
}

function loadUserPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      state.userPhoto = img;
      state.bgImage = null;
      drawCanvas();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function updateFontSize(val) {
  state.fontSize = parseInt(val);
  document.getElementById('fontSizeVal').textContent = val;
  drawCanvas();
}

function updateOverlayWidth(val) {
  state.overlayWidth = parseInt(val);
  document.getElementById('widthVal').textContent = val + '%';
  drawCanvas();
}

function updateAdjust() {
  state.brightness = parseInt(document.getElementById('brightnessSlider').value);
  state.contrast   = parseInt(document.getElementById('contrastSlider').value);
  state.saturation = parseInt(document.getElementById('saturationSlider').value);
  state.overlayOpacity = parseInt(document.getElementById('overlaySlider').value);
  state.blur       = parseInt(document.getElementById('blurSlider').value);

  document.getElementById('brightnessVal').textContent = state.brightness;
  document.getElementById('contrastVal').textContent   = state.contrast;
  document.getElementById('satVal').textContent        = state.saturation;
  document.getElementById('overlayVal').textContent    = state.overlayOpacity;
  document.getElementById('blurVal').textContent       = state.blur;

  drawCanvas();
}

function resetEditor() {
  state.filter = 'none';
  state.brightness = 0; state.contrast = 0; state.saturation = 0;
  state.overlayOpacity = 35; state.blur = 0;
  state.textColor = '#FFFFFF';
  state.fontFamily = 'Inter';
  state.fontSize = 72;
  state.overlayWidth = 78;
  state.pillStyle = 'none';
  state.showAttribution = true;
  state.showLogo = true;
  state.userPhoto = null;

  document.getElementById('fontSizeSlider').value = 72;
  document.getElementById('fontSizeVal').textContent = 72;
  document.getElementById('widthSlider').value = 78;
  document.getElementById('widthVal').textContent = '78%';
  document.getElementById('brightnessSlider').value = 0;
  document.getElementById('contrastSlider').value = 0;
  document.getElementById('saturationSlider').value = 0;
  document.getElementById('overlaySlider').value = 35;
  document.getElementById('blurSlider').value = 0;
  document.getElementById('brightnessVal').textContent = 0;
  document.getElementById('contrastVal').textContent = 0;
  document.getElementById('satVal').textContent = 0;
  document.getElementById('overlayVal').textContent = 35;
  document.getElementById('blurVal').textContent = 0;
  document.getElementById('attributionToggle').checked = true;
  document.getElementById('logoToggle').checked = true;

  // Reload original bg
  if (state.quote?.background_url) {
    loadBgImage(state.quote.background_url);
  } else {
    loadBgImage(PRESET_BGS[0].url);
  }

  buildTextColorGrid();
  buildFontGrid();
  buildPillOptions();
  document.querySelectorAll('.filter-thumb').forEach((t,i) => {
    t.classList.toggle('active', i === 0);
  });
  drawCanvas();
}

// ── Preview & Share ────────────────────────────────────────────
function goToPreview() {
  try {
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    sessionStorage.setItem('gstw_canvas_image', dataUrl);
    sessionStorage.setItem('gstw_quote', JSON.stringify(state.quote));
    window.location.href = 'preview.html';
  } catch(e) {
    // Canvas tainted by cross-origin image
    alert('Please use a solid color background or your own photo to share. Unsplash backgrounds cannot be exported due to browser security restrictions.');
  }
}

// ── Init ───────────────────────────────────────────────────────
async function init() {
  buildBgGrid();
  buildBgColorGrid();
  buildTextColorGrid();
  buildFontGrid();
  buildPillOptions();
  buildFilterGrid();

  // Load quote from session or URL param
  const stored = sessionStorage.getItem('gstw_quote');
  if (stored) {
    state.quote = JSON.parse(stored);
  } else {
    const params = new URLSearchParams(window.location.search);
    const quoteId = params.get('id');
    if (quoteId) {
      const { data } = await sb.from('quotes').select('*').eq('id', quoteId).single();
      if (data) state.quote = data;
    }
  }

  // Load background — quote's bg_url first, then default preset
  const bgUrl = state.quote?.background_url || PRESET_BGS[0].url;
  loadBgImage(bgUrl);

  // Attribution toggle listener
  document.getElementById('attributionToggle').addEventListener('change', e => {
    state.showAttribution = e.target.checked;
    drawCanvas();
  });

  document.getElementById('logoToggle').addEventListener('change', e => {
    state.showLogo = e.target.checked;
    drawCanvas();
  });
}

init();
</script>
