<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Edit — Go Spread The Word</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Manrope:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Oswald:wght@600&family=Bebas+Neue&family=Merriweather:ital,wght@1,700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED','dark':'#16202A',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    *{box-sizing:border-box}
    body{
      font-family:'Manrope',sans-serif;
      background:#000;
      -webkit-tap-highlight-color:transparent;
      overflow:hidden;
      height:100dvh;
      user-select:none;
      margin:0;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .tactical-gradient{background:linear-gradient(145deg,#152E45,#1E4060)}

    /* Font classes */
    .font-lora{font-family:'Lora',serif!important}
    .font-jakarta{font-family:'Plus Jakarta Sans',sans-serif!important}
    .font-playfair{font-family:'Playfair Display',serif!important}
    .font-oswald{font-family:'Oswald',sans-serif!important;text-transform:uppercase}
    .font-bebas{font-family:'Bebas Neue',sans-serif!important;letter-spacing:0.08em}
    .font-merri{font-family:'Merriweather',serif!important}

    /* Quote overlay */
    #quoteOverlay{cursor:grab;touch-action:none}
    #quoteOverlay:active{cursor:grabbing}
    #quoteOverlay.dragging{border-color:#D4A24C!important}

    /* Tool buttons */
    .tool-btn{transition:all 0.15s ease;-webkit-tap-highlight-color:transparent}
    .tool-btn.active{background:#1E4060!important}
    .tool-btn.active .tool-icon{color:white!important}
    .tool-btn.active .tool-label{color:white!important}

    /* Sub panel */
    #subPanel{transition:transform 0.3s cubic-bezier(0.4,0,0.2,1),opacity 0.2s;transform:translateY(100%);opacity:0}
    #subPanel.open{transform:translateY(0);opacity:1}

    /* Font options */
    .font-opt{transition:all 0.15s ease;cursor:pointer}
    .font-opt.selected{background:#1E4060!important;color:white!important;border-color:#1E4060!important}

    /* Color swatches */
    .color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;transition:transform 0.15s;border:3px solid transparent;flex-shrink:0}
    .color-swatch:active{transform:scale(0.9)}
    .color-swatch.selected{border-color:white;transform:scale(1.15);box-shadow:0 0 0 2px rgba(30,64,96,0.3)}

    /* Range slider */
    input[type="range"]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:#E0DDD6;outline:none}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#1E4060;cursor:pointer;box-shadow:0 2px 8px rgba(30,64,96,0.3)}

    /* Background picker sheet */
    .bg-sheet{transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);transform:translateY(100%)}
    .bg-sheet.open{transform:translateY(0)}
    .bg-option{transition:all 0.2s ease;cursor:pointer;position:relative;overflow:hidden;border:3px solid transparent;border-radius:12px}
    .bg-option:active{transform:scale(0.96)}
    .bg-option.selected{border-color:#1E4060;box-shadow:0 0 0 2px rgba(30,64,96,0.3)}

    /* No scrollbar */
    .no-scrollbar::-webkit-scrollbar{display:none}
    .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}

    @keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite}
  </style>
</head>

<body>

<!-- MOBILE WRAPPER -->
<div class="max-w-[430px] mx-auto relative overflow-hidden" style="height:100dvh">

  <!-- Hidden file input -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="handleImageSelect(this)">
  <input type="file" id="galleryInput" accept="image/*" class="hidden" onchange="handleImageSelect(this)">

  <!-- BACKGROUND IMAGE -->
  <div id="bgCanvas" class="absolute inset-0 z-0 bg-cover bg-center" style="background-image:url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80');background-color:#16202A">
    <div id="bgOverlay" class="absolute inset-0 bg-black/30"></div>
  </div>

  <!-- TOP BAR -->
  <header class="absolute top-0 left-0 right-0 h-14 z-50 flex items-center justify-between px-4 pt-2">
    <div class="flex items-center gap-2">
      <button onclick="goBack()" class="w-10 h-10 flex items-center justify-center bg-black/30 backdrop-blur-md rounded-full active:scale-90 transition-transform">
        <span class="material-symbols-outlined text-white text-[22px]">arrow_back</span>
      </button>
      <button onclick="goHome()" class="w-10 h-10 flex items-center justify-center bg-black/30 backdrop-blur-md rounded-full active:scale-90 transition-transform">
        <span class="material-symbols-outlined text-white text-[22px]">home</span>
      </button>
    </div>
    <div class="bg-black/30 backdrop-blur-md px-4 py-1.5 rounded-full">
      <span class="text-white text-xs font-body font-bold uppercase tracking-wider">Edit Your Word</span>
    </div>
    <button onclick="openBgPicker()" class="bg-black/30 backdrop-blur-md text-white font-body font-bold text-sm px-4 py-2 rounded-full active:scale-95 transition-transform flex items-center gap-1.5">
      <span class="material-symbols-outlined text-[16px]">image</span>
      Background
    </button>
  </header>

  <!-- QUOTE OVERLAY — draggable -->
  <div class="absolute inset-0 z-10 flex items-center justify-center px-6">
    <div id="quoteOverlay" class="w-full max-w-sm border-2 border-dashed border-white/40 rounded-2xl p-6 flex flex-col items-center text-center">
      <span id="quoteMark" class="text-[48px] leading-none text-gold/70 mb-1 drop-shadow-lg" style="font-family:Georgia,serif">"</span>
      <p id="quoteText" class="font-lora font-semibold text-[20px] text-white leading-relaxed" style="opacity:0;transition:opacity 0.3s"></p>
      <p id="quoteRef" class="mt-4 font-body font-bold text-sm text-white/90 tracking-wider" style="opacity:0;transition:opacity 0.3s"></p>
    </div>
  </div>

  <!-- BOTTOM TOOLBAR -->
  <div class="absolute bottom-0 left-0 right-0 bg-card-bg z-50 shadow-[0_-8px_32px_rgba(0,0,0,0.15)]">

    <!-- Sub Panel -->
    <div id="subPanel" class="absolute bottom-full left-0 right-0 bg-card-bg border-t border-border-soft">

      <!-- FONT -->
      <div id="panelFont" class="hidden p-4 pb-2">
        <p class="text-[10px] font-bold uppercase tracking-widest text-text-light mb-3">Choose Font</p>
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
          <button onclick="setFont('font-lora',this)" class="font-opt selected bg-primary text-white text-sm px-4 py-3 rounded-xl whitespace-nowrap border-2 border-primary" style="font-family:'Lora',serif">Lora</button>
          <button onclick="setFont('font-jakarta',this)" class="font-opt bg-surface text-text-dark text-sm font-bold px-4 py-3 rounded-xl whitespace-nowrap border-2 border-border-soft" style="font-family:'Plus Jakarta Sans'">Jakarta</button>
          <button onclick="setFont('font-playfair',this)" class="font-opt bg-surface text-text-dark text-sm font-bold px-4 py-3 rounded-xl whitespace-nowrap border-2 border-border-soft" style="font-family:'Playfair Display',serif">Playfair</button>
          <button onclick="setFont('font-oswald',this)" class="font-opt bg-surface text-text-dark text-sm font-bold px-4 py-3 rounded-xl whitespace-nowrap border-2 border-border-soft" style="font-family:'Oswald'">OSWALD</button>
          <button onclick="setFont('font-bebas',this)" class="font-opt bg-surface text-text-dark text-sm px-4 py-3 rounded-xl whitespace-nowrap border-2 border-border-soft" style="font-family:'Bebas Neue';letter-spacing:0.08em">BEBAS</button>
          <button onclick="setFont('font-merri',this)" class="font-opt bg-surface text-text-dark text-sm font-bold px-4 py-3 rounded-xl whitespace-nowrap border-2 border-border-soft" style="font-family:'Merriweather',serif">Merriweather</button>
        </div>
      </div>

      <!-- SIZE -->
      <div id="panelSize" class="hidden p-4 pb-2">
        <div class="flex items-center justify-between mb-3">
          <p class="text-[10px] font-bold uppercase tracking-widest text-text-light">Text Size</p>
          <span id="sizeLabel" class="text-sm font-bold text-primary">20px</span>
        </div>
        <input type="range" min="14" max="34" value="20" oninput="setSize(this.value)">
        <div class="flex justify-between text-[10px] text-text-light mt-1"><span>Small</span><span>Large</span></div>
      </div>

      <!-- COLOR -->
      <div id="panelColor" class="hidden p-4 pb-2">
        <p class="text-[10px] font-bold uppercase tracking-widest text-text-light mb-3">Text Color</p>
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
          <div class="color-swatch selected" style="background:#FFFFFF;border-color:#1E4060" onclick="setColor('#FFFFFF',this)"></div>
          <div class="color-swatch" style="background:#FDE047" onclick="setColor('#FDE047',this)"></div>
          <div class="color-swatch" style="background:#D4A24C" onclick="setColor('#D4A24C',this)"></div>
          <div class="color-swatch" style="background:#1E4060" onclick="setColor('#1E4060',this)"></div>
          <div class="color-swatch" style="background:#000000" onclick="setColor('#000000',this)"></div>
          <div class="color-swatch" style="background:#F87171" onclick="setColor('#F87171',this)"></div>
          <div class="color-swatch" style="background:#93C5FD" onclick="setColor('#93C5FD',this)"></div>
          <div class="color-swatch" style="background:#86EFAC" onclick="setColor('#86EFAC',this)"></div>
          <div class="color-swatch" style="background:#F9A8D4" onclick="setColor('#F9A8D4',this)"></div>
        </div>
      </div>

      <!-- BLUR -->
      <div id="panelBlur" class="hidden p-4 pb-2">
        <div class="flex items-center justify-between mb-3">
          <p class="text-[10px] font-bold uppercase tracking-widest text-text-light">Background Blur</p>
          <span id="blurLabel" class="text-sm font-bold text-primary">None</span>
        </div>
        <input type="range" min="0" max="20" value="0" oninput="setBlur(this.value)">
        <div class="flex justify-between text-[10px] text-text-light mt-1"><span>None</span><span>Heavy</span></div>
      </div>

      <!-- DARKNESS -->
      <div id="panelDark" class="hidden p-4 pb-2">
        <div class="flex items-center justify-between mb-3">
          <p class="text-[10px] font-bold uppercase tracking-widest text-text-light">Photo Darkness</p>
          <span id="darkLabel" class="text-sm font-bold text-primary">30%</span>
        </div>
        <input type="range" min="0" max="80" value="30" oninput="setDarkness(this.value)">
        <div class="flex justify-between text-[10px] text-text-light mt-1"><span>None</span><span>Dark</span></div>
      </div>
    </div>

    <!-- Tools Row -->
    <div class="flex items-center gap-2 px-4 py-3 overflow-x-auto no-scrollbar border-t border-border-soft">
      <button onclick="togglePanel('Font',this)" class="tool-btn flex-shrink-0 w-[60px] h-14 bg-surface flex flex-col items-center justify-center rounded-2xl gap-0.5">
        <span class="tool-icon material-symbols-outlined text-primary text-[22px]">text_fields</span>
        <span class="tool-label text-[9px] font-bold uppercase tracking-tight text-text-muted">Font</span>
      </button>
      <button onclick="togglePanel('Size',this)" class="tool-btn flex-shrink-0 w-[60px] h-14 bg-surface flex flex-col items-center justify-center rounded-2xl gap-0.5">
        <span class="tool-icon material-symbols-outlined text-primary text-[22px]">format_size</span>
        <span class="tool-label text-[9px] font-bold uppercase tracking-tight text-text-muted">Size</span>
      </button>
      <button onclick="togglePanel('Color',this)" class="tool-btn flex-shrink-0 w-[60px] h-14 bg-surface flex flex-col items-center justify-center rounded-2xl gap-0.5">
        <div id="colorPreview" class="w-6 h-6 rounded-full bg-white border-2 border-primary/30 shadow-sm"></div>
        <span class="tool-label text-[9px] font-bold uppercase tracking-tight text-text-muted">Color</span>
      </button>
      <button onclick="togglePanel('Blur',this)" class="tool-btn flex-shrink-0 w-[60px] h-14 bg-surface flex flex-col items-center justify-center rounded-2xl gap-0.5">
        <span class="tool-icon material-symbols-outlined text-primary text-[22px]">water_drop</span>
        <span class="tool-label text-[9px] font-bold uppercase tracking-tight text-text-muted">Blur</span>
      </button>
      <button onclick="togglePanel('Dark',this)" class="tool-btn flex-shrink-0 w-[60px] h-14 bg-surface flex flex-col items-center justify-center rounded-2xl gap-0.5">
        <span class="tool-icon material-symbols-outlined text-primary text-[22px]">brightness_4</span>
        <span class="tool-label text-[9px] font-bold uppercase tracking-tight text-text-muted">Dark</span>
      </button>
      <button onclick="cycleAlign()" class="tool-btn flex-shrink-0 w-[60px] h-14 bg-surface flex flex-col items-center justify-center rounded-2xl gap-0.5">
        <span id="alignIcon" class="tool-icon material-symbols-outlined text-primary text-[22px]">format_align_center</span>
        <span class="tool-label text-[9px] font-bold uppercase tracking-tight text-text-muted">Align</span>
      </button>
    </div>

    <!-- Next Button -->
    <div class="px-5 pb-5 pt-1" style="padding-bottom:max(20px,env(safe-area-inset-bottom))">
      <button onclick="goNext()" class="w-full py-3.5 tactical-gradient text-white font-headline font-bold text-base rounded-2xl flex items-center justify-center gap-2 shadow-tactical active:scale-[0.98] transition-transform">
        Next — Add Caption
        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
      </button>
    </div>
  </div>

  <!-- BACKGROUND PICKER SHEET -->
  <div id="bgPickerSheet" class="hidden absolute inset-0 bg-dark/50 backdrop-blur-sm z-[80] flex items-end justify-center" onclick="closeBgPicker()">
    <div class="w-full bg-card-bg rounded-t-3xl p-6 pb-10 bg-sheet max-h-[70vh] overflow-y-auto no-scrollbar" onclick="event.stopPropagation()">
      <div class="w-10 h-1 bg-text-light/30 rounded-full mx-auto mb-5"></div>
      <h3 class="font-headline font-bold text-lg text-text-dark text-center mb-5">Choose Background</h3>

      <!-- Camera + Gallery -->
      <div class="flex gap-3 mb-5">
        <button onclick="openCamera()" class="flex-1 flex items-center gap-3 p-4 rounded-2xl bg-surface border border-border-soft active:scale-[0.98] transition-transform">
          <div class="w-10 h-10 rounded-xl tactical-gradient flex items-center justify-center text-white flex-shrink-0">
            <span class="material-symbols-outlined text-[20px] filled">photo_camera</span>
          </div>
          <div class="text-left">
            <span class="font-headline font-bold text-sm text-text-dark block">Camera</span>
            <span class="font-body text-[10px] text-text-muted">Take a photo</span>
          </div>
        </button>
        <button onclick="openGallery()" class="flex-1 flex items-center gap-3 p-4 rounded-2xl bg-surface border border-border-soft active:scale-[0.98] transition-transform">
          <div class="w-10 h-10 rounded-xl bg-gold flex items-center justify-center text-white flex-shrink-0">
            <span class="material-symbols-outlined text-[20px] filled">image</span>
          </div>
          <div class="text-left">
            <span class="font-headline font-bold text-sm text-text-dark block">Gallery</span>
            <span class="font-body text-[10px] text-text-muted">Pick a photo</span>
          </div>
        </button>
      </div>

      <!-- Preset Images -->
      <p class="text-[10px] font-bold uppercase tracking-widest text-text-light mb-3">Preset Images</p>
      <div class="grid grid-cols-4 gap-2 mb-5">
        <div class="bg-option selected aspect-square rounded-xl overflow-hidden" onclick="selectPreset(this,'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-option aspect-square rounded-xl overflow-hidden" onclick="selectPreset(this,'https://images.unsplash.com/photo-1477346611705-65d1883cee1e?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1477346611705-65d1883cee1e?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-option aspect-square rounded-xl overflow-hidden" onclick="selectPreset(this,'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-option aspect-square rounded-xl overflow-hidden" onclick="selectPreset(this,'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-option aspect-square rounded-xl overflow-hidden" onclick="selectPreset(this,'https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-option aspect-square rounded-xl overflow-hidden" onclick="selectPreset(this,'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-option aspect-square rounded-xl overflow-hidden" onclick="selectPreset(this,'https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
        <div class="bg-option aspect-square rounded-xl overflow-hidden" onclick="selectPreset(this,'https://images.unsplash.com/photo-1490730141103-6cac27aaab94?w=800&q=80')">
          <img src="https://images.unsplash.com/photo-1490730141103-6cac27aaab94?w=200&q=60" class="w-full h-full object-cover" alt="">
        </div>
      </div>

      <!-- Solid Colors -->
      <p class="text-[10px] font-bold uppercase tracking-widest text-text-light mb-3">Solid Colors</p>
      <div class="grid grid-cols-8 gap-2 mb-5">
        <div class="bg-option w-full aspect-square rounded-lg" style="background:#16202A" onclick="selectSolid(this,'#16202A')"></div>
        <div class="bg-option w-full aspect-square rounded-lg" style="background:#1E4060" onclick="selectSolid(this,'#1E4060')"></div>
        <div class="bg-option w-full aspect-square rounded-lg" style="background:#0F1E2E" onclick="selectSolid(this,'#0F1E2E')"></div>
        <div class="bg-option w-full aspect-square rounded-lg" style="background:#D4A24C" onclick="selectSolid(this,'#D4A24C')"></div>
        <div class="bg-option w-full aspect-square rounded-lg" style="background:#E25B4D" onclick="selectSolid(this,'#E25B4D')"></div>
        <div class="bg-option w-full aspect-square rounded-lg" style="background:#1B5E20" onclick="selectSolid(this,'#1B5E20')"></div>
        <div class="bg-option w-full aspect-square rounded-lg" style="background:#000000" onclick="selectSolid(this,'#000000')"></div>
        <div class="bg-option w-full aspect-square rounded-lg" style="background:#FFFFFF;border:1px solid #ddd" onclick="selectSolid(this,'#FFFFFF')"></div>
      </div>

      <!-- Gradients -->
      <p class="text-[10px] font-bold uppercase tracking-widest text-text-light mb-3">Gradients</p>
      <div class="grid grid-cols-4 gap-2 mb-4">
        <div class="bg-option w-full aspect-square rounded-lg" style="background:linear-gradient(145deg,#152E45,#1E4060)" onclick="selectGradient(this,'linear-gradient(145deg,#152E45,#1E4060)')"></div>
        <div class="bg-option w-full aspect-square rounded-lg" style="background:linear-gradient(145deg,#D4A24C,#8B6914)" onclick="selectGradient(this,'linear-gradient(145deg,#D4A24C,#8B6914)')"></div>
        <div class="bg-option w-full aspect-square rounded-lg" style="background:linear-gradient(145deg,#E25B4D,#C84A3E)" onclick="selectGradient(this,'linear-gradient(145deg,#E25B4D,#C84A3E)')"></div>
        <div class="bg-option w-full aspect-square rounded-lg" style="background:linear-gradient(135deg,#000000,#434343)" onclick="selectGradient(this,'linear-gradient(135deg,#000000,#434343)')"></div>
      </div>

      <button onclick="closeBgPicker()" class="w-full py-3 text-text-muted font-bold text-sm text-center active:scale-95 transition-transform">
        Close
      </button>
    </div>
  </div>

</div>
<script>
  // ════════════════════════════════════════════
  // SUPABASE
  // ════════════════════════════════════════════
  var supabaseClient = supabase.createClient(

    var rect = quoteOverlay.getBoundingClientRect()
    var parentRect = quoteOverlay.parentElement.getBoundingClientRect()
    quoteOverlay.style.transform = 'none'
    quoteOverlay.style.position = 'absolute'
    quoteOverlay.style.left = (rect.left - parentRect.left) + 'px'
    quoteOverlay.style.top = (rect.top - parentRect.top) + 'px'
    dragStartX = cx; dragStartY = cy
    overlayStartX = rect.left - parentRect.left
    overlayStartY = rect.top - parentRect.top
    if (e.cancelable) e.preventDefault()
  }

  function onDragMove(e) {
    if (!dragActive || !quoteOverlay) return
    var cx = e.touches ? e.touches[0].clientX : e.clientX
    var cy = e.touches ? e.touches[0].clientY : e.clientY
    var parentRect = quoteOverlay.parentElement.getBoundingClientRect()
    var maxX = parentRect.width - quoteOverlay.offsetWidth
    var maxY = parentRect.height - quoteOverlay.offsetHeight
    var newX = Math.max(0, Math.min(overlayStartX + (cx - dragStartX), maxX))
    var newY = Math.max(0, Math.min(overlayStartY + (cy - dragStartY), maxY))
    quoteOverlay.style.left = newX + 'px'
    quoteOverlay.style.top = newY + 'px'
    if (e.cancelable) e.preventDefault()
  }

 function goNext() {

  sessionStorage.setItem('gstw_quote_id',       window.currentQuoteId || '')
  sessionStorage.setItem('gstw_bg_type',        selectedBgType)
  sessionStorage.setItem('gstw_bg_value',       selectedBgValue)

  // Save position as percentages
  if (quoteOverlay && quoteOverlay.parentElement) {
    var parentRect = quoteOverlay.parentElement.getBoundingClientRect()
    var overlayRect = quoteOverlay.getBoundingClientRect()
    var xPercent = ((overlayRect.left - parentRect.left) / parentRect.width) * 100
    var yPercent = ((overlayRect.top - parentRect.top) / parentRect.height) * 100
    sessionStorage.setItem('gstw_overlay_x', xPercent)
    sessionStorage.setItem('gstw_overlay_y', yPercent)
  }

  // Show loading state
  var btn = document.querySelector('[onclick="goNext()"]')
  if (btn) {
    btn.innerHTML = '<span class="material-symbols-outlined text-[20px] spin">progress_activity</span> Generating...'
    btn.style.pointerEvents = 'none'
  }

  // Generate image directly with Canvas API (no external library needed)
  setTimeout(function() {
    generateImage(qt, qr, bg, overlay)

 // ════════════════════════════════════════════
// GENERATE IMAGE — Canvas API (reliable)
// ════════════════════════════════════════════
function generateImage(qt, qr, bg, overlay) {
  var canvas = document.createElement('canvas')
  canvas.width = 1080
  canvas.height = 1080
  var ctx = canvas.getContext('2d')

  // Fill with dark background as safety net
  ctx.fillStyle = '#16202A'
  ctx.fillRect(0, 0, 1080, 1080)

  // Get all editor state
  var bgType    = sessionStorage.getItem('gstw_bg_type') || 'image'
  var bgValue   = sessionStorage.getItem('gstw_bg_value') || selectedBgValue
  var xPct      = parseFloat(sessionStorage.getItem('gstw_overlay_x')) || 15
  var yPct      = parseFloat(sessionStorage.getItem('gstw_overlay_y')) || 30
  var align     = qt ? (qt.style.textAlign || 'center') : 'center'
  var textColor = qt ? (qt.style.color || '#FFFFFF') : '#FFFFFF'
  var fontSize  = parseInt(qt ? (qt.style.fontSize || '20') : '20')
  var fontFam   = qt ? (qt.style.fontFamily || "'Lora', serif") : "'Lora', serif"
  var textTransform = qt ? (qt.style.textTransform || 'none') : 'none'
  var darkness  = overlay ? overlay.style.background : 'rgba(0,0,0,0.3)'
  var blurAmount = 0
  if (bg && bg.style.filter) {
    var match = bg.style.filter.match(/blur\((\d+)/)
    if (match) blurAmount = parseInt(match[1])
  }

  // Helper — draw text with word wrap and drop shadow
  function drawText(ctx, text, x, y, maxWidth, lineHeight, align) {
    if (textTransform === 'uppercase') text = text.toUpperCase()
    var words = text.split(' ')
    var line = ''
    var lines = []

    for (var n = 0; n < words.length; n++) {
      var testLine = line + words[n] + ' '
      var metrics = ctx.measureText(testLine)
      if (metrics.width > maxWidth && n > 0) {
        lines.push(line.trim())
        line = words[n] + ' '
      } else {
        line = testLine
      }
    }
    lines.push(line.trim())

    // Apply subtle drop shadow for readability
    ctx.shadowColor = 'rgba(0, 0, 0, 0.6)'
    ctx.shadowBlur = 8
    ctx.shadowOffsetX = 0
    ctx.shadowOffsetY = 2

    var startY = y
    for (var i = 0; i < lines.length; i++) {
      var lineX = x
      if (align === 'center') lineX = x + maxWidth / 2
      if (align === 'right')  lineX = x + maxWidth
      ctx.fillText(lines[i], lineX, startY + (i * lineHeight))
    }

    // Reset shadow
    ctx.shadowColor = 'transparent'
    ctx.shadowBlur = 0
    ctx.shadowOffsetX = 0
    ctx.shadowOffsetY = 0

    return startY + (lines.length * lineHeight)
  }

  // Helper — draw everything after background is ready
  function drawContent() {
    // Darkness overlay
    ctx.fillStyle = darkness
    ctx.fillRect(0, 0, 1080, 1080)

    // Position text — convert percentages to pixels
    // Add safety padding so text doesn't go off edges
    var padding = 60
    var textAreaX = Math.max(padding, Math.min(xPct * 10.8, 1080 - padding - 200))
    var textAreaY = Math.max(padding, Math.min(yPct * 10.8, 1080 - padding - 300))
    var textMaxWidth = 1080 - (textAreaX * 2)
    if (textMaxWidth < 600) textMaxWidth = 900 - (padding * 2)

    // Text alignment
    if (align === 'center') {
      ctx.textAlign = 'center'
      textAreaX = 540
      textMaxWidth = 900
    } else if (align === 'right') {
      ctx.textAlign = 'right'
    } else {
      ctx.textAlign = 'left'
    }

    // Draw decorative quote mark
    ctx.font = '600 140px Georgia, serif'
    ctx.fillStyle = 'rgba(212, 162, 76, 0.5)'
    ctx.textBaseline = 'top'
    if (align === 'center') {
      ctx.fillText('"', 540, textAreaY - 60)
    } else if (align === 'right') {
      ctx.fillText('"', textAreaX, textAreaY - 60)
    } else {
      ctx.fillText('"', textAreaX, textAreaY - 60)
    }

    // Draw quote text
    var scaledFontSize = fontSize * 3.2
    ctx.font = '600 ' + scaledFontSize + 'px ' + fontFam
    ctx.fillStyle = textColor
    ctx.textBaseline = 'top'

    var textEndY = drawText(
      ctx,
      qt ? qt.textContent : '',
      align === 'center' ? 90 : textAreaX,
      textAreaY + 80,
      align === 'center' ? 900 : textMaxWidth,
      scaledFontSize * 1.35,
      align
    )

    // Draw reference
    var refFontSize = Math.round(fontSize * 1.6)
    ctx.font = 'bold ' + refFontSize + 'px "Plus Jakarta Sans", sans-serif'
    ctx.fillStyle = textColor
    ctx.globalAlpha = 0.9

    // Subtle shadow on reference too
    ctx.shadowColor = 'rgba(0, 0, 0, 0.5)'
    ctx.shadowBlur = 6
    ctx.shadowOffsetY = 2

    var refText = qr ? qr.textContent : ''
    var refY = textEndY + 30
    var refX = align === 'center' ? 540 : textAreaX

    ctx.fillText(refText, refX, refY)

    // Reset
    ctx.globalAlpha = 1
    ctx.shadowColor = 'transparent'
    ctx.shadowBlur = 0
    ctx.shadowOffsetY = 0

    // Export
    try {
      var dataUrl = canvas.toDataURL('image/png')
      sessionStorage.setItem('gstw_final_image', dataUrl)
    } catch(e) {
      console.error('Export failed:', e)
      sessionStorage.removeItem('gstw_final_image')
    }

    window.location.href = 'preview.html'
  }

  // Load background based on type
  if (bgType === 'image') {
    var img = new Image()
    img.crossOrigin = 'anonymous'

    img.onload = function() {
      // Draw image covering the canvas (like object-fit: cover)
      var iw = img.width
      var ih = img.height
      var scale = Math.max(1080 / iw, 1080 / ih)
      var sw = iw * scale
      var sh = ih * scale
      var sx = (1080 - sw) / 2
      var sy = (1080 - sh) / 2

      // Apply blur if needed
      if (blurAmount > 0) {
        ctx.filter = 'blur(' + (blurAmount * 3) + 'px)'
      }
      ctx.drawImage(img, sx, sy, sw, sh)
      ctx.filter = 'none'

      drawContent()
    }

    img.onerror = function() {
      console.error('Image failed to load, using fallback')
      // Fill with primary color as fallback
      ctx.fillStyle = '#1E4060'
      ctx.fillRect(0, 0, 1080, 1080)
      drawContent()
    }

    img.src = bgValue

  } else if (bgType === 'color') {
    ctx.fillStyle = bgValue
    ctx.fillRect(0, 0, 1080, 1080)
    drawContent()

  } else if (bgType === 'gradient') {
    // Parse the gradient
    var gradient = ctx.createLinearGradient(0, 0, 1080, 1080)
    // Simple parse — takes the two hex colors from linear-gradient(...,#hex,#hex)
    var colorMatches = bgValue.match(/#[0-9A-Fa-f]{6}/g)
    if (colorMatches && colorMatches.length >= 2) {
      gradient.addColorStop(0, colorMatches[0])
      gradient.addColorStop(1, colorMatches[1])
    } else {
      gradient.addColorStop(0, '#152E45')
      gradient.addColorStop(1, '#1E4060')
    }
    ctx.fillStyle = gradient
    ctx.fillRect(0, 0, 1080, 1080)
    drawContent()

  } else {
    // Unknown — default background
    ctx.fillStyle = '#16202A'
    ctx.fillRect(0, 0, 1080, 1080)
    drawContent()
  }
}

  // ════════════════════════════════════════════
  // TOAST
  // ════════════════════════════════════════════
  var toastTimer
  function showToast(msg) {
    var existing = document.getElementById('editorToast')
    if (existing) existing.remove()
    var t = document.createElement('div')
    t.id = 'editorToast'
    t.className = 'fixed top-20 left-1/2 z-[200] bg-dark/90 backdrop-blur-md text-white text-xs font-bold px-5 py-3 rounded-full shadow-lg whitespace-nowrap flex items-center gap-2'
    t.style.transform = 'translateX(-50%)'
    t.innerHTML = '<span class="material-symbols-outlined text-gold text-[14px]" style="font-variation-settings:\'FILL\' 1">check_circle</span> ' + msg
    document.body.appendChild(t)
    clearTimeout(toastTimer)
    toastTimer = setTimeout(function() { if (t.parentNode) t.remove() }, 2200)
  }
</script>

</body>
</html>
