<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Edit — Go Spread The Word</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Oswald:wght@600&family=Lora:ital,wght@1,600&family=Bebas+Neue&family=Merriweather:ital,wght@1,700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary':'#1E4060','primary-dim':'#152E45','primary-light':'#2B5780',
            'action':'#E25B4D','action-dim':'#C84A3E',
            'gold':'#D4A24C','gold-dim':'#B88A3D',
            'cream':'#F7F4ED','dark':'#16202A',
            'text-dark':'#1A1A1A','text-muted':'#5C6B7A','text-light':'#8E9AA8',
            'border-soft':'rgba(92,107,122,0.15)',
            'card-bg':'#FFFFFF','surface':'#F0EDE6',
          },
          fontFamily:{
            'headline':['Plus Jakarta Sans','sans-serif'],
            'body':['Manrope','sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    *{box-sizing:border-box}
    body{
      font-family:'Manrope',sans-serif;
      background:#000;
      -webkit-tap-highlight-color:transparent;
      overflow:hidden;
      height:100dvh;
      user-select:none;
      margin:0;
    }
    .font-headline{font-family:'Plus Jakarta Sans',sans-serif}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
    .filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    .tactical-gradient{background:linear-gradient(145deg,#152E45,#1E4060)}
    .action-gradient{background:linear-gradient(145deg,#E25B4D,#C84A3E)}
    .quote-shadow{text-shadow:0 2px 12px rgba(0,0,0,0.6),0 1px 3px rgba(0,0,0,0.4)}
    .no-scrollbar::-webkit-scrollbar{display:none}
    .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}

    .font-jakarta{font-family:'Plus Jakarta Sans',sans-serif!important}
    .font-playfair{font-family:'Playfair Display',serif!important}
    .font-oswald{font-family:'Oswald',sans-serif!important;text-transform:uppercase}
    .font-lora{font-family:'Lora',serif!important;font-style:italic}
    .font-bebas{font-family:'Bebas Neue',sans-serif!important;letter-spacing:0.08em}
    .font-merri{font-family:'Merriweather',serif!important}

    #quoteOverlay{cursor:grab;touch-action:none}
    #quoteOverlay:active{cursor:grabbing}
    #quoteOverlay.dragging{border-color:#D4A24C!important}

    .tool-btn{transition:all 0.15s ease;-webkit-tap-highlight-color:transparent}
    .tool-btn.active{background:#1E4060!important}
    .tool-btn.active .tool-icon{color:white!important}
    .tool-btn.active .tool-label{color:white!important}

    #subPanel{transition:transform 0.3s cubic-bezier(0.4,0,0.2,1),opacity 0.2s;transform:translateY(100%);opacity:0}
    #subPanel.open{transform:translateY(0);opacity:1}

    .font-opt{transition:all 0.15s ease;cursor:pointer}
    .font-opt.selected{background:#1E4060!important;color:white!important;border-color:#1E4060!important}

    .color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;transition:transform 0.15s;border:3px solid transparent;flex-shrink:0}
    .color-swatch:active{transform:scale(0.9)}
    .color-swatch.selected{border-color:white;transform:scale(1.15);box-shadow:0 0 0 2px rgba(30,64,96,0.3)}

    input[type="range"]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:#E0DDD6;outline:none}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#1E4060;cursor:pointer;box-shadow:0 2px 8px rgba(30,64,96,0.3)}

    .sheet-overlay{transition:opacity 0.3s}
    .sheet-panel{transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);transform:translateY(100%)}
    .sheet-panel.open{transform:translateY(0)}

    @keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite}
  </style>
</head>

<body>

<!-- MOBILE WRAPPER -->
<div class="max-w-[430px] mx-auto relative overflow-hidden" style="height:100dvh">

  <!-- Hidden file inputs -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="handleImageSelect(this)">
  <input type="file" id="selfieInput" accept="image/*" capture="user" class="hidden" onchange="handleImageSelect(this)">
  <input type="file" id="galleryInput" accept="image/*" class="hidden" onchange="handleImageSelect(this)">

  <!-- BACKGROUND IMAGE -->
  <div id="bgCanvas" class="absolute inset-0 z-0 bg-cover bg-center" style="background-image:url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80');background-color:#16202A">
    <div id="bgOverlay" class="absolute inset-0 bg-black/30"></div>
  </div>

  <!-- TOP BAR -->
  <header class="absolute top-0 left-0 right-0 h-14 z-50 flex items-center justify-between px-4 pt-2">
    <div class="flex items-center gap-2">
      <button onclick="goBack()" class="w-10 h-10 flex items-center justify-center bg-black/30 backdrop-blur-md rounded-full active:scale-90 transition-transform">
        <span class="material-symbols-outlined text-white text-[22px]">arrow_back</span>
      </button>
      <button onclick="goHome()" class="w-10 h-10 flex items-center justify-center bg-black/30 backdrop-blur-md rounded-full active:scale-90 transition-transform" title="Back to Home">
        <span class="material-symbols-outlined text-white text-[22px]">home</span>
      </button>
    </div>
    <div class="bg-black/30 backdrop-blur-md px-4 py-1.5 rounded-full">
      <span class="text-white text-xs font-body font-bold uppercase tracking-wider">Edit Your Word</span>
    </div>
    <button onclick="openPhotoPicker()" class="bg-black/30 backdrop-blur-md text-white font-body font-bold text-sm px-4 py-2 rounded-full active:scale-95 transition-transform">
      Change
    </button>
  </header>

  <!-- QUOTE OVERLAY -->
  <div class="absolute inset-0 z-10 flex items-center justify-center px-6">
    <div id="quoteOverlay" class="w-full max-w-sm border-2 border-dashed border-white/40 rounded-2xl p-6 flex flex-col items-center text-center">
      <span id="quoteMark" class="text-[48px] leading-none text-gold/70 mb-1 drop-shadow-lg" style="font-family:Georgia,serif">"</span>
      <p id="quoteText" class="font-jakarta font-bold text-[20px] text-white leading-relaxed quote-shadow">
  Loading...
</p>
<p id="quoteRef" class="mt-4 font-body font-bold text-sm text-white/90 quote-shadow tracking-wider">
  — ...
</p>
    </div>
  </div>

  <!-- BOTTOM TOOLBAR -->
  <div class="absolute bottom-0 left-0 right-0 bg-card-bg z-50 shadow-[0_-8px_32px_rgba(0,0,0,0.15)]">

    <!-- Sub Panel -->
    <div id="subPanel" class="absolute bottom-full left-0 right-0 bg-card-bg border-t border-border-soft">
      <!-- FONT -->
      <div id="panelFont" class="hidden p-4 pb-2">
        <p class="text-[10px] font-bold uppercase tracking-widest text-text-light mb-3">Choose Font</p>
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
          <button onclick="setFont('font-jakarta',this)" class="font-opt selected bg-primary text-white text-sm font-bold px-4 py-3 rounded-xl whitespace-nowrap border-2 border-primary" style="font-family:'Plus Jakarta Sans'">Jakarta</button>
          <button onclick="setFont('font-playfair',this)" class="font-opt bg-surface text-text-dark text-sm font-bold px-4 py-3 rounded-xl whitespace-nowrap border-2 border-border-soft" style="font-family:'Playfair Display',serif">Playfair</button>
          <button onclick="setFont('font-oswald',this)" class="font-opt bg-surface text-text-dark text-sm font-bold px-4 py-3 rounded-xl whitespace-nowrap border-2 border-border-soft" style="font-family:'Oswald'">OSWALD</button>
          <button onclick="setFont('font-lora',this)" class="font-opt bg-surface text-text-dark text-sm px-4 py-3 rounded-xl whitespace-nowrap border-2 border-border-soft" style="font-family:'Lora',serif;font-style:italic">Lora</button>
          <button onclick="setFont('font-bebas',this)" class="font-opt bg-surface text-text-dark text-sm px-4 py-3 rounded-xl whitespace-nowrap border-2 border-border-soft" style="font-family:'Bebas Neue';letter-spacing:0.08em">BEBAS</button>
          <button onclick="setFont('font-merri',this)" class="font-opt bg-surface text-text-dark text-sm font-bold px-4 py-3 rounded-xl whitespace-nowrap border-2 border-border-soft" style="font-family:'Merriweather',serif">Merriweather</button>
        </div>
      </div>
      <!-- SIZE -->
      <div id="panelSize" class="hidden p-4 pb-2">
        <div class="flex items-center justify-between mb-3"><p class="text-[10px] font-bold uppercase tracking-widest text-text-light">Text Size</p><span id="sizeLabel" class="text-sm font-bold text-primary">20px</span></div>
        <input type="range" min="14" max="34" value="20" oninput="setSize(this.value)">
        <div class="flex justify-between text-[10px] text-text-light mt-1"><span>Small</span><span>Large</span></div>
      </div>
      <!-- COLOR -->
      <div id="panelColor" class="hidden p-4 pb-2">
        <p class="text-[10px] font-bold uppercase tracking-widest text-text-light mb-3">Text Color</p>
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
          <div class="color-swatch selected" style="background:#FFFFFF;border-color:#1E4060" onclick="setColor('#FFFFFF',this)"></div>
          <div class="color-swatch" style="background:#FDE047" onclick="setColor('#FDE047',this)"></div>
          <div class="color-swatch" style="background:#D4A24C" onclick="setColor('#D4A24C',this)"></div>
          <div class="color-swatch" style="background:#1E4060" onclick="setColor('#1E4060',this)"></div>
          <div class="color-swatch" style="background:#000000" onclick="setColor('#000000',this)"></div>
          <div class="color-swatch" style="background:#F87171" onclick="setColor('#F87171',this)"></div>
          <div class="color-swatch" style="background:#93C5FD" onclick="setColor('#93C5FD',this)"></div>
          <div class="color-swatch" style="background:#86EFAC" onclick="setColor('#86EFAC',this)"></div>
          <div class="color-swatch" style="background:#F9A8D4" onclick="setColor('#F9A8D4',this)"></div>
        </div>
      </div>
      <!-- BLUR -->
      <div id="panelBlur" class="hidden p-4 pb-2">
        <div class="flex items-center justify-between mb-3"><p class="text-[10px] font-bold uppercase tracking-widest text-text-light">Background Blur</p><span id="blurLabel" class="text-sm font-bold text-primary">None</span></div>
        <input type="range" min="0" max="20" value="0" oninput="setBlur(this.value)">
        <div class="flex justify-between text-[10px] text-text-light mt-1"><span>None</span><span>Heavy</span></div>
      </div>
      <!-- DARKNESS -->
      <div id="panelDark" class="hidden p-4 pb-2">
        <div class="flex items-center justify-between mb-3"><p class="text-[10px] font-bold uppercase tracking-widest text-text-light">Photo Darkness</p><span id="darkLabel" class="text-sm font-bold text-primary">30%</span></div>
        <input type="range" min="0" max="80" value="30" oninput="setDarkness(this.value)">
        <div class="flex justify-between text-[10px] text-text-light mt-1"><span>None</span><span>Dark</span></div>
      </div>
    </div>

    <!-- Tools Row -->
    <div class="flex items-center gap-2 px-4 py-3 overflow-x-auto no-scrollbar border-t border-border-soft">
      <button onclick="togglePanel('Font',this)" class="tool-btn flex-shrink-0 w-[60px] h-14 bg-surface flex flex-col items-center justify-center rounded-2xl gap-0.5">
        <span class="tool-icon material-symbols-outlined text-primary text-[22px]">text_fields</span>
        <span class="tool-label text-[9px] font-bold uppercase tracking-tight text-text-muted">Font</span>
      </button>
      <button onclick="togglePanel('Size',this)" class="tool-btn flex-shrink-0 w-[60px] h-14 bg-surface flex flex-col items-center justify-center rounded-2xl gap-0.5">
        <span class="tool-icon material-symbols-outlined text-primary text-[22px]">format_size</span>
        <span class="tool-label text-[9px] font-bold uppercase tracking-tight text-text-muted">Size</span>
      </button>
      <button onclick="togglePanel('Color',this)" class="tool-btn flex-shrink-0 w-[60px] h-14 bg-surface flex flex-col items-center justify-center rounded-2xl gap-0.5">
        <div id="colorPreview" class="w-6 h-6 rounded-full bg-white border-2 border-primary/30 shadow-sm"></div>
        <span class="tool-label text-[9px] font-bold uppercase tracking-tight text-text-muted">Color</span>
      </button>
      <button onclick="togglePanel('Blur',this)" class="tool-btn flex-shrink-0 w-[60px] h-14 bg-surface flex flex-col items-center justify-center rounded-2xl gap-0.5">
        <span class="tool-icon material-symbols-outlined text-primary text-[22px]">water_drop</span>
        <span class="tool-label text-[9px] font-bold uppercase tracking-tight text-text-muted">Blur</span>
      </button>
      <button onclick="togglePanel('Dark',this)" class="tool-btn flex-shrink-0 w-[60px] h-14 bg-surface flex flex-col items-center justify-center rounded-2xl gap-0.5">
        <span class="tool-icon material-symbols-outlined text-primary text-[22px]">brightness_4</span>
        <span class="tool-label text-[9px] font-bold uppercase tracking-tight text-text-muted">Dark</span>
      </button>
      <button onclick="cycleAlign()" class="tool-btn flex-shrink-0 w-[60px] h-14 bg-surface flex flex-col items-center justify-center rounded-2xl gap-0.5">
        <span id="alignIcon" class="tool-icon material-symbols-outlined text-primary text-[22px]">format_align_center</span>
        <span class="tool-label text-[9px] font-bold uppercase tracking-tight text-text-muted">Align</span>
      </button>
    </div>

    <!-- Next Button -->
    <div class="px-5 pb-5 pt-1" style="padding-bottom:max(20px,env(safe-area-inset-bottom))">
      <button onclick="goNext()" class="w-full py-3.5 tactical-gradient text-white font-headline font-bold text-base rounded-2xl flex items-center justify-center gap-2 shadow-tactical active:scale-[0.98] transition-transform">
        Next — Add Hashtags
        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
      </button>
    </div>
  </div>

  <!-- PHOTO PICKER SHEET -->
  <div id="photoPickerSheet" class="hidden absolute inset-0 bg-dark/50 backdrop-blur-sm z-[80] flex items-end justify-center sheet-overlay">
    <div class="w-full bg-card-bg rounded-t-3xl p-6 pb-10 sheet-panel" onclick="event.stopPropagation()">
      <div class="w-10 h-1 bg-text-light/30 rounded-full mx-auto mb-5"></div>
      <h3 class="font-headline font-bold text-lg text-text-dark text-center mb-5">Change Photo</h3>
      <div class="space-y-2.5">
        <button onclick="openSelfie()" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-surface border border-border-soft active:scale-[0.98] transition-transform">
          <div class="w-11 h-11 rounded-xl tactical-gradient flex items-center justify-center text-white flex-shrink-0"><span class="material-symbols-outlined text-[20px] filled">face</span></div>
          <div class="text-left flex-grow"><span class="font-headline font-bold text-sm text-text-dark block">Take a Selfie</span><span class="font-body text-[11px] text-text-muted">Front camera</span></div>
          <span class="material-symbols-outlined text-text-light text-[18px]">chevron_right</span>
        </button>
        <button onclick="openCamera()" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-surface border border-border-soft active:scale-[0.98] transition-transform">
          <div class="w-11 h-11 rounded-xl bg-gold flex items-center justify-center text-white flex-shrink-0"><span class="material-symbols-outlined text-[20px] filled">photo_camera</span></div>
          <div class="text-left flex-grow"><span class="font-headline font-bold text-sm text-text-dark block">Take a Photo</span><span class="font-body text-[11px] text-text-muted">Rear camera</span></div>
          <span class="material-symbols-outlined text-text-light text-[18px]">chevron_right</span>
        </button>
        <button onclick="openGallery()" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-surface border border-border-soft active:scale-[0.98] transition-transform">
          <div class="w-11 h-11 rounded-xl bg-text-muted flex items-center justify-center text-white flex-shrink-0"><span class="material-symbols-outlined text-[20px] filled">image</span></div>
          <div class="text-left flex-grow"><span class="font-headline font-bold text-sm text-text-dark block">Choose from Gallery</span><span class="font-body text-[11px] text-text-muted">Pick from device</span></div>
          <span class="material-symbols-outlined text-text-light text-[18px]">chevron_right</span>
        </button>
      </div>
      <div id="desktopWarning" class="hidden mt-4 bg-gold/10 border border-gold/30 rounded-xl p-3 flex items-start gap-3">
        <span class="material-symbols-outlined text-gold-dim text-[18px] flex-shrink-0 mt-0.5">warning</span>
        <p class="text-[11px] text-text-muted font-body leading-relaxed"><span class="font-bold text-gold-dim">Desktop detected.</span> Camera works best on mobile. Use gallery instead.</p>
      </div>
      <button onclick="closePhotoPicker()" class="w-full mt-4 py-3 text-text-muted font-bold text-sm text-center active:scale-95 transition-transform">Cancel</button>
    </div>
  </div>

</div>

<script>
  // ---- SUPABASE ----
  const { createClient } = supabase
  const db = createClient('https://nhymadutuhpjgkiurify.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeW1hZHV0dWhwamdraXVyaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI5NzgsImV4cCI6MjA5NTU2ODk3OH0.kC5Ytuoi8Sy97ZTSZ8lEWeH1rngcbeHSxobOMIQahkM')

  // ---- ELEMENTS (set after DOM ready) ----
  let quoteText, quoteRef, quoteOverlay, bgCanvas, bgOverlay, subPanel
  let currentPanel = null
  let currentBtn = null

  const fontMap = {
    'font-jakarta': "'Plus Jakarta Sans', sans-serif",
    'font-playfair': "'Playfair Display', serif",
    'font-oswald': "'Oswald', sans-serif",
    'font-lora': "'Lora', serif",
    'font-bebas': "'Bebas Neue', sans-serif",
    'font-merri': "'Merriweather', serif"
  }
  const fontClasses = Object.keys(fontMap)

  // ---- WAIT FOR DOM THEN INIT ----
  window.addEventListener('DOMContentLoaded', function() {
    quoteText = document.getElementById('quoteText')
    quoteRef = document.getElementById('quoteRef')
    quoteOverlay = document.getElementById('quoteOverlay')
    bgCanvas = document.getElementById('bgCanvas')
    bgOverlay = document.getElementById('bgOverlay')
    subPanel = document.getElementById('subPanel')

    // Verify elements exist
    console.log('Elements found:', {
      quoteText: !!quoteText,
      quoteRef: !!quoteRef,
      quoteOverlay: !!quoteOverlay,
      bgCanvas: !!bgCanvas,
      bgOverlay: !!bgOverlay,
      subPanel: !!subPanel
    })

    // Setup drag
    if (quoteOverlay) {
      quoteOverlay.addEventListener('mousedown', onDragStart)
      quoteOverlay.addEventListener('touchstart', onDragStart, { passive: false })
    }
    document.addEventListener('mousemove', onDragMove)
    document.addEventListener('touchmove', onDragMove, { passive: false })
    document.addEventListener('mouseup', onDragEnd)
    document.addEventListener('touchend', onDragEnd)

    // Close panels on background click
    document.addEventListener('click', function(e) {
      if (!currentPanel) return
      if (e.target.closest('.tool-btn') || e.target.closest('#subPanel') || e.target.closest('#quoteOverlay') || e.target.closest('#photoPickerSheet')) return
      subPanel.classList.remove('open')
      if (currentBtn) currentBtn.classList.remove('active')
      currentPanel = null
      currentBtn = null
    })

    // Desktop warning
    if (isDesktop()) {
      var w = document.getElementById('desktopWarning')
      if (w) w.classList.remove('hidden')
    }

    // Start
    init()
  })

  // ---- AUTH + LOAD QUOTE ----
  async function init() {
    var session = await db.auth.getSession()
    if (!session.data.session) { window.location.href = 'login.html'; return }

    var result = await db.from('quotes').select('*').eq('status', 'live').order('published_at', { ascending: false }).limit(1).single()

    if (result.data) {
      quoteText.textContent = result.data.text
      quoteRef.textContent = '— ' + result.data.source.toUpperCase()
      window.currentQuoteId = result.data.id
    } else {
      quoteText.textContent = 'The Word is with you today.'
      quoteRef.textContent = '— GSTW'
    }

    loadBackgroundChoice()
  }

  // ---- LOAD BACKGROUND ----
  function loadBackgroundChoice() {
    var bgType = sessionStorage.getItem('gstw_bg_type')
    var bgValue = sessionStorage.getItem('gstw_bg_value')
    if (!bgType || !bgValue) return

    if (bgType === 'image') {
      bgCanvas.style.backgroundImage = "url('" + bgValue + "')"
      bgCanvas.style.backgroundSize = 'cover'
      bgCanvas.style.backgroundPosition = 'center'
    } else if (bgType === 'color') {
      bgCanvas.style.backgroundImage = 'none'
      bgCanvas.style.background = bgValue
    } else if (bgType === 'gradient') {
      bgCanvas.style.backgroundImage = 'none'
      bgCanvas.style.background = bgValue
    }
  }

  // ---- PANEL TOGGLE ----
  function togglePanel(name, btn) {
    var panelEl = document.getElementById('panel' + name)
    if (!panelEl) return
    if (currentPanel === name) {
      subPanel.classList.remove('open')
      if (currentBtn) currentBtn.classList.remove('active')
      currentPanel = null
      currentBtn = null
      return
    }
    if (currentBtn) currentBtn.classList.remove('active')
    document.querySelectorAll('#subPanel > div').forEach(function(p) { p.classList.add('hidden') })
    panelEl.classList.remove('hidden')
    subPanel.classList.add('open')
    btn.classList.add('active')
    currentPanel = name
    currentBtn = btn
  }

  // ---- FONT ----
  function setFont(fontClass, btn) {
    fontClasses.forEach(function(f) { quoteText.classList.remove(f); quoteRef.classList.remove(f) })
    quoteText.classList.add(fontClass)
    quoteRef.classList.add(fontClass)
    quoteText.style.fontFamily = fontMap[fontClass]
    quoteRef.style.fontFamily = fontMap[fontClass]
    quoteText.style.fontStyle = fontClass === 'font-lora' ? 'italic' : 'normal'
    quoteText.style.textTransform = fontClass === 'font-oswald' ? 'uppercase' : 'none'
    document.querySelectorAll('.font-opt').forEach(function(b) { b.classList.remove('selected') })
    btn.classList.add('selected')
    showToast('Font: ' + btn.textContent.trim())
  }

  // ---- SIZE ----
  function setSize(val) {
    quoteText.style.fontSize = val + 'px'
    document.getElementById('sizeLabel').textContent = val + 'px'
  }

  // ---- COLOR ----
  function setColor(hex, swatch) {
    quoteText.style.color = hex
    quoteRef.style.color = hex
    document.getElementById('colorPreview').style.background = hex
    document.querySelectorAll('.color-swatch').forEach(function(s) {
      s.classList.remove('selected')
      s.style.borderColor = 'transparent'
    })
    swatch.classList.add('selected')
    swatch.style.borderColor = hex === '#000000' ? '#666' : 'white'
  }

  // ---- BLUR ----
  function setBlur(val) {
    bgCanvas.style.filter = 'blur(' + parseInt(val) + 'px)'
    var labels = ['None','Low','Medium','High','Heavy']
    document.getElementById('blurLabel').textContent = labels[Math.min(Math.floor(parseInt(val) / 5), 4)]
  }

  // ---- DARKNESS ----
  function setDarkness(val) {
    bgOverlay.style.background = 'rgba(0,0,0,' + (val / 100) + ')'
    document.getElementById('darkLabel').textContent = val + '%'
  }

  // ---- ALIGN ----
  var alignCycle = ['center','left','right']
  var alignIcons = { center:'format_align_center', left:'format_align_left', right:'format_align_right' }
  var alignIdx = 0

  function cycleAlign() {
    alignIdx = (alignIdx + 1) % alignCycle.length
    var a = alignCycle[alignIdx]
    quoteText.style.textAlign = a
    quoteRef.style.textAlign = a
    quoteOverlay.style.textAlign = a
    document.getElementById('alignIcon').textContent = alignIcons[a]
    showToast('Align: ' + a)
  }

  // ---- DRAG ----
  var dragActive = false
  var dragStartX = 0, dragStartY = 0, overlayStartX = 0, overlayStartY = 0

  function onDragStart(e) {
    if (e.target.closest('.tool-btn') || e.target.closest('#subPanel')) return
    dragActive = true
    quoteOverlay.classList.add('dragging')
    var cx = e.touches ? e.touches[0].clientX : e.clientX
    var cy = e.touches ? e.touches[0].clientY : e.clientY
    var rect = quoteOverlay.getBoundingClientRect()
    var parentRect = quoteOverlay.parentElement.getBoundingClientRect()
    quoteOverlay.style.transform = 'none'
    quoteOverlay.style.position = 'absolute'
    quoteOverlay.style.left = (rect.left - parentRect.left) + 'px'
    quoteOverlay.style.top = (rect.top - parentRect.top) + 'px'
    dragStartX = cx
    dragStartY = cy
    overlayStartX = rect.left - parentRect.left
    overlayStartY = rect.top - parentRect.top
    if (e.cancelable) e.preventDefault()
  }

  function onDragMove(e) {
    if (!dragActive) return
    var cx = e.touches ? e.touches[0].clientX : e.clientX
    var cy = e.touches ? e.touches[0].clientY : e.clientY
    var parentRect = quoteOverlay.parentElement.getBoundingClientRect()
    var maxX = parentRect.width - quoteOverlay.offsetWidth
    var maxY = parentRect.height - quoteOverlay.offsetHeight
    var newX = Math.max(0, Math.min(overlayStartX + (cx - dragStartX), maxX))
    var newY = Math.max(0, Math.min(overlayStartY + (cy - dragStartY), maxY))
    quoteOverlay.style.left = newX + 'px'
    quoteOverlay.style.top = newY + 'px'
    if (e.cancelable) e.preventDefault()
  }

  function onDragEnd() {
    dragActive = false
    if (quoteOverlay) quoteOverlay.classList.remove('dragging')
  }

  // ---- PHOTO PICKER ----
  function openPhotoPicker() {
    var sheet = document.getElementById('photoPickerSheet')
    var panel = sheet.querySelector('.sheet-panel')
    sheet.classList.remove('hidden')
    requestAnimationFrame(function() { panel.classList.add('open') })
  }

  function closePhotoPicker() {
    var sheet = document.getElementById('photoPickerSheet')
    var panel = sheet.querySelector('.sheet-panel')
    panel.classList.remove('open')
    setTimeout(function() { sheet.classList.add('hidden') }, 400)
  }

  function isDesktop() { return !/Android|iPhone|iPad|iPod/i.test(navigator.userAgent) }

  function openCamera() {
    closePhotoPicker()
    if (isDesktop()) { showToast('⚠️ Camera not available — use gallery'); return }
    setTimeout(function() { document.getElementById('cameraInput').click() }, 300)
  }

  function openSelfie() {
    closePhotoPicker()
    if (isDesktop()) { showToast('⚠️ Camera not available — use gallery'); return }
    setTimeout(function() { document.getElementById('selfieInput').click() }, 300)
  }

  function openGallery() {
    closePhotoPicker()
    setTimeout(function() { document.getElementById('galleryInput').click() }, 300)
  }

  function handleImageSelect(input) {
    var file = input.files[0]
    if (!file) return
    var reader = new FileReader()
    reader.onload = function(e) {
      bgCanvas.style.backgroundImage = "url('" + e.target.result + "')"
      bgCanvas.style.backgroundSize = 'cover'
      bgCanvas.style.backgroundPosition = 'center'
      showToast('Photo loaded')
    }
    reader.readAsDataURL(file)
    input.value = ''
  }

  // ---- NAVIGATION ----
  function goBack() { window.location.href = 'backgrounds.html' }
  function goHome() { if (confirm('Leave editor? Changes will be lost.')) window.location.href = 'index.html' }
  function goNext() { window.location.href = 'share.html' }

  // ---- TOAST ----
  var toastTimer
  function showToast(msg) {
    var existing = document.getElementById('editorToast')
    if (existing) existing.remove()
    var t = document.createElement('div')
    t.id = 'editorToast'
    t.className = 'fixed top-20 left-1/2 z-[200] bg-dark/90 backdrop-blur-md text-white text-xs font-bold px-5 py-3 rounded-full shadow-lg whitespace-nowrap flex items-center gap-2'
    t.style.transform = 'translateX(-50%)'
    t.innerHTML = '<span class="material-symbols-outlined text-gold text-[14px]" style="font-variation-settings:\'FILL\' 1">check_circle</span> ' + msg
    document.body.appendChild(t)
    clearTimeout(toastTimer)
    toastTimer = setTimeout(function() { if (t.parentNode) t.remove() }, 2200)
  }
</script>
